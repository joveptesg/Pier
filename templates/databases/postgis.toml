[meta]
id = "postgis"
name = "PostGIS"
description = "PostgreSQL with PostGIS spatial/geographic extensions"
category = "database"
icon = "postgis"
tags = ["sql", "relational", "gis", "spatial", "postgresql"]
long_description = """
PostGIS is the gold-standard geospatial extension for PostgreSQL. It adds GEOMETRY and GEOGRAPHY types, 1000+ spatial functions (ST_Distance, ST_Within, ST_Intersects, ST_Buffer), R-tree GIST indexes, projection support, and topology. It's the database backing OpenStreetMap, national mapping agencies, and most modern GIS stacks.

Pier deploys the official postgis/postgis Docker image (PostGIS pre-installed on PostgreSQL). When you create a new database through Pier's UI, you can tick which PostGIS extensions to install — postgis, postgis_topology, postgis_raster, fuzzystrmatch, postgis_tiger_geocoder — and Pier runs CREATE EXTENSION in dependency order.

All standard PostgreSQL tooling works: pg_dump, psql, pgAdmin, every ORM. Pier's backup / restore / password rotation operate identically to the regular PostgreSQL template.

Use this template if you know you'll need spatial functions. For non-spatial Postgres workloads, the regular PostgreSQL template is lighter.
"""

[docker]
image = "postgis/postgis:{{version}}"

[ports.primary]
internal = 5432
protocol = "tcp"
description = "PostgreSQL wire protocol"

[volumes.data]
mount = "/var/lib/postgresql"

[env]
POSTGRES_DB = { default = "{{name}}", description = "Default database" }
POSTGRES_USER = { default = "postgres", description = "Superuser name" }
POSTGRES_PASSWORD = { default = "{{password}}", description = "Password", secret = true }

[healthcheck]
test = ["CMD-SHELL", "pg_isready -U postgres"]
interval = "10s"
timeout = "5s"
retries = 5
start_period = "30s"

[versions]
available = ["latest", "18-master", "17-master", "16-master", "15-master"]
default = "latest"

[ui.fields.name]
type = "text"
label = "Service Name"
required = true
placeholder = "my-postgis"

[ui.fields.version]
type = "select"
label = "Version"
options_from = "versions.available"

[ui.fields.postgres_db]
type = "text"
label = "Database Name"
default = "postgis"
maps_to = "POSTGRES_DB"

[ui.fields.postgres_password]
type = "password"
label = "Password"
auto_generate = true
maps_to = "POSTGRES_PASSWORD"
