[meta]
id = "cassandra"
name = "Cassandra"
description = "Highly-scalable partitioned row store NoSQL database"
category = "database"
icon = "cassandra"
tags = ["nosql", "wide-column", "distributed"]
long_description = """
Apache Cassandra is a distributed wide-column NoSQL database designed for high write throughput, linear horizontal scaling, and no single point of failure. Masterless architecture, tunable per-query consistency, CQL (SQL-like) query language, and multi-datacenter asynchronous replication make it the go-to choice when "the database must never go down" is a hard requirement. Used at Netflix, Apple, Discord (4 billion messages/day), Instagram, eBay, Uber.

Pier deploys the official cassandra Docker image with /var/lib/cassandra mounted as the persistent volume. Default port 9042/tcp for CQL native protocol; 7000/tcp for inter-node gossip stays on the internal Pier network.

Cluster mode supports 2–5 nodes — enough for evaluation and small deployments. Production typically wants 6+ nodes per datacenter with NetworkTopologyStrategy replication.

Backups use nodetool snapshot tarballs on schedule and can ship to S3. The data model requires partition-key-aware modelling — design tables around your queries before going to production.
"""

[docker]
image = "cassandra:{{version}}"

[ports.cql]
internal = 9042
protocol = "tcp"
description = "CQL native transport"

[volumes.data]
mount = "/var/lib/cassandra"

[env]
CASSANDRA_CLUSTER_NAME = { default = "pier-{{name}}", description = "Cluster name" }
CASSANDRA_DC = { default = "dc1", description = "Data center name" }
CASSANDRA_RACK = { default = "rack1", description = "Rack name" }
HEAP_NEWSIZE = { default = "128M", description = "JVM young generation heap size" }
MAX_HEAP_SIZE = { default = "512M", description = "JVM max heap size" }

[healthcheck]
test = ["CMD-SHELL", "cqlsh -e 'describe cluster' || exit 1"]
interval = "15s"
timeout = "10s"
retries = 10
start_period = "60s"

[versions]
available = ["latest", "5.0", "4.1", "4.0"]
default = "latest"

[cluster]
supported = true
min_nodes = 2
max_nodes = 5
default_nodes = 3
description = "Ring cluster with gossip protocol and seed-based discovery"

[ui.fields.name]
type = "text"
label = "Service Name"
required = true
placeholder = "my-cassandra"

[ui.fields.version]
type = "select"
label = "Version"
options_from = "versions.available"

[ui.fields.cluster_name]
type = "text"
label = "Cluster Name"
placeholder = "pier-cluster"
maps_to = "CASSANDRA_CLUSTER_NAME"
