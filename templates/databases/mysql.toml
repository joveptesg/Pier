[meta]
id = "mysql"
name = "MySQL"
description = "Popular open-source relational database management system"
category = "database"
icon = "mysql"
tags = ["sql", "relational"]
long_description = """
MySQL is the most-deployed relational database in the world — the default backend for WordPress, Drupal, Joomla, Magento, Laravel, Ruby on Rails, and most of the LAMP-stack ecosystem. MySQL 8+ ships modern SQL features like window functions, CTEs, JSON columns, and EXPLAIN ANALYZE.

Pier deploys the official mysql Docker image. /var/lib/mysql is mounted as the persistent volume. A strong root password is generated automatically; default port is 3306/tcp on the internal Pier network.

For high availability, the MySQL template supports clusters of 2–5 nodes (1 primary + N read replicas) via the bitnami/mysql image with InnoDB primary-replica replication. Backups run mysqldump --single-transaction on schedule and can upload to any S3-compatible storage.

If you need a MySQL-compatible database with stronger open governance, consider the MariaDB template — it's binary-compatible through MySQL 5.x and adds Galera multi-master replication.
"""

[docker]
image = "mysql:{{version}}"

[ports.primary]
internal = 3306
protocol = "tcp"
description = "MySQL protocol"

[volumes.data]
mount = "/var/lib/mysql"

[env]
MYSQL_DATABASE = { default = "{{name}}", description = "Default database" }
MYSQL_ROOT_PASSWORD = { default = "{{password}}", description = "Root password", secret = true }

[healthcheck]
test = ["CMD", "mysqladmin", "ping", "-h", "localhost"]
interval = "10s"
timeout = "5s"
retries = 5
start_period = "30s"

[versions]
available = ["latest", "9.3", "9.2", "8.4", "8.0"]
default = "latest"

[cluster]
supported = true
min_nodes = 2
max_nodes = 5
default_nodes = 3
description = "Streaming replication: 1 primary + N-1 read replicas (bitnami/mysql)"

[ui.fields.name]
type = "text"
label = "Service Name"
required = true
placeholder = "my-mysql"

[ui.fields.version]
type = "select"
label = "Version"
options_from = "versions.available"

[ui.fields.mysql_database]
type = "text"
label = "Database Name"
default = "mydb"
maps_to = "MYSQL_DATABASE"

[ui.fields.mysql_root_password]
type = "password"
label = "Root Password"
auto_generate = true
maps_to = "MYSQL_ROOT_PASSWORD"
