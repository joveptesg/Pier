[meta]
id = "mongodb"
name = "MongoDB"
description = "Document-oriented NoSQL database for modern applications"
category = "database"
icon = "mongodb"
tags = ["nosql", "document"]
long_description = """
MongoDB is the most-deployed document-oriented NoSQL database. It stores data as BSON (binary JSON) documents in collections, offers schema flexibility, a rich aggregation pipeline ($match, $group, $lookup, $facet, $unwind), 2dsphere geospatial indexes, change streams for CDC, and native sharding for horizontal scale.

Pier deploys the official mongo Docker image with /data/db mounted as the persistent volume. Default port is 27017/tcp on the internal Pier network. Root credentials are auto-generated via MONGO_INITDB_ROOT_USERNAME and MONGO_INITDB_ROOT_PASSWORD.

Single-node only in this template — replica sets need 3+ nodes with special initialization and aren't part of Pier's cluster mode yet. For replica sets, use a custom Docker template or MongoDB Atlas.

Backups run mongodump --archive --gzip on schedule and can upload to S3. Per-database and full-instance backups are configurable.

MongoDB's SSPL license restricts offering Mongo itself as a SaaS to third parties; using it as the database behind your own application is fine.
"""

[docker]
image = "mongo:{{version}}"

[ports.primary]
internal = 27017
protocol = "tcp"
description = "MongoDB wire protocol"

[volumes.data]
mount = "/data/db"

[env]
MONGO_INITDB_ROOT_USERNAME = { default = "root", description = "Root username" }
MONGO_INITDB_ROOT_PASSWORD = { default = "{{password}}", description = "Root password", secret = true }

[healthcheck]
test = ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
interval = "10s"
timeout = "5s"
retries = 5
start_period = "30s"

[versions]
available = ["latest", "8.0", "7.0"]
default = "latest"

[cluster]
supported = true
min_nodes = 3
max_nodes = 5
default_nodes = 3
description = "Replica set with automatic primary election"

[ui.fields.name]
type = "text"
label = "Service Name"
required = true
placeholder = "my-mongo"

[ui.fields.version]
type = "select"
label = "Version"
options_from = "versions.available"

[ui.fields.mongo_root_password]
type = "password"
label = "Root Password"
auto_generate = true
maps_to = "MONGO_INITDB_ROOT_PASSWORD"
