[meta]
id = "postgresql"
name = "PostgreSQL"
description = "Advanced open-source relational database"
category = "database"
icon = "postgresql"
tags = ["sql", "relational"]
long_description = """
PostgreSQL is a battle-tested, fully ACID-compliant open-source SQL database with 30+ years of development behind it. It's the default backend for new application projects across industries thanks to its rich type system (JSONB, arrays, ranges, UUID, geometric types), strict SQL standard compliance, and enormous extension ecosystem.

Pier deploys the official postgres Docker image with /var/lib/postgresql mounted as the persistent volume. Strong root password is generated automatically and a default database is created on first boot. Default port is 5432/tcp on the internal Pier network.

For high availability, the PostgreSQL template supports clusters of 2 to 5 nodes (1 primary + N read replicas) via the bitnami/postgresql image with streaming replication. Per-database and cluster-wide backups (pg_dump custom format) run on schedule with optional S3 upload.

Need extensions? Use the PostGIS template for spatial data, TimescaleDB for time-series, or install pgvector / others manually via CREATE EXTENSION.
"""

[docker]
image = "postgres:{{version}}"

[ports.primary]
internal = 5432
protocol = "tcp"
description = "PostgreSQL wire protocol"

[volumes.data]
mount = "/var/lib/postgresql"

[env]
POSTGRES_DB = { default = "{{name}}", description = "Default database" }
POSTGRES_USER = { default = "postgres", description = "Superuser name" }
POSTGRES_PASSWORD = { default = "{{password}}", description = "Password", secret = true }

[healthcheck]
test = ["CMD-SHELL", "pg_isready -U postgres"]
interval = "10s"
timeout = "5s"
retries = 5
start_period = "30s"

[versions]
available = ["latest", "18-alpine", "17-alpine", "16-alpine"]
default = "latest"

[cluster]
supported = true
min_nodes = 2
max_nodes = 5
default_nodes = 3
description = "Streaming replication: 1 primary + N-1 read replicas (bitnami/postgresql)"

[ui.fields.name]
type = "text"
label = "Service Name"
required = true
placeholder = "my-postgres"

[ui.fields.version]
type = "select"
label = "Version"
options_from = "versions.available"

[ui.fields.postgres_db]
type = "text"
label = "Database Name"
default = "postgres"
maps_to = "POSTGRES_DB"

[ui.fields.postgres_password]
type = "password"
label = "Password"
auto_generate = true
maps_to = "POSTGRES_PASSWORD"
