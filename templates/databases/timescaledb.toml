[meta]
id = "timescaledb"
name = "TimescaleDB"
description = "PostgreSQL with TimescaleDB extension for time-series workloads"
category = "database"
icon = "timescaledb"
tags = ["sql", "relational", "time-series", "timescale", "postgresql"]

[docker]
image = "timescale/timescaledb:{{version}}"

[ports.primary]
internal = 5432
protocol = "tcp"
description = "PostgreSQL wire protocol"

[volumes.data]
mount = "/var/lib/postgresql/data"

[env]
POSTGRES_DB = { default = "{{name}}", description = "Default database" }
POSTGRES_USER = { default = "postgres", description = "Superuser name" }
POSTGRES_PASSWORD = { default = "{{password}}", description = "Password", secret = true }

[healthcheck]
test = ["CMD-SHELL", "pg_isready -U postgres"]
interval = "10s"
timeout = "5s"
retries = 5
start_period = "30s"

[versions]
available = ["latest-pg17", "latest-pg18"]
default = "latest-pg17"

[ui.fields.name]
type = "text"
label = "Service Name"
required = true
placeholder = "my-timescaledb"

[ui.fields.version]
type = "select"
label = "Version"
options_from = "versions.available"

[ui.fields.postgres_db]
type = "text"
label = "Database Name"
default = "timescale"
maps_to = "POSTGRES_DB"

[ui.fields.postgres_password]
type = "password"
label = "Password"
auto_generate = true
maps_to = "POSTGRES_PASSWORD"
