[meta]
id = "timescaledb"
name = "TimescaleDB"
description = "PostgreSQL with TimescaleDB extension for time-series workloads"
category = "database"
icon = "timescaledb"
tags = ["sql", "relational", "time-series", "timescale", "postgresql"]
long_description = """
TimescaleDB is a PostgreSQL extension that turns Postgres into a high-performance time-series database. It adds hypertables (tables auto-partitioned by time), columnar compression, continuous aggregates, and data retention policies — all without breaking SQL compatibility.

Use it for application metrics, IoT sensor data, financial tick data, real-time analytics, or any workload where rows are mostly append-only and queried by time range. Because it speaks PostgreSQL on the wire, your existing ORMs, drivers, dashboards, and admin tooling (psql, pg_dump, pgBouncer) keep working unchanged.

Default version on Pier: latest-pg17 (PostgreSQL 17 + TimescaleDB latest). The latest-pg18 build is also available. This is the single-node Community Edition; HA via the timescaledb-ha image is a separate variant.

Connect on port 5432 using the standard postgresql:// URI. Pier creates the timescaledb extension automatically in the initial POSTGRES_DB; for additional databases created through the UI, run CREATE EXTENSION IF NOT EXISTS timescaledb; manually once.
"""

[docker]
image = "timescale/timescaledb:{{version}}"

[ports.primary]
internal = 5432
protocol = "tcp"
description = "PostgreSQL wire protocol"

[volumes.data]
mount = "/var/lib/postgresql/data"

[env]
POSTGRES_DB = { default = "{{name}}", description = "Default database" }
POSTGRES_USER = { default = "postgres", description = "Superuser name" }
POSTGRES_PASSWORD = { default = "{{password}}", description = "Password", secret = true }

[healthcheck]
test = ["CMD-SHELL", "pg_isready -U postgres"]
interval = "10s"
timeout = "5s"
retries = 5
start_period = "30s"

[versions]
available = ["latest-pg17", "latest-pg18"]
default = "latest-pg17"

[ui.fields.name]
type = "text"
label = "Service Name"
required = true
placeholder = "my-timescaledb"

[ui.fields.version]
type = "select"
label = "Version"
options_from = "versions.available"

[ui.fields.postgres_db]
type = "text"
label = "Database Name"
default = "timescale"
maps_to = "POSTGRES_DB"

[ui.fields.postgres_password]
type = "password"
label = "Password"
auto_generate = true
maps_to = "POSTGRES_PASSWORD"
