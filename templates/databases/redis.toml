[meta]
id = "redis"
name = "Redis"
description = "In-memory data store used as database, cache, and message broker"
category = "database"
icon = "redis"
tags = ["cache", "nosql", "key-value"]

[docker]
image = "redis:{{version}}"
command = ["redis-server", "--requirepass", "{{REDIS_PASSWORD}}"]

[ports.primary]
internal = 6379
protocol = "tcp"
description = "Redis protocol"

[volumes.data]
mount = "/data"

[env]
REDIS_PASSWORD = { default = "{{password}}", description = "Redis password", secret = true }

[healthcheck]
test = ["CMD", "redis-cli", "-a", "{{REDIS_PASSWORD}}", "ping"]
interval = "10s"
timeout = "5s"
retries = 5

[versions]
available = ["latest", "8.0-alpine", "7.4-alpine", "7.2-alpine"]
default = "latest"

[cluster]
supported = true
min_nodes = 3
max_nodes = 5
default_nodes = 3
description = "Sentinel HA: 1 master + N-1 replicas + N sentinels (bitnami/redis)"

[ui.fields.name]
type = "text"
label = "Service Name"
required = true
placeholder = "my-redis"

[ui.fields.version]
type = "select"
label = "Version"
options_from = "versions.available"

[ui.fields.password]
type = "password"
label = "Password"
auto_generate = true
maps_to = "REDIS_PASSWORD"
