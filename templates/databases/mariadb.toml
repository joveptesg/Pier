[meta]
id = "mariadb"
name = "MariaDB"
description = "Community-developed fork of MySQL with enhanced features"
category = "database"
icon = "mariadb"
tags = ["sql", "relational", "mysql-compatible"]
long_description = """
MariaDB is a community-developed fork of MySQL created by the original MySQL developers (led by Monty Widenius) after the Oracle acquisition. It's binary-compatible with MySQL through 5.x and remains drop-in for most MySQL 8.0 workloads, while adding storage engines (Aria, ColumnStore), Galera multi-master cluster, and a stronger open-source guarantee under the MariaDB Foundation.

Wikipedia, Google, Mozilla, Red Hat, SUSE, and Booking.com all migrated from MySQL to MariaDB. Major Linux distributions (Debian, Fedora, Arch) ship MariaDB as their default "MySQL-compatible" database.

Pier deploys the official mariadb Docker image with /var/lib/mysql mounted as the persistent volume. Default port is 3306/tcp; the wire protocol is MySQL so the connection string still uses mysql://. Strong root password is auto-generated.

Cluster mode supports 2–5 nodes via the bitnami/mariadb image with Galera synchronous multi-master replication — write to any node, all nodes stay consistent.
"""

[docker]
image = "mariadb:{{version}}"

[ports.primary]
internal = 3306
protocol = "tcp"
description = "MariaDB protocol"

[volumes.data]
mount = "/var/lib/mysql"

[env]
MARIADB_DATABASE = { default = "{{name}}", description = "Default database" }
MARIADB_ROOT_PASSWORD = { default = "{{password}}", description = "Root password", secret = true }

[healthcheck]
test = ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
interval = "10s"
timeout = "5s"
retries = 5
start_period = "30s"

[versions]
available = ["latest", "11.8", "11.7", "11.6", "11.4"]
default = "latest"

[cluster]
supported = true
min_nodes = 2
max_nodes = 5
default_nodes = 3
description = "Streaming replication: 1 primary + N-1 read replicas (bitnami/mariadb)"

[ui.fields.name]
type = "text"
label = "Service Name"
required = true
placeholder = "my-mariadb"

[ui.fields.version]
type = "select"
label = "Version"
options_from = "versions.available"

[ui.fields.mariadb_database]
type = "text"
label = "Database Name"
default = "mydb"
maps_to = "MARIADB_DATABASE"

[ui.fields.mariadb_root_password]
type = "password"
label = "Root Password"
auto_generate = true
maps_to = "MARIADB_ROOT_PASSWORD"
