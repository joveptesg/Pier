[meta]
id = "mariadb"
name = "MariaDB"
description = "Community-developed fork of MySQL with enhanced features"
category = "database"
icon = "mariadb"
tags = ["sql", "relational", "mysql-compatible"]

[docker]
image = "mariadb:{{version}}"

[ports.primary]
internal = 3306
protocol = "tcp"
description = "MariaDB protocol"

[volumes.data]
mount = "/var/lib/mysql"

[env]
MARIADB_DATABASE = { default = "{{name}}", description = "Default database" }
MARIADB_ROOT_PASSWORD = { default = "{{password}}", description = "Root password", secret = true }

[healthcheck]
test = ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
interval = "10s"
timeout = "5s"
retries = 5
start_period = "30s"

[versions]
available = ["11.8", "11.7", "11.6", "11.4"]
default = "11.8"

[cluster]
supported = true
min_nodes = 2
max_nodes = 5
default_nodes = 3
description = "Streaming replication: 1 primary + N-1 read replicas (bitnami/mariadb)"

[ui.fields.name]
type = "text"
label = "Service Name"
required = true
placeholder = "my-mariadb"

[ui.fields.version]
type = "select"
label = "Version"
options_from = "versions.available"

[ui.fields.mariadb_database]
type = "text"
label = "Database Name"
default = "mydb"
maps_to = "MARIADB_DATABASE"

[ui.fields.mariadb_root_password]
type = "password"
label = "Root Password"
auto_generate = true
maps_to = "MARIADB_ROOT_PASSWORD"
