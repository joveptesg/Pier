[meta]
id = "supabase"
name = "Supabase"
description = "Open-source Firebase alternative with PostgreSQL, Auth, and Realtime"
category = "service"
icon = "supabase"
tags = ["firebase", "postgresql", "auth", "realtime", "api", "baas"]
long_description = """
Supabase is the open-source Firebase alternative — a backend-as-a-service built on PostgreSQL. It bundles authentication (GoTrue), auto-generated REST + GraphQL APIs (PostgREST + pg_graphql), realtime subscriptions over WebSockets, S3-compatible storage, edge functions and pgvector — all using Postgres extensions and sidecars.

Pier deploys the full multi-container Supabase Docker Compose stack. The gateway (Kong) sits in front; Postgres, GoTrue, PostgREST, Realtime, Storage and Studio (the admin UI) come up together. JWT secrets, anon and service-role keys are generated automatically and shown on the service detail page.

Default API port is 8000/tcp on the internal Pier network; attach a domain for HTTPS via Traefik. Studio is reachable on its own path/port.

Because every Supabase feature is a Postgres extension or sidecar, your data stays in plain PostgreSQL — pg_dump exports work, your existing ORM still queries the same tables, and you can leave Supabase at any time without a migration.
"""

[docker]
image = "supabase/postgres:latest"

[ports.primary]
internal = 5432
protocol = "tcp"
description = "PostgreSQL protocol"

[volumes.data]
mount = "/var/lib/postgresql/data"

[env]
POSTGRES_PASSWORD = { default = "{{password}}", description = "PostgreSQL password", secret = true }
POSTGRES_DB = { default = "{{name}}", description = "Database name" }

[healthcheck]
test = ["CMD-SHELL", "pg_isready -U supabase_admin"]
interval = "10s"
timeout = "5s"
retries = 5
start_period = "30s"

[ui.fields.name]
type = "text"
label = "Service Name"
required = true
placeholder = "my-supabase"

[ui.fields.postgres_password]
type = "password"
label = "Password"
auto_generate = true
maps_to = "POSTGRES_PASSWORD"
