[meta]
id = "matrix-synapse-postgresql"
name = "Matrix Synapse with PostgreSQL"
description = "Matrix chat server with PostgreSQL backend"
category = "service"
icon = "matrix"
tags = ["chat", "messaging", "matrix", "federation", "postgresql"]
long_description = """
Matrix Synapse is the reference homeserver of the Matrix protocol — an open, decentralized, federated standard for real-time chat, voice, video, and end-to-end encrypted messaging. This template ships Synapse plus a dedicated PostgreSQL backend, the only production-supported database for Synapse, pre-wired so federation and busy rooms perform correctly from day one.

Use it to self-host a chat server that federates with the global Matrix network (your users alice:example.com can talk to anyone on any homeserver) and supports bridges to Telegram, Discord, WhatsApp, Signal, Slack and IRC. End-to-end encryption via Olm/Megolm is on by default in DMs.

How it works on Pier — Synapse on port 8008 behind Traefik with TLS at your custom domain, PostgreSQL on the internal Docker network. Two persistent volumes — Synapse data (config + media store) and Postgres data. Create the first admin user via the `register_new_matrix_user` script with `docker exec`, then point Element clients at your homeserver URL.

Compared to the SQLite Synapse template — Postgres is required for any deployment beyond personal use. SQLite cannot keep up with federation joins on big rooms. Compared to Mattermost / Rocket.Chat — those are closed-federation (one server per org). Choose Matrix when you want open federation, bridges, and E2EE-by-default in DMs.
"""

[compose]
template = """services:
  synapse:
    image: matrixdotorg/synapse:{{version}}
    container_name: pier-{{name}}-synapse
    entrypoint: ["sh", "-c", "/start.py generate && /start.py run"]
    ports:
      - "{{port}}:8008"
    environment:
      SYNAPSE_SERVER_NAME: "{{server_name}}"
      SYNAPSE_REPORT_STATS: "no"
    volumes:
      - synapse_data:/data
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
  postgres:
    image: postgres:17-alpine
    container_name: pier-{{name}}-postgres
    environment:
      POSTGRES_DB: synapse
      POSTGRES_USER: synapse
      POSTGRES_PASSWORD: "{{db_password}}"
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U synapse"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
volumes:
  synapse_data:
  pg_data:
"""

[ui.fields.name]
type = "text"
label = "Service Name"
required = true
placeholder = "my-synapse"

[ui.fields.version]
type = "select"
label = "Synapse Version"
options = ["v1.123.0", "v1.122.0", "v1.121.0"]
default = "v1.123.0"

[ui.fields.server_name]
type = "text"
label = "Server Name"
default = "localhost"
placeholder = "matrix.example.com"

[ui.fields.db_password]
type = "password"
label = "DB Password"
auto_generate = true

[ui.fields.port]
type = "number"
label = "Exposed Port"
default = "8008"
