[meta]
id = "amneziawg"
name = "AmneziaWG"
description = "WireGuard VPN with web management interface"
category = "service"
icon = "amneziawg"
tags = ["vpn", "wireguard", "network", "privacy", "security"]
long_description = """
AmneziaWG is an open-source fork of WireGuard that adds traffic obfuscation against Deep Packet Inspection (DPI). Vanilla WireGuard has a recognizable packet shape that DPI firewalls in restrictive networks (Russian RKN, Iran, GFW probes) can identify and block. AmneziaWG randomizes packet size, adds junk traffic, and pads the handshake — defeating most DPI signatures while keeping WireGuard protocol semantics.

This template packages AmneziaWG with the wg-easy web management UI (a fork that knows the AmneziaWG parameters), so you add/remove clients, generate QR codes for mobile, and monitor traffic from a browser — no SSH or `wg-quick` editing.

How it works on Pier — two ports — 51820/udp for VPN, 51821/tcp for the web UI behind Traefik. The config volume mounts at `/etc/wireguard`. Set the web UI password and your VPS public hostname via env. Add clients in the UI; each gets a config and QR code for the AmneziaVPN mobile app (iOS/Android/desktop). Standard WireGuard clients also work when obfuscation is off.

Compared to alternatives — vanilla WireGuard (wg-easy) is simpler but DPI-blockable in restrictive networks. OpenVPN + obfsproxy works but is heavier. Shadowsocks/V2Ray are application-layer proxies (TCP only); AmneziaWG is a full IP-layer VPN. Use AmneziaWG specifically where vanilla WireGuard is blocked.
"""

[docker]
image = "ghcr.io/w0rng/amnezia-wg-easy:{{version}}"
cap_add = ["NET_ADMIN", "SYS_MODULE"]
sysctls = ["net.ipv4.conf.all.src_valid_mark=1", "net.ipv4.ip_forward=1"]
devices = ["/dev/net/tun:/dev/net/tun"]

[ports.web]
internal = 51821
protocol = "tcp"
description = "Web UI"

[ports.vpn]
internal = 51820
protocol = "udp"
description = "WireGuard VPN"

[volumes.config]
mount = "/etc/wireguard"

[env]
WG_HOST = { default = "0.0.0.0", description = "Public IP or domain" }
PASSWORD = { default = "{{password}}", description = "Web UI password", secret = true }

[versions]
available = ["latest"]
default = "latest"

[ui.fields.name]
type = "text"
label = "Service Name"
required = true
placeholder = "my-vpn"

[ui.fields.wg_host]
type = "text"
label = "Public IP / Domain"
required = true
placeholder = "vpn.example.com"
maps_to = "WG_HOST"

[ui.fields.password]
type = "password"
label = "Web UI Password"
auto_generate = true
maps_to = "PASSWORD"
