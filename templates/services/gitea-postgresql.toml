[meta]
id = "gitea-postgresql"
name = "Gitea with PostgreSQL"
description = "Self-hosted Git service backed by PostgreSQL"
category = "service"
icon = "gitea"
tags = ["git", "repository", "postgresql", "devops", "code"]
long_description = """
Gitea (the lightweight self-hosted Git service) paired with a dedicated PostgreSQL backend for production use. Gitea defaults to SQLite which is fine for small teams; PostgreSQL is the recommended backend once you cross a handful of concurrent users, want HA backups, or run Gitea Actions at any volume.

Use it as a self-hosted GitHub for a team of 5-500, an internal production Git + CI server with Gitea Actions, a public OSS host, or a package registry hub (npm/PyPI/Maven/Docker/Helm/Cargo/etc.) alongside Git repos. Webhooks, OAuth2/OIDC/LDAP/SAML SSO, fine-grained ACLs all scale comfortably with Postgres.

How it works on Pier — Gitea web on port 3000, Gitea SSH on a high external port (e.g. 222). PostgreSQL on the internal Docker network. Persistent volumes — /data for Gitea (repos, uploads, config) and /var/lib/postgresql/data for Postgres. First-time setup is the standard Gitea install screen on first visit; the database config is pre-filled to point at the bundled Postgres.

Compared to alternatives — Gitea with SQLite is fine for 1-3 users. GitLab CE is more powerful (full DevOps platform) but heavy (8 GB RAM minimum). Forgejo is a community-governed Gitea hard fork — drop-in compatible. GitHub Enterprise is SaaS or self-hosted with enterprise pricing. This template is the right answer for production Gitea on your VPS.
"""

[compose]
template = """services:
  gitea:
    image: gitea/gitea:{{version}}
    container_name: pier-{{name}}-gitea
    ports:
      - "{{port}}:3000"
      - "{{ssh_port}}:22"
    environment:
      USER_UID: "1000"
      USER_GID: "1000"
      GITEA__database__DB_TYPE: postgres
      GITEA__database__HOST: postgres:5432
      GITEA__database__NAME: gitea
      GITEA__database__USER: gitea
      GITEA__database__PASSWD: "{{db_password}}"
    volumes:
      - gitea_data:/data
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
  postgres:
    image: postgres:17-alpine
    container_name: pier-{{name}}-postgres
    environment:
      POSTGRES_DB: gitea
      POSTGRES_USER: gitea
      POSTGRES_PASSWORD: "{{db_password}}"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gitea"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
volumes:
  gitea_data:
  pg_data:
"""

[ui.fields.name]
type = "text"
label = "Service Name"
required = true
placeholder = "my-gitea"

[ui.fields.version]
type = "select"
label = "Gitea Version"
options = ["1.23", "1.22", "1.21"]
default = "1.23"

[ui.fields.db_password]
type = "password"
label = "DB Password"
auto_generate = true

[ui.fields.port]
type = "number"
label = "Web Port"
default = "3000"

[ui.fields.ssh_port]
type = "number"
label = "SSH Port"
default = "2222"
