[meta]
id = "matrix-synapse-sqlite"
name = "Matrix Synapse (SQLite)"
description = "Open-source chat server for the Matrix protocol"
category = "service"
icon = "matrix"
tags = ["chat", "messaging", "matrix", "federation", "communication"]
long_description = """
Matrix Synapse with the default SQLite backend in one container. The reference Matrix homeserver — federation, end-to-end encryption, voice/video, bridges to Telegram/Discord/WhatsApp/Signal — packaged for personal use, small communities, or protocol testing where the simpler SQLite backend is enough.

Use it for a personal homeserver shared with a handful of users, a family chat, or to develop and test Matrix bots, bridges, and clients without provisioning Postgres. The full Matrix protocol works the same as on the PostgreSQL deployment — just at a smaller scale.

How it works on Pier — single Synapse container on port 8008 behind Traefik. The data volume mounts at `/data` containing `homeserver.db` (SQLite), `homeserver.yaml`, and the media store. Backups are trivial — copy the volume while the container is paused. Create the first admin user via `register_new_matrix_user`.

When to upgrade — once you have more than a handful of active users or join busy public rooms with many federated participants, SQLite becomes the bottleneck. Synapse ships a `synapse_port_db` script for migrating to the PostgreSQL template in one pass.
"""

[docker]
image = "matrixdotorg/synapse:{{version}}"

[ports.primary]
internal = 8008
protocol = "tcp"
description = "HTTP API"

[volumes.data]
mount = "/data"

[env]
SYNAPSE_SERVER_NAME = { default = "localhost", description = "Server name (domain)" }
SYNAPSE_REPORT_STATS = { default = "no", description = "Report anonymous stats" }

[versions]
available = ["v1.123.0", "v1.122.0", "v1.121.0"]
default = "v1.123.0"

[ui.fields.name]
type = "text"
label = "Service Name"
required = true
placeholder = "my-synapse"

[ui.fields.version]
type = "select"
label = "Version"
options_from = "versions.available"

[ui.fields.server_name]
type = "text"
label = "Server Name"
default = "localhost"
placeholder = "matrix.example.com"
maps_to = "SYNAPSE_SERVER_NAME"
