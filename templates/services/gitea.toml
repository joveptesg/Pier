[meta]
id = "gitea"
name = "Gitea"
description = "Lightweight self-hosted Git service"
category = "service"
icon = "gitea"
tags = ["git", "repository", "ci", "devops", "code"]
long_description = """
Gitea is a community-developed, lightweight, self-hosted Git service written in Go. It looks and works like GitHub — repos, pull requests, issues, code review, releases, wikis, Actions (CI/CD), package registries — but runs as a single ~100 MB Docker container on a $5/month VPS.

Pier deploys the official gitea/gitea Docker image with /data mounted as the persistent volume (holds the SQLite database, Git repositories, attachments and configuration). Default port is 3000/tcp for the web UI; SSH (22) is internal-only by default. The admin user is created on first visit.

For HTTPS, attach a domain in Pier's Domains tab and Gitea's ROOT_URL is set automatically from the X-Forwarded headers Traefik sends. For Actions CI, spawn the gitea/act_runner container separately and register it with a token.

For heavier deployments with a PostgreSQL backend instead of SQLite, use the gitea-postgresql template which bundles Gitea + Postgres in one Docker Compose stack.
"""

[docker]
image = "gitea/gitea:{{version}}"

[ports.primary]
internal = 3000
protocol = "tcp"
description = "Web UI"

[ports.ssh]
internal = 22
protocol = "tcp"
description = "SSH"

[volumes.data]
mount = "/data"

[env]
GITEA__database__DB_TYPE = { default = "sqlite3", description = "Database type" }
USER_UID = { default = "1000", description = "User UID" }
USER_GID = { default = "1000", description = "User GID" }

[healthcheck]
test = ["CMD-SHELL", "curl -f http://localhost:3000/ || exit 1"]
interval = "10s"
timeout = "5s"
retries = 5
start_period = "30s"

[versions]
available = ["1.23", "1.22", "1.21"]
default = "1.23"

[ui.fields.name]
type = "text"
label = "Service Name"
required = true
placeholder = "my-gitea"

[ui.fields.version]
type = "select"
label = "Version"
options_from = "versions.available"
