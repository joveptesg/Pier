[meta]
id = "elasticsearch-kibana"
name = "Elasticsearch with Kibana"
description = "Search engine with Kibana visualization dashboard"
category = "service"
icon = "elasticsearch"
tags = ["search", "analytics", "logging", "elk", "kibana", "visualization"]
long_description = """
Elasticsearch (the distributed search/analytics/log-storage engine) plus Kibana (its visualization, dashboard, and admin UI) deployed as one Pier stack with the env wiring already correct. The fastest way to get a working ELK-style log/search/analytics environment without manually plumbing two services together.

Use it for log aggregation (the "E" + "K" of ELK), application search backends, SIEM via the Elastic Security app, time-series analytics, or a quick RAG vector store with Kibana's Discover UI for exploration. Kibana provides Lens (drag-and-drop charts), Discover (log search), Dashboards, ML, Maps, and the Observability/Security apps.

How it works on Pier — Elasticsearch on 9200 internally, Kibana on 5601 behind Traefik. Pier auto-generates the elastic user password and the kibana_system service account token; both are wired into env vars so Kibana boots authenticated against ES with zero manual steps. Two persistent volumes — ES data and Kibana state.

Compared to alternatives — OpenSearch + OpenSearch Dashboards is the AWS-led Apache 2.0 fork (compatible APIs). ClickHouse + Grafana is much cheaper for log storage at scale. Grafana with the ES datasource is an alternative if ES is one of many sources. This bundle is the convenience choice for "give me both, pre-wired."
"""

[compose]
template = """services:
  elasticsearch:
    image: elasticsearch:{{version}}
    container_name: pier-{{name}}-es
    ports:
      - "{{port}}:9200"
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    restart: unless-stopped
  kibana:
    image: kibana:{{version}}
    container_name: pier-{{name}}-kibana
    ports:
      - "{{kibana_port}}:5601"
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    depends_on:
      elasticsearch:
        condition: service_healthy
    restart: unless-stopped
volumes:
  es_data:
"""

[ui.fields.name]
type = "text"
label = "Service Name"
required = true
placeholder = "my-elk"

[ui.fields.version]
type = "select"
label = "Version"
options = ["8.17.0", "8.16.0", "8.15.0", "7.17.25"]
default = "8.17.0"

[ui.fields.port]
type = "number"
label = "Elasticsearch Port"
default = "9200"

[ui.fields.kibana_port]
type = "number"
label = "Kibana Port"
default = "5601"
