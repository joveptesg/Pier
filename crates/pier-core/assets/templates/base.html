<!DOCTYPE html>
<html lang="en" :class="{ 'dark': dark }" x-data="{ sidebarOpen: true, dark: localStorage.getItem('pier-theme') !== 'light' }" x-init="$watch('dark', v => localStorage.setItem('pier-theme', v ? 'dark' : 'light'))" style="margin:0;padding:0;background:#fff">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Dashboard{% endblock %} — Pier</title>
    <script>
        /* Instant dark mode — prevent white flash */
        if (localStorage.getItem('pier-theme') !== 'light') {
            document.documentElement.classList.add('dark');
            document.documentElement.style.background = '#030712';
        }
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/static/htmx.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/uplot@1.6.31/dist/uPlot.min.css">
    <script src="https://cdn.jsdelivr.net/npm/uplot@1.6.31/dist/uPlot.iife.min.js"></script>
    <script src="/static/alpine.min.js" defer></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Allerta+Stencil&display=swap" rel="stylesheet">
    <style>
        html, body { margin: 0; padding: 0; }
        html { background: #fff; }
        html.dark { background: #030712; }
        [x-cloak] { display: none !important; }
        .spinner { animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        .dark ::-webkit-scrollbar-track { background: rgb(17 24 39); }
        ::-webkit-scrollbar-thumb { background: rgb(203 213 225); border-radius: 3px; }
        .dark ::-webkit-scrollbar-thumb { background: rgb(55 65 81); border-radius: 3px; }
    </style>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        pier: { 50: '#eff6ff', 500: '#3b82f6', 600: '#2563eb', 700: '#1d4ed8' }
                    }
                }
            }
        }
    </script>
</head>

    <!-- Toast Notifications -->
    <div x-data="toastManager()" x-on:toast.window="add($event.detail)" class="fixed top-4 right-4 z-50 space-y-2" x-cloak>
        <template x-for="t in toasts" :key="t.id">
            <div x-show="t.visible"
                 x-transition:enter="transition ease-out duration-200"
                 x-transition:enter-start="opacity-0 translate-x-4"
                 x-transition:enter-end="opacity-100 translate-x-0"
                 x-transition:leave="transition ease-in duration-150"
                 x-transition:leave-start="opacity-100"
                 x-transition:leave-end="opacity-0"
                 class="px-4 py-3 rounded-lg shadow-lg text-sm max-w-xs"
                 :class="t.type === 'error' ? 'bg-red-600 text-white' : 'bg-green-600 text-white'"
                 x-text="t.message">
            </div>
        </template>
    </div>

    <script>
        function toastManager() {
            return {
                toasts: [],
                add(detail) {
                    const id = Date.now();
                    this.toasts.push({ id, ...detail, visible: true });
                    setTimeout(() => {
                        const t = this.toasts.find(x => x.id === id);
                        if (t) t.visible = false;
                        setTimeout(() => {
                            this.toasts = this.toasts.filter(x => x.id !== id);
                        }, 200);
                    }, 3000);
                }
            };
        }

        function toast(message, type = 'success') {
            window.dispatchEvent(new CustomEvent('toast', { detail: { message, type } }));
        }

        function generatePassword(len = 32) {
            const charset = 'abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
            const arr = new Uint8Array(len);
            crypto.getRandomValues(arr);
            return Array.from(arr, b => charset[b % charset.length]).join('');
        }

        function copyText(text) {
            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(text).then(() => toast('Copied!')).catch(() => fallbackCopy(text));
            } else {
                fallbackCopy(text);
            }
        }
        function fallbackCopy(text) {
            const ta = document.createElement('textarea');
            ta.value = text;
            ta.style.position = 'fixed';
            ta.style.left = '-9999px';
            document.body.appendChild(ta);
            ta.select();
            try { document.execCommand('copy'); toast('Copied!'); } catch { toast('Copy failed', 'error'); }
            document.body.removeChild(ta);
        }

        async function api(url, opts = {}) {
            const res = await fetch(url, {
                headers: { 'Content-Type': 'application/json', ...opts.headers },
                ...opts,
            });
            const data = await res.json().catch(() => ({}));
            if (!res.ok) throw new Error(data.error || 'Request failed');
            return data;
        }
    </script>

                <svg class="w-4 h-4 text-blue-500 spinner" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
                <span class="text-sm text-gray-700 dark:text-gray-300" x-text="deploying.length + ' deployment' + (deploying.length > 1 ? 's' : '')"></span>
                <svg class="w-3 h-3 text-gray-400 transition-transform" :class="open ? 'rotate-180' : ''" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
            </button>
            <!-- Dropdown -->
            <div x-show="open" x-cloak @click.away="open = false"
                 class="absolute bottom-full right-0 mb-2 w-72 bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl shadow-xl overflow-hidden">
                <template x-for="svc in deploying" :key="svc.id">
                    <a :href="'/resources/' + svc.id + '#deployments'"
                       class="flex items-center gap-3 px-4 py-3 hover:bg-gray-50 dark:hover:bg-gray-700/50 border-b border-gray-100 dark:border-gray-700/50 last:border-0">
                        <svg class="w-4 h-4 text-blue-500 spinner shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" stroke-width="2" stroke-dasharray="30" stroke-dashoffset="10"/></svg>
                        <div class="min-w-0">
                            <div class="text-sm font-medium text-gray-900 dark:text-white truncate" x-text="svc.name"></div>
                            <div class="text-[11px] text-blue-500">In Progress</div>
                        </div>
                    </a>
                </template>
            </div>
        </div>
    </div>

    <script>
    function globalDeployBadge() {
        return {
            deploying: [],
            open: false,
            _interval: null,
            startPolling() {
                this.check();
                this._interval = setInterval(() => this.check(), 5000);
            },
            async check() {
                try {
                    const resources = await fetch('/api/v1/resources').then(r => r.ok ? r.json() : []);
                    this.deploying = resources.filter(r => r.status === 'deploying');
                } catch {}
            }
        };
    }
    </script>
</body>
</html>
