{% extends "base.html" %}
{% block title %}Team{% endblock %}

{% block content %}
<div x-data="teamPage()" x-init="load()" class="p-6 max-w-5xl space-y-6">
    <div class="flex items-end justify-between gap-4">
        <div>
            <h2 class="text-xl font-semibold text-gray-900 dark:text-white">Team</h2>
            <p class="text-sm text-gray-500 mt-1">
                Invite teammates and manage their global roles. Project-specific access is set on each project's <span class="font-medium">Members</span> tab.
            </p>
        </div>
        <button @click="showInvite = true; inviteResult = null"
                class="px-3 py-1.5 text-sm font-medium bg-blue-600 hover:bg-blue-700 text-white rounded-lg">
            + Invite user
        </button>
    </div>

    <!-- ── Users table ──────────────────────────────────────── -->
    <div class="bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-800/50 rounded-xl overflow-hidden">
        <div x-show="loading" class="p-6 text-sm text-gray-500">Loading…</div>
        <table x-show="!loading && users.length" x-cloak class="w-full text-sm">
            <thead class="bg-gray-50 dark:bg-gray-800/50 text-xs uppercase text-gray-500 dark:text-gray-400">
                <tr>
                    <th class="text-left px-4 py-2">User</th>
                    <th class="text-left px-4 py-2">Role</th>
                    <th class="text-left px-4 py-2">Status</th>
                    <th class="text-left px-4 py-2">2FA</th>
                    <th class="text-left px-4 py-2">Joined</th>
                    <th class="text-right px-4 py-2">Actions</th>
                </tr>
            </thead>
            <tbody>
                <template x-for="u in users" :key="u.id">
                    <tr class="border-t border-gray-100 dark:border-gray-800/50">
                        <td class="px-4 py-3">
                            <div class="text-gray-900 dark:text-white font-medium" x-text="u.username"></div>
                            <div class="text-xs text-gray-500" x-text="u.email"></div>
                        </td>
                        <td class="px-4 py-3">
                            <span class="inline-block px-2 py-0.5 text-xs rounded-full"
                                  :class="{
                                      'bg-purple-100 text-purple-700 dark:bg-purple-900/40 dark:text-purple-300': u.global_role === 'owner',
                                      'bg-blue-100 text-blue-700 dark:bg-blue-900/40 dark:text-blue-300': u.global_role === 'admin',
                                      'bg-gray-100 text-gray-700 dark:bg-gray-800 dark:text-gray-300': u.global_role === 'user',
                                  }"
                                  x-text="u.global_role"></span>
                        </td>
                        <td class="px-4 py-3 text-gray-600 dark:text-gray-300"
                            x-text="u.is_active ? 'Active' : 'Disabled'"></td>
                        <td class="px-4 py-3 text-gray-600 dark:text-gray-300"
                            x-text="u.has_2fa ? 'On' : '—'"></td>
                        <td class="px-4 py-3 text-xs text-gray-500" x-text="u.created_at"></td>
                        <td class="px-4 py-3 text-right space-x-1">
                            <button x-show="me && me.global_role === 'owner' && u.id !== me.id"
                                    @click="openRoleEdit(u)"
                                    class="text-xs text-gray-500 hover:text-blue-600 dark:hover:text-blue-400">Change role</button>
                            <button x-show="u.id !== (me && me.id)"
                                    @click="removeUser(u)"
                                    class="text-xs text-gray-500 hover:text-red-600 dark:hover:text-red-400">Delete</button>
                        </td>
                    </tr>
                </template>
            </tbody>
        </table>
        <div x-show="!loading && !users.length" x-cloak class="p-6 text-sm text-gray-500">
            No users yet.
        </div>
    </div>

    <!-- ── Invite modal ─────────────────────────────────────── -->
    <div x-show="showInvite" x-cloak
         class="fixed inset-0 z-40 flex items-center justify-center bg-black/40 p-4">
        <div @click.outside="showInvite = false; inviteResult = null"
             class="bg-white dark:bg-gray-900 rounded-xl shadow-2xl border border-gray-200 dark:border-gray-800 w-full max-w-md p-6 space-y-4">
            <h3 class="text-base font-semibold text-gray-900 dark:text-white">Invite user</h3>
            <template x-if="!inviteResult">
                <div class="space-y-3">
                    <div>
                        <label class="text-xs text-gray-500 dark:text-gray-400">Email</label>
                        <input type="email" x-model="inviteForm.email"
                               class="w-full px-3 py-2 mt-1 text-sm bg-gray-50 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                               placeholder="alice@example.com">
                    </div>
                    <div>
                        <label class="text-xs text-gray-500 dark:text-gray-400">Default global role</label>
                        <select x-model="inviteForm.global_role"
                                class="w-full px-3 py-2 mt-1 text-sm bg-gray-50 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-lg">
                            <option value="user">User (no system privileges)</option>
                            <option value="admin">Admin (Owner-only)</option>
                        </select>
                    </div>
                    <div>
                        <label class="text-xs text-gray-500 dark:text-gray-400">Link expires (hours)</label>
                        <input type="number" min="1" max="168" x-model.number="inviteForm.ttl_hours"
                               class="w-full px-3 py-2 mt-1 text-sm bg-gray-50 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-lg">
                    </div>
                    <div class="flex justify-end gap-2 pt-2">
                        <button @click="showInvite = false"
                                class="px-3 py-1.5 text-sm text-gray-600 dark:text-gray-300">Cancel</button>
                        <button @click="sendInvite()"
                                :disabled="inviteBusy"
                                class="px-3 py-1.5 text-sm bg-blue-600 hover:bg-blue-700 text-white rounded-lg disabled:opacity-50">
                            <span x-show="!inviteBusy">Create invite</span>
                            <span x-show="inviteBusy">Working…</span>
                        </button>
                    </div>
                </div>
            </template>
            <template x-if="inviteResult">
                <div class="space-y-3">
                    <p class="text-sm text-gray-600 dark:text-gray-300">
                        Send this one-time link to <span class="font-medium" x-text="inviteResult.email"></span>.
                        It will not be shown again.
                    </p>
                    <div class="flex items-stretch border border-gray-200 dark:border-gray-700 rounded-lg overflow-hidden">
                        <code class="flex-1 px-3 py-2 text-xs bg-gray-50 dark:bg-gray-800 overflow-x-auto whitespace-nowrap"
                              x-text="window.location.origin + inviteResult.invite_url"></code>
                        <button @click="copyText(window.location.origin + inviteResult.invite_url)"
                                class="px-3 text-xs bg-blue-600 hover:bg-blue-700 text-white">Copy</button>
                    </div>
                    <p class="text-xs text-gray-500">
                        Expires in <span x-text="inviteResult.ttl_hours"></span> hours.
                    </p>
                    <div class="flex justify-end pt-2">
                        <button @click="showInvite = false; inviteResult = null; load()"
                                class="px-3 py-1.5 text-sm bg-gray-200 dark:bg-gray-700 text-gray-700 dark:text-gray-200 rounded-lg">Done</button>
                    </div>
                </div>
            </template>
        </div>
    </div>
</div>

<script>
function teamPage() {
    return {
        loading: true,
        users: [],
        me: null,
        showInvite: false,
        inviteBusy: false,
        inviteForm: { email: '', global_role: 'user', ttl_hours: 48 },
        inviteResult: null,
        async load() {
            this.loading = true;
            try {
                const [users, me] = await Promise.all([
                    api('/api/v1/users'),
                    api('/api/v1/account/me'),
                ]);
                this.users = users;
                this.me = me;
            } catch (e) {
                toast(e.message || 'Failed to load', 'error');
            } finally {
                this.loading = false;
            }
        },
        async sendInvite() {
            if (this.inviteBusy) return;
            this.inviteBusy = true;
            try {
                this.inviteResult = await api('/api/v1/users/invite', {
                    method: 'POST',
                    body: JSON.stringify(this.inviteForm),
                });
            } catch (e) {
                toast(e.message || 'Invite failed', 'error');
            } finally {
                this.inviteBusy = false;
            }
        },
        async removeUser(u) {
            if (!confirm(`Delete ${u.username}? This cannot be undone.`)) return;
            try {
                await api(`/api/v1/users/${u.id}`, { method: 'DELETE' });
                toast('User deleted');
                await this.load();
            } catch (e) {
                toast(e.message || 'Delete failed', 'error');
            }
        },
        async openRoleEdit(u) {
            const next = prompt(`New global role for ${u.username} (owner/admin/user):`, u.global_role);
            if (!next || next === u.global_role) return;
            try {
                await api(`/api/v1/users/${u.id}/role`, {
                    method: 'PUT',
                    body: JSON.stringify({ global_role: next }),
                });
                toast('Role updated');
                await this.load();
            } catch (e) {
                toast(e.message || 'Role change failed', 'error');
            }
        },
    };
}
</script>
{% endblock %}
