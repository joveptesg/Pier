{% extends "base.html" %}
{% block title %}Peer{% endblock %}

{% block content %}
<div class="p-6 space-y-6" x-data="peerDetail('{{ peer_id }}')" x-init="init()">
    <!-- Header -->
    <div class="flex items-center justify-between">
        <div class="flex items-center gap-3">
            <a href="/peers" class="text-sm text-gray-500 hover:text-gray-700 dark:hover:text-gray-300">← Peers</a>
            <h2 class="text-xl font-semibold text-gray-900 dark:text-white" x-text="peer.name || '...'"></h2>
            <span class="inline-flex items-center gap-1.5 text-xs" :class="peer.status === 'online' ? 'text-green-600 dark:text-green-400' : 'text-gray-500'">
                <span class="w-2 h-2 rounded-full" :class="peer.status === 'online' ? 'bg-green-500' : 'bg-gray-400'"></span>
                <span x-text="peer.status || 'unknown'"></span>
            </span>
        </div>
        <div class="flex gap-2">
            <button @click="testPeer()" class="px-3 py-1.5 text-xs bg-gray-100 dark:bg-gray-800 hover:bg-gray-200 dark:hover:bg-gray-700 rounded-lg text-gray-700 dark:text-gray-300">Test</button>
            <a :href="peer.url" target="_blank" rel="noopener" class="px-3 py-1.5 text-xs bg-blue-50 dark:bg-blue-600/20 hover:bg-blue-100 dark:hover:bg-blue-600/30 rounded-lg text-blue-700 dark:text-blue-300">Open remote panel</a>
        </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-4">
        <!-- Resources on peer -->
        <div class="lg:col-span-2 bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-800/50 rounded-xl p-5">
            <h3 class="text-sm font-semibold text-gray-900 dark:text-white mb-3">Resources on this peer</h3>
            <template x-if="loadingResources"><p class="text-sm text-gray-500">Loading…</p></template>
            <template x-if="!loadingResources && resources.length === 0"><p class="text-sm text-gray-500">No resources.</p></template>
            <div class="divide-y divide-gray-100 dark:divide-gray-800/50">
                <template x-for="r in resources" :key="r.id">
                    <div class="py-3 flex items-center justify-between">
                        <div class="min-w-0">
                            <div class="text-sm font-medium text-gray-900 dark:text-white truncate" x-text="r.name || r.id"></div>
                            <div class="text-xs text-gray-500 truncate" x-text="(r.image || r.catalog_id || '') + (r.port ? ' · :' + r.port : '')"></div>
                        </div>
                        <span class="inline-flex items-center gap-1.5 text-xs" :class="r.status === 'running' ? 'text-green-600 dark:text-green-400' : 'text-gray-500'">
                            <span class="w-2 h-2 rounded-full" :class="r.status === 'running' ? 'bg-green-500' : 'bg-gray-400'"></span>
                            <span x-text="r.status || '—'"></span>
                        </span>
                    </div>
                </template>
            </div>
        </div>

        <!-- Peer info -->
        <div class="bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-800/50 rounded-xl p-5 space-y-3 text-xs">
            <div class="flex justify-between"><span class="text-gray-500">URL</span><span class="text-gray-700 dark:text-gray-300 font-mono truncate ml-2" x-text="peer.url"></span></div>
            <div class="flex justify-between"><span class="text-gray-500">Version</span><span class="text-gray-700 dark:text-gray-300" x-text="peer.remote_version || '—'"></span></div>
            <div class="flex justify-between"><span class="text-gray-500">Last heartbeat</span><span class="text-gray-700 dark:text-gray-300" x-text="peer.last_heartbeat || 'Never'"></span></div>
            <div class="flex justify-between"><span class="text-gray-500">Created</span><span class="text-gray-700 dark:text-gray-300" x-text="peer.created_at"></span></div>
            <template x-if="peer.last_error">
                <div class="bg-red-50 dark:bg-red-500/10 rounded px-2 py-1 text-red-700 dark:text-red-400" x-text="peer.last_error"></div>
            </template>
            <div class="pt-3 border-t border-gray-100 dark:border-gray-800">
                <h4 class="text-xs font-semibold text-gray-700 dark:text-gray-300 mb-2">Remote system</h4>
                <div class="flex justify-between"><span class="text-gray-500">CPU</span><span class="text-gray-700 dark:text-gray-300" x-text="(metrics.cpu_usage ?? '—') + '%'"></span></div>
                <div class="flex justify-between"><span class="text-gray-500">RAM</span><span class="text-gray-700 dark:text-gray-300" x-text="(metrics.memory_percent ?? '—') + '%'"></span></div>
                <div class="flex justify-between"><span class="text-gray-500">Hostname</span><span class="text-gray-700 dark:text-gray-300" x-text="metrics.hostname || '—'"></span></div>
                <div class="flex justify-between"><span class="text-gray-500">OS</span><span class="text-gray-700 dark:text-gray-300" x-text="metrics.os || '—'"></span></div>
            </div>
        </div>
    </div>
</div>

<script>
function peerDetail(id) {
    return {
        id, peer: {}, resources: [], metrics: {}, loadingResources: true,
        async init() {
            await this.load();
            setInterval(() => this.load(), 8000);
        },
        async load() {
            try {
                const p = await fetch('/api/v1/peers/' + this.id).then(r => r.ok ? r.json() : {});
                this.peer = p;
                if (p.status === 'online') {
                    const [resources, metrics] = await Promise.all([
                        fetch('/api/v1/peers/' + this.id + '/proxy/resources').then(r => r.ok ? r.json() : []),
                        fetch('/api/v1/peers/' + this.id + '/proxy/system/metrics').then(r => r.ok ? r.json() : {}),
                    ]);
                    this.resources = Array.isArray(resources) ? resources : [];
                    this.metrics = metrics || {};
                } else {
                    this.resources = []; this.metrics = {};
                }
            } catch {}
            this.loadingResources = false;
        },
        async testPeer() {
            try { await api('/api/v1/peers/' + this.id + '/test', { method:'POST' }); toast('Peer online'); await this.load(); }
            catch (e) { toast(e.message, 'error'); await this.load(); }
        }
    };
}
</script>
{% endblock %}
