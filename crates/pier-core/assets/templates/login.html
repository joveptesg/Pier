{% extends "auth_base.html" %}
{% block title %}{{ t('login.title') }}{% endblock %}

{% block content %}
<div class="bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-800/50 rounded-xl p-6" x-data="{
    step: 'password',
    username: '', password: '', showPw: false,
    partialToken: '', code: '',
    error: '', loading: false,

    async submitPassword() {
        this.loading = true; this.error = '';
        try {
            const data = await api('/api/v1/auth/login', {
                method: 'POST',
                body: JSON.stringify({ username: this.username, password: this.password })
            });
            if (data && data.requires_2fa) {
                this.partialToken = data.partial_token;
                this.step = 'totp';
                // Auto-focus the code input on the next tick after Alpine renders it.
                this.$nextTick(() => {
                    const el = document.getElementById('totp-code');
                    if (el) el.focus();
                });
            } else {
                window.location.href = afterLoginTarget();
            }
        } catch (e) {
            this.error = e.message || '{{ t('login.error.login_failed') }}';
        } finally {
            this.loading = false;
        }
    },

    async submitTotp() {
        this.loading = true; this.error = '';
        try {
            await api('/api/v1/auth/login/2fa', {
                method: 'POST',
                body: JSON.stringify({ partial_token: this.partialToken, code: this.code })
            });
            window.location.href = afterLoginTarget();
        } catch (e) {
            this.error = e.message || '{{ t('login.error.invalid_code') }}';
        } finally {
            this.loading = false;
        }
    },

    backToPassword() {
        this.step = 'password';
        this.code = '';
        this.partialToken = '';
        this.error = '';
    },
}">
    <h2 class="text-lg font-semibold text-gray-900 dark:text-white mb-6">
        <span x-show="step === 'password'">{{ t('login.sign_in') }}</span>
        <span x-show="step === 'totp'" x-cloak>{{ t('login.two_factor') }}</span>
    </h2>

    <!-- ── Step 1: password ────────────────────────────────── -->
    <form x-show="step === 'password'" @submit.prevent="submitPassword()" class="space-y-4">
        <div>
            <label class="block text-sm font-medium text-gray-600 dark:text-gray-400 mb-1.5">{{ t('login.username') }}</label>
            <input x-model="username" type="text" required autofocus
                   class="w-full px-3 py-2 bg-gray-50 dark:bg-gray-800 border border-gray-300 dark:border-gray-700 rounded-lg
                          text-gray-900 dark:text-gray-100
                          focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent
                          placeholder-gray-400 dark:placeholder-gray-500 text-sm"
                   placeholder="admin">
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-600 dark:text-gray-400 mb-1.5">{{ t('login.password') }}</label>
            <div class="relative">
                <input x-model="password" :type="showPw ? 'text' : 'password'" required
                       class="w-full px-3 py-2 pr-10 bg-gray-50 dark:bg-gray-800 border border-gray-300 dark:border-gray-700 rounded-lg
                              text-gray-900 dark:text-gray-100
                              focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent
                              placeholder-gray-400 dark:placeholder-gray-500 text-sm"
                       placeholder="********">
                <button type="button" @click="showPw = !showPw"
                        class="absolute right-2.5 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 dark:hover:text-gray-300 transition-colors">
                    <svg x-show="!showPw" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
                    <svg x-show="showPw" x-cloak class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/></svg>
                </button>
            </div>
        </div>

        <div x-show="error" x-cloak class="text-sm text-red-600 dark:text-red-400 bg-red-50 dark:bg-red-500/10 border border-red-200 dark:border-red-500/20 rounded-lg px-3 py-2" x-text="error"></div>

        <button type="submit" :disabled="loading"
                class="w-full py-2.5 px-4 bg-blue-600 hover:bg-blue-700 disabled:opacity-50
                       rounded-lg text-sm font-medium text-white transition-colors">
            <span x-show="!loading">{{ t('login.sign_in') }}</span>
            <span x-show="loading" x-cloak>{{ t('login.signing_in') }}</span>
        </button>
    </form>

    <!-- ── Step 2: TOTP ────────────────────────────────────── -->
    <form x-show="step === 'totp'" x-cloak @submit.prevent="submitTotp()" class="space-y-4">
        <p class="text-sm text-gray-500">
            {{ t('login.totp_hint') }}
        </p>
        <div>
            <input id="totp-code" x-model="code" type="text"
                   autocomplete="one-time-code" required
                   class="w-full px-3 py-2 bg-gray-50 dark:bg-gray-800 border border-gray-300 dark:border-gray-700 rounded-lg
                          text-gray-900 dark:text-gray-100 font-mono text-center text-lg tracking-widest
                          focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                   placeholder="123456">
        </div>

        <div x-show="error" x-cloak class="text-sm text-red-600 dark:text-red-400 bg-red-50 dark:bg-red-500/10 border border-red-200 dark:border-red-500/20 rounded-lg px-3 py-2" x-text="error"></div>

        <button type="submit" :disabled="loading || !code"
                class="w-full py-2.5 px-4 bg-blue-600 hover:bg-blue-700 disabled:opacity-50
                       rounded-lg text-sm font-medium text-white transition-colors">
            <span x-show="!loading">{{ t('login.verify') }}</span>
            <span x-show="loading" x-cloak>{{ t('login.verifying') }}</span>
        </button>
        <button type="button" @click="backToPassword()"
                class="w-full text-xs text-gray-500 hover:text-gray-700 dark:hover:text-gray-300 transition-colors">
            {{ t('login.back') }}
        </button>
    </form>
</div>

<script>
    async function api(url, opts = {}) {
        const res = await fetch(url, {
            headers: { 'Content-Type': 'application/json', ...opts.headers },
            ...opts,
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.error || '{{ t('login.error.request_failed') }}');
        return data;
    }

    // Honour `?return_to=…` from the URL so that a deep-link (e.g.
    // `/login/cli/<id>`) bounces back to itself after the session cookie is
    // set. Only same-origin relative paths are allowed — anything else falls
    // back to the dashboard to avoid an open-redirect gadget.
    function afterLoginTarget() {
        try {
            const raw = new URLSearchParams(window.location.search).get('return_to');
            if (!raw) return '/';
            const decoded = decodeURIComponent(raw);
            if (!decoded.startsWith('/') || decoded.startsWith('//') || decoded.includes('://')) {
                return '/';
            }
            return decoded;
        } catch (_) {
            return '/';
        }
    }
</script>
{% endblock %}
