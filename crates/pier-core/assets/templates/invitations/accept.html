{% extends "auth_base.html" %}
{% block title %}Accept Invitation{% endblock %}

{% block content %}
<div class="bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-800/50 rounded-xl p-6"
     x-data='inviteAccept({{ token | tojson }})' x-init="load()">

    <template x-if="loading">
        <p class="text-sm text-gray-500">Verifying invitation…</p>
    </template>

    <template x-if="!loading && invalid">
        <div class="space-y-2">
            <h2 class="text-lg font-semibold text-gray-900 dark:text-white">Invitation not valid</h2>
            <p class="text-sm text-gray-500">
                This link has expired, been used, or never existed. Ask whoever invited you to send a new one.
            </p>
            <a href="/login" class="inline-block text-sm text-blue-600 hover:underline pt-2">Back to login</a>
        </div>
    </template>

    <template x-if="!loading && !invalid && !accepted">
        <form @submit.prevent="submit()" class="space-y-4">
            <div>
                <h2 class="text-lg font-semibold text-gray-900 dark:text-white">Welcome to Pier</h2>
                <p class="text-sm text-gray-500 mt-1">
                    You were invited as <span class="font-medium" x-text="email"></span>
                    (<span x-text="default_global_role"></span>).
                    Choose a username and password to finish setting up your account.
                </p>
            </div>
            <div>
                <label class="text-xs text-gray-500 dark:text-gray-400">Username</label>
                <input type="text" required minlength="3" x-model="form.username"
                       class="w-full px-3 py-2 mt-1 text-sm bg-gray-50 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <div>
                <label class="text-xs text-gray-500 dark:text-gray-400">Password</label>
                <input type="password" required x-model="form.password"
                       class="w-full px-3 py-2 mt-1 text-sm bg-gray-50 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                <p class="text-[11px] text-gray-500 mt-1">At least 12 characters, not derived from your username or email.</p>
            </div>
            <div x-show="error" x-cloak class="text-sm text-red-600 dark:text-red-400" x-text="error"></div>
            <button type="submit" :disabled="busy"
                    class="w-full px-3 py-2 text-sm font-medium bg-blue-600 hover:bg-blue-700 text-white rounded-lg disabled:opacity-50">
                <span x-show="!busy">Create account</span>
                <span x-show="busy">Working…</span>
            </button>
        </form>
    </template>

    <template x-if="accepted">
        <div class="space-y-3">
            <h2 class="text-lg font-semibold text-gray-900 dark:text-white">Account created</h2>
            <p class="text-sm text-gray-500">
                Your account is ready. Sign in with the credentials you just chose.
            </p>
            <a href="/login" class="inline-block px-3 py-2 text-sm bg-blue-600 hover:bg-blue-700 text-white rounded-lg">
                Go to login
            </a>
        </div>
    </template>
</div>

<script>
function inviteAccept(token) {
    return {
        token,
        loading: true,
        invalid: false,
        accepted: false,
        email: '',
        default_global_role: '',
        form: { username: '', password: '' },
        busy: false,
        error: '',
        async load() {
            try {
                const data = await api(`/api/v1/invitations/${encodeURIComponent(this.token)}`);
                this.email = data.email;
                this.default_global_role = data.default_global_role;
            } catch (_) {
                this.invalid = true;
            } finally {
                this.loading = false;
            }
        },
        async submit() {
            if (this.busy) return;
            this.busy = true; this.error = '';
            try {
                await api(`/api/v1/invitations/${encodeURIComponent(this.token)}/accept`, {
                    method: 'POST',
                    body: JSON.stringify(this.form),
                });
                this.accepted = true;
            } catch (e) {
                this.error = e.message || 'Failed to accept invitation';
            } finally {
                this.busy = false;
            }
        },
    };
}
</script>
{% endblock %}
