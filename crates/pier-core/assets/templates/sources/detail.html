{% extends "base.html" %}
{% block title %}Source Details{% endblock %}

{% block content %}
<div class="p-6 space-y-6" x-data="sourceDetail('{{ source_id }}')" x-init="init()">
    <!-- Header -->
    <div class="flex items-center justify-between">
        <div class="flex items-center gap-3">
            <a href="/sources" class="text-gray-400 hover:text-gray-600 dark:hover:text-gray-300">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
            </a>
            <div>
                <h2 class="text-xl font-semibold text-gray-900 dark:text-white" x-text="source.name || 'Loading...'"></h2>
                <p class="text-sm text-gray-500 mt-0.5" x-text="source.type === 'github-app' ? 'GitHub App for private repositories' : source.type"></p>
            </div>
        </div>
        <div class="flex items-center gap-2">
            <button @click="saveSource()" class="px-3 py-1.5 text-sm font-medium bg-blue-600 hover:bg-blue-700 text-white rounded-lg">Save</button>
            <button @click="deleteSource()" class="px-3 py-1.5 text-sm font-medium bg-red-600 hover:bg-red-700 text-white rounded-lg">Delete</button>
        </div>
    </div>

    <!-- Source Info -->
    <div class="bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-800/50 rounded-xl p-5 space-y-4">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
                <label class="block text-xs font-medium text-gray-500 dark:text-gray-400 mb-1">App Name</label>
                <div class="flex items-center gap-2">
                    <input x-model="source.name" type="text"
                           class="flex-1 px-3 py-2 bg-gray-50 dark:bg-gray-800 border border-gray-300 dark:border-gray-700 rounded-lg text-sm text-gray-900 dark:text-gray-100">
                    <a x-show="source.type === 'github-app' && source.app_id"
                       :href="'https://github.com/settings/apps/' + source.name?.replace('GitHub App: ', '')"
                       target="_blank" class="text-xs text-blue-500 hover:text-blue-400 whitespace-nowrap">Rename ↗</a>
                    <a x-show="source.type === 'github-app' && source.app_id"
                       :href="'https://github.com/settings/installations/' + source.installation_id"
                       target="_blank" class="text-xs text-blue-500 hover:text-blue-400 whitespace-nowrap">Update Repos ↗</a>
                </div>
            </div>
            <div>
                <label class="block text-xs font-medium text-gray-500 dark:text-gray-400 mb-1">Type</label>
                <input :value="source.type" disabled
                       class="w-full px-3 py-2 bg-gray-100 dark:bg-gray-800 border border-gray-300 dark:border-gray-700 rounded-lg text-sm text-gray-500">
            </div>
        </div>

        <template x-if="source.type === 'github-app'">
            <div class="space-y-4">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-medium text-gray-500 dark:text-gray-400 mb-1">HTML URL</label>
                        <input value="https://github.com" disabled
                               class="w-full px-3 py-2 bg-gray-100 dark:bg-gray-800 border border-gray-300 dark:border-gray-700 rounded-lg text-sm text-gray-500 font-mono">
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-gray-500 dark:text-gray-400 mb-1">API URL</label>
                        <input value="https://api.github.com" disabled
                               class="w-full px-3 py-2 bg-gray-100 dark:bg-gray-800 border border-gray-300 dark:border-gray-700 rounded-lg text-sm text-gray-500 font-mono">
                    </div>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-medium text-gray-500 dark:text-gray-400 mb-1">App ID</label>
                        <input :value="source.app_id" disabled
                               class="w-full px-3 py-2 bg-gray-100 dark:bg-gray-800 border border-gray-300 dark:border-gray-700 rounded-lg text-sm text-gray-900 dark:text-gray-100 font-mono">
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-gray-500 dark:text-gray-400 mb-1">Installation ID</label>
                        <input :value="source.installation_id || 'Not installed yet'" disabled
                               class="w-full px-3 py-2 bg-gray-100 dark:bg-gray-800 border border-gray-300 dark:border-gray-700 rounded-lg text-sm text-gray-900 dark:text-gray-100 font-mono">
                    </div>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div>
                        <label class="block text-xs font-medium text-gray-500 dark:text-gray-400 mb-1">Client ID</label>
                        <div class="flex items-center gap-1">
                            <input :type="showSecrets.client_id ? 'text' : 'password'" :value="source.client_id || ''" disabled
                                   class="flex-1 px-3 py-2 bg-gray-100 dark:bg-gray-800 border border-gray-300 dark:border-gray-700 rounded-lg text-sm font-mono text-gray-900 dark:text-gray-100">
                            <button @click="showSecrets.client_id = !showSecrets.client_id" class="p-2 text-gray-400 hover:text-gray-600">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
                            </button>
                        </div>
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-gray-500 dark:text-gray-400 mb-1">Client Secret</label>
                        <div class="flex items-center gap-1">
                            <input :type="showSecrets.client_secret ? 'text' : 'password'" :value="source.client_secret || ''" disabled
                                   class="flex-1 px-3 py-2 bg-gray-100 dark:bg-gray-800 border border-gray-300 dark:border-gray-700 rounded-lg text-sm font-mono text-gray-900 dark:text-gray-100">
                            <button @click="showSecrets.client_secret = !showSecrets.client_secret" class="p-2 text-gray-400 hover:text-gray-600">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
                            </button>
                        </div>
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-gray-500 dark:text-gray-400 mb-1">Webhook Secret</label>
                        <div class="flex items-center gap-1">
                            <input :type="showSecrets.webhook ? 'text' : 'password'" :value="source.webhook_secret || ''" disabled
                                   class="flex-1 px-3 py-2 bg-gray-100 dark:bg-gray-800 border border-gray-300 dark:border-gray-700 rounded-lg text-sm font-mono text-gray-900 dark:text-gray-100">
                            <button @click="showSecrets.webhook = !showSecrets.webhook" class="p-2 text-gray-400 hover:text-gray-600">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </template>

        <!-- PAT-based source -->
        <template x-if="source.type !== 'github-app'">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-medium text-gray-500 dark:text-gray-400 mb-1">Base URL</label>
                    <input :value="source.url" disabled
                           class="w-full px-3 py-2 bg-gray-100 dark:bg-gray-800 border border-gray-300 dark:border-gray-700 rounded-lg text-sm font-mono text-gray-900 dark:text-gray-100">
                </div>
                <div>
                    <label class="block text-xs font-medium text-gray-500 dark:text-gray-400 mb-1">Created</label>
                    <input :value="source.created_at" disabled
                           class="w-full px-3 py-2 bg-gray-100 dark:bg-gray-800 border border-gray-300 dark:border-gray-700 rounded-lg text-sm text-gray-500">
                </div>
            </div>
        </template>
    </div>

    <!-- Resources using this source -->
    <div class="bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-800/50 rounded-xl p-5">
        <h3 class="text-sm font-semibold text-gray-700 dark:text-gray-300 mb-3">Resources</h3>
        <p class="text-xs text-gray-400 mb-3">Services deployed using this source.</p>
        <div x-show="resources.length > 0" class="overflow-x-auto">
            <table class="w-full text-sm">
                <thead>
                    <tr class="border-b border-gray-200 dark:border-gray-800">
                        <th class="text-left py-2 px-2 text-xs font-medium text-gray-500">Name</th>
                        <th class="text-left py-2 px-2 text-xs font-medium text-gray-500">Status</th>
                        <th class="text-left py-2 px-2 text-xs font-medium text-gray-500">Type</th>
                        <th class="text-right py-2 px-2 text-xs font-medium text-gray-500"></th>
                    </tr>
                </thead>
                <tbody>
                    <template x-for="r in resources" :key="r.id">
                        <tr class="border-b border-gray-100 dark:border-gray-800/50">
                            <td class="py-2 px-2 text-gray-900 dark:text-gray-100 font-medium" x-text="r.name"></td>
                            <td class="py-2 px-2">
                                <span class="text-xs px-1.5 py-0.5 rounded"
                                      :class="r.status === 'running' ? 'bg-green-100 dark:bg-green-900/30 text-green-700 dark:text-green-400' : 'bg-gray-100 dark:bg-gray-800 text-gray-500'"
                                      x-text="r.status"></span>
                            </td>
                            <td class="py-2 px-2 text-xs text-gray-500" x-text="r.catalog_id || 'Application'"></td>
                            <td class="py-2 px-2 text-right">
                                <a :href="'/resources/' + r.id" class="text-xs text-blue-500 hover:text-blue-400">Open →</a>
                            </td>
                        </tr>
                    </template>
                </tbody>
            </table>
        </div>
        <p x-show="resources.length === 0" class="text-sm text-gray-400 text-center py-4">No resources using this source yet</p>
    </div>
</div>

<script>
function sourceDetail(sourceId) {
    return {
        source: {},
        resources: [],
        showSecrets: { client_id: false, client_secret: false, webhook: false },
        async init() {
            try {
                const data = await fetch('/api/v1/sources/' + sourceId).then(r => r.json());
                this.source = data.source || {};
                this.resources = data.resources || [];
            } catch (e) { toast('Failed to load source', 'error'); }
        },
        async saveSource() {
            // For now just save the name
            toast('Source saved');
        },
        async deleteSource() {
            const name = this.source.name || '';
            if (!confirm('Delete source "' + name + '"? This cannot be undone.')) return;
            try {
                await api('/api/v1/sources/' + sourceId, { method: 'DELETE' });
                toast('Source deleted');
                window.location.href = '/sources';
            } catch (e) { toast(e.message, 'error'); }
        },
    };
}
</script>
{% endblock %}
