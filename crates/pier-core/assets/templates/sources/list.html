{% extends "base.html" %}
{% block title %}Sources{% endblock %}

{% block content %}
<div class="p-6 space-y-6" x-data="sourcesData()" x-init="init()">
    <!-- Header -->
    <div class="flex items-center justify-between">
        <div>
            <h2 class="text-xl font-semibold text-gray-900 dark:text-white">Sources</h2>
            <p class="text-sm text-gray-500 mt-0.5">Git sources for your applications</p>
        </div>
        <button @click="showAdd = true"
                class="px-4 py-2 text-sm font-medium bg-blue-600 hover:bg-blue-700 text-white rounded-lg transition-colors flex items-center gap-2">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
            Add Source
        </button>
    </div>

    <!-- Empty State -->
    <div x-show="sources.length === 0 && !loading" class="text-center py-20">
        <div class="w-16 h-16 mx-auto mb-4 bg-gray-100 dark:bg-gray-800 rounded-full flex items-center justify-center">
            <svg class="w-8 h-8 text-gray-400" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"/></svg>
        </div>
        <h3 class="text-lg font-medium text-gray-900 dark:text-white mb-1">No sources configured</h3>
        <p class="text-sm text-gray-500 max-w-sm mx-auto">Connect your Git repositories to deploy applications directly from source code.</p>
    </div>

    <!-- Sources List -->
    <div x-show="sources.length > 0" class="space-y-3">
        <template x-for="src in sources" :key="src.id">
            <div class="bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-800/50 rounded-xl p-4">
                <div class="flex items-center justify-between">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 bg-gray-100 dark:bg-gray-800 rounded-lg flex items-center justify-center">
                            <img src="/static/icons/git.svg" class="w-6 h-6" alt="Git">
                        </div>
                        <div>
                            <h4 class="text-sm font-medium text-gray-900 dark:text-white" x-text="src.name"></h4>
                            <p class="text-xs text-gray-500" x-text="src.url"></p>
                        </div>
                    </div>
                    <button @click="removeSource(src.id)" class="text-xs text-red-500 hover:text-red-700 transition-colors">Remove</button>
                </div>
            </div>
        </template>
    </div>

    <!-- Add Source Modal -->
    <div x-show="showAdd" x-cloak class="fixed inset-0 z-[9999] flex items-center justify-center bg-black/50" style="top:0;left:0" @click.self="showAdd = false">
            <div class="bg-white dark:bg-gray-900 rounded-xl shadow-xl w-full max-w-lg p-6 space-y-4">
                <h3 class="text-lg font-semibold text-gray-900 dark:text-white">Add Git Source</h3>
                <div>
                    <label class="block text-sm font-medium text-gray-600 dark:text-gray-400 mb-1">Name</label>
                    <input x-model="newSource.name" type="text" placeholder="My GitHub"
                           class="w-full px-3 py-2 bg-gray-50 dark:bg-gray-800 border border-gray-300 dark:border-gray-700 rounded-lg text-gray-900 dark:text-gray-100 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-600 dark:text-gray-400 mb-1">Type</label>
                    <select x-model="newSource.type"
                            class="w-full px-3 py-2 bg-gray-50 dark:bg-gray-800 border border-gray-300 dark:border-gray-700 rounded-lg text-gray-900 dark:text-gray-100 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                        <option value="github">GitHub (PAT)</option>
                        <option value="github-app">GitHub App</option>
                        <option value="gitlab">GitLab</option>
                        <option value="bitbucket">Bitbucket</option>
                        <option value="custom">Custom Git</option>
                    </select>
                </div>
                <!-- PAT-based sources -->
                <template x-if="newSource.type !== 'github-app'">
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-600 dark:text-gray-400 mb-1">Base URL / Organization</label>
                            <input x-model="newSource.url" type="text" placeholder="https://github.com/my-org"
                                   class="w-full px-3 py-2 bg-gray-50 dark:bg-gray-800 border border-gray-300 dark:border-gray-700 rounded-lg text-gray-900 dark:text-gray-100 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-600 dark:text-gray-400 mb-1">Access Token (optional)</label>
                            <input x-model="newSource.token" type="password" placeholder="ghp_xxxxx"
                                   class="w-full px-3 py-2 bg-gray-50 dark:bg-gray-800 border border-gray-300 dark:border-gray-700 rounded-lg text-gray-900 dark:text-gray-100 text-sm font-mono focus:outline-none focus:ring-2 focus:ring-blue-500">
                        </div>
                    </div>
                </template>
                <!-- GitHub App sources -->
                <template x-if="newSource.type === 'github-app'">
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-600 dark:text-gray-400 mb-1">App ID</label>
                            <input x-model="newSource.app_id" type="text" placeholder="123456"
                                   class="w-full px-3 py-2 bg-gray-50 dark:bg-gray-800 border border-gray-300 dark:border-gray-700 rounded-lg text-gray-900 dark:text-gray-100 text-sm font-mono focus:outline-none focus:ring-2 focus:ring-blue-500">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-600 dark:text-gray-400 mb-1">Installation ID</label>
                            <input x-model="newSource.installation_id" type="text" placeholder="78901234"
                                   class="w-full px-3 py-2 bg-gray-50 dark:bg-gray-800 border border-gray-300 dark:border-gray-700 rounded-lg text-gray-900 dark:text-gray-100 text-sm font-mono focus:outline-none focus:ring-2 focus:ring-blue-500">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-600 dark:text-gray-400 mb-1">Private Key (PEM)</label>
                            <textarea x-model="newSource.private_key" rows="4" placeholder="-----BEGIN RSA PRIVATE KEY-----&#10;..."
                                      class="w-full px-3 py-2 bg-gray-50 dark:bg-gray-800 border border-gray-300 dark:border-gray-700 rounded-lg text-gray-900 dark:text-gray-100 text-sm font-mono focus:outline-none focus:ring-2 focus:ring-blue-500 resize-none"></textarea>
                        </div>
                        <p class="text-xs text-gray-500">Create a GitHub App at github.com/settings/apps. Select repositories you want to grant access to during installation.</p>
                    </div>
                </template>
                <!-- Project binding -->
                <div>
                    <label class="block text-sm font-medium text-gray-600 dark:text-gray-400 mb-1">Project (optional)</label>
                    <select x-model="newSource.project_id"
                            class="w-full px-3 py-2 bg-gray-50 dark:bg-gray-800 border border-gray-300 dark:border-gray-700 rounded-lg text-gray-900 dark:text-gray-100 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                        <option value="">All projects</option>
                        <template x-for="p in projects" :key="p.id">
                            <option :value="p.id" x-text="p.name"></option>
                        </template>
                    </select>
                </div>
                <div class="flex justify-end gap-2 pt-2">
                    <button @click="showAdd = false" class="px-4 py-2 text-sm text-gray-600 dark:text-gray-400 hover:text-gray-900 dark:hover:text-gray-200">Cancel</button>
                    <button @click="addSource()" class="px-4 py-2 text-sm font-medium bg-blue-600 hover:bg-blue-700 text-white rounded-lg transition-colors">Save</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
function sourcesData() {
    return {
        sources: [],
        projects: [],
        loading: true,
        showAdd: false,
        newSource: { name: '', type: 'github', url: '', token: '', app_id: '', installation_id: '', private_key: '', project_id: '' },
        async init() {
            try { this.projects = await fetch('/api/v1/projects').then(r => r.json()); } catch {}
            try {
                this.sources = await fetch('/api/v1/sources').then(r => r.ok ? r.json() : []);
            } catch { this.sources = []; }
            this.loading = false;
        },
        async addSource() {
            const s = this.newSource;
            if (!s.name) { toast('Name is required', 'error'); return; }
            if (s.type === 'github-app') {
                if (!s.app_id || !s.installation_id || !s.private_key) {
                    toast('App ID, Installation ID, and Private Key are required', 'error'); return;
                }
                s.url = 'https://github.com';
            } else if (!s.url) {
                toast('URL is required', 'error'); return;
            }
            try {
                await api('/api/v1/sources', {
                    method: 'POST',
                    body: JSON.stringify(s),
                });
                toast('Source added');
                this.showAdd = false;
                this.newSource = { name: '', type: 'github', url: '', token: '', app_id: '', installation_id: '', private_key: '', project_id: '' };
                await this.init();
            } catch (e) { toast(e.message, 'error'); }
        },
        async removeSource(id) {
            if (!confirm('Remove this source?')) return;
            try {
                await api('/api/v1/sources/' + id, { method: 'DELETE' });
                toast('Source removed');
                await this.init();
            } catch (e) { toast(e.message, 'error'); }
        }
    };
}
</script>
{% endblock %}
