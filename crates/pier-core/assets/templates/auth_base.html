<!DOCTYPE html>
<html lang="en" :class="{ 'dark': dark }" x-data="{ dark: localStorage.getItem('pier-theme') !== 'light' }" x-init="$watch('dark', v => localStorage.setItem('pier-theme', v ? 'dark' : 'light'))">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Pier{% endblock %}</title>
    <link rel="icon" type="image/png" sizes="32x32" href="/static/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/static/favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/static/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/static/android-chrome-192x192.png">
    <link rel="stylesheet" href="/static/tailwind.css">
    <script src="/static/alpine.min.js" defer></script>
    <style>[x-cloak] { display: none !important; }</style>
</head>
<body class="bg-gray-100 dark:bg-gray-950 text-gray-900 dark:text-gray-100 min-h-screen flex flex-col transition-colors">

    <!-- Header -->
    <header class="flex items-center justify-between px-6 py-4">
        <div class="flex items-center gap-3">
            <img src="/static/apple-touch-icon.png" alt="" width="36" height="36" class="w-9 h-9 rounded-lg">
            <span class="text-xl tracking-wide text-gray-900 dark:text-white" style="font-family: 'Allerta Stencil', sans-serif;">
                [ PIER ]
            </span>
        </div>
        <div class="flex items-center gap-3">
            <!-- Language switcher -->
            <div x-data="{ open: false, cur: '{{ current_locale() }}' }" class="relative">
                <button @click="open = !open" type="button" aria-label="Language"
                        class="p-2 rounded-lg text-gray-400 hover:text-gray-600 dark:hover:text-gray-300 hover:bg-gray-200 dark:hover:bg-gray-800 transition-colors">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.657 0 3-4.03 3-9s-1.343-9-3-9m0 18c-1.657 0-3-4.03-3-9s1.343-9 3-9m-9 9a9 9 0 019-9"/></svg>
                </button>
                <div x-show="open" x-cloak @click.away="open = false"
                     class="absolute right-0 mt-2 w-44 bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl shadow-xl overflow-hidden z-50">
                    <template x-for="lang in [{ c: 'en', n: 'English' }, { c: 'es', n: 'Español' }, { c: 'zh-CN', n: '中文' }]" :key="lang.c">
                        <button type="button"
                                @click="document.cookie = 'pier_locale=' + lang.c + ';Path=/;Max-Age=31536000;SameSite=Lax'; location.reload()"
                                class="w-full flex items-center justify-between px-4 py-2 text-sm hover:bg-gray-50 dark:hover:bg-gray-700/50"
                                :class="lang.c === cur ? 'text-blue-600 dark:text-blue-400 font-medium' : 'text-gray-700 dark:text-gray-300'">
                            <span x-text="lang.n"></span>
                            <svg x-show="lang.c === cur" class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
                        </button>
                    </template>
                </div>
            </div>
            <button @click="dark = !dark"
                    class="p-2 rounded-lg text-gray-400 hover:text-gray-600 dark:hover:text-gray-300 hover:bg-gray-200 dark:hover:bg-gray-800 transition-colors">
                <template x-if="dark">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
                </template>
                <template x-if="!dark">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>
                </template>
            </button>
        </div>
    </header>

    <!-- Content -->
    <div class="flex-1 flex items-center justify-center">
        <div class="w-full max-w-md px-4">
            <div class="text-center mb-8">
                <p class="text-sm text-gray-500">{{ t('auth.tagline') }}</p>
            </div>

            {% block content %}{% endblock %}
        </div>
    </div>
</body>
</html>
