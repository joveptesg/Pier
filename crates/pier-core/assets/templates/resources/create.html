{% extends "base.html" %}
{% block title %}Deploy Resource{% endblock %}

{% block content %}
<div class="p-6 space-y-6" x-data="createResource('{{ catalog_id }}', {{ host_total_ram_gb }})" x-init="init()">
    <!-- Header -->
    <div class="flex items-center gap-3">
        <a href="/resources/new" class="text-gray-400 hover:text-gray-600 dark:hover:text-gray-300 transition-colors">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
        </a>
        <div>
            <h2 class="text-xl font-semibold text-gray-900 dark:text-white">
                Deploy <span x-text="template.name || 'Loading...'"></span>
            </h2>
            <p class="text-sm text-gray-500 mt-0.5" x-text="template.description || ''"></p>
        </div>
    </div>

    <!-- Loading -->
    <div x-show="loading" class="text-center py-12 text-gray-500">Loading template...</div>

    <!-- Form -->
    <div x-show="!loading" class="bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-800/50 rounded-xl p-6 max-w-2xl">
        <div class="space-y-4">
            <!-- Service Name (first field, visible for all non-git-github-app types) -->
            <template x-if="catalogId !== 'git-github-app'">
                <div>
                    <label class="block text-sm font-medium text-gray-600 dark:text-gray-400 mb-1">Service Name</label>
                    <input x-model="form.name" type="text" :placeholder="(template.name || 'service') + '-xxxxx'"
                           class="w-full px-3 py-2 bg-gray-50 dark:bg-gray-800 border border-gray-300 dark:border-gray-700 rounded-lg
                                  text-gray-900 dark:text-gray-100 focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm">
                    <p class="text-xs text-gray-400 mt-0.5">Name used for the container and stack</p>
                </div>
            </template>

            <!-- Railpack: general info callout (always shown when railpack selected) -->
            <template x-if="catalogId === 'railpack'">
                <div class="bg-amber-50 dark:bg-amber-900/20 border border-amber-200 dark:border-amber-800/30 rounded-lg p-3 space-y-1">
                    <p class="text-sm font-medium text-amber-800 dark:text-amber-200">First build may take 1–10 minutes</p>
                    <p class="text-xs text-amber-700 dark:text-amber-300 leading-relaxed">
                        Railpack downloads dependencies and compiles your project from source. Peak RAM usage:
                        Node ~3 GB, Python ~4 GB, Rust ~8 GB. The buildkit container holds layer cache between
                        builds so subsequent deploys are much faster.
                    </p>
                </div>
            </template>

            <!-- Railpack: hard warning when host RAM is below the recommended 4 GB -->
            <template x-if="catalogId === 'railpack' && hostRamGb > 0 && hostRamGb < 4">
                <div class="bg-red-50 dark:bg-red-900/20 border border-red-300 dark:border-red-800/40 rounded-lg p-3 space-y-1.5">
                    <p class="text-sm font-semibold text-red-800 dark:text-red-200">
                        ⚠ Your server has only <span x-text="hostRamGb"></span> GB RAM
                    </p>
                    <p class="text-xs text-red-700 dark:text-red-300 leading-relaxed">
                        Railpack builds will likely fail with out-of-memory errors on this host. Recommended:
                        <strong>4 GB+ RAM</strong> (8 GB for Rust projects). Lighter alternatives that work fine
                        on small VPS: <a href="/resources/new/dockerfile" class="underline hover:no-underline">Dockerfile</a>,
                        <a href="/resources/new/docker-image" class="underline hover:no-underline">Docker Image</a>, or
                        <a href="/resources/new/docker-compose" class="underline hover:no-underline">Docker Compose</a>.
                    </p>
                </div>
            </template>

            <!-- Railpack: optional GitHub App repo picker (auto-fills git_url + branch below) -->
            <template x-if="catalogId === 'railpack'">
                <div class="space-y-2 bg-gray-50 dark:bg-gray-800/40 border border-gray-200 dark:border-gray-800 rounded-lg p-3">
                    <p class="text-xs font-medium text-gray-700 dark:text-gray-300">Pick from a connected GitHub App <span class="font-normal text-gray-400">(optional — leave blank for public repos)</span></p>
                    <div>
                        <label class="block text-[11px] text-gray-500 dark:text-gray-400 mb-1">GitHub App source</label>
                        <div class="flex gap-2">
                            <select x-model="sourceId"
                                    class="flex-1 px-3 py-2 bg-white dark:bg-gray-900 border border-gray-300 dark:border-gray-700 rounded-lg text-gray-900 dark:text-gray-100 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                                <option value="">— None (public repo, or paste URL below) —</option>
                                <template x-for="src in sources" :key="src.id">
                                    <option :value="src.id" x-text="src.name"></option>
                                </template>
                            </select>
                            <a href="/sources" class="px-3 py-2 text-xs bg-gray-200 dark:bg-gray-700 hover:bg-gray-300 dark:hover:bg-gray-600 text-gray-600 dark:text-gray-300 rounded-lg whitespace-nowrap flex items-center">+ Add</a>
                        </div>
                        <p x-show="sources.length === 0" class="text-[11px] text-gray-400 mt-1">
                            No GitHub App sources configured. <a href="/sources" class="underline">Connect one</a> to deploy private repos.
                        </p>
                    </div>
                    <div x-show="sourceId">
                        <label class="block text-[11px] text-gray-500 dark:text-gray-400 mb-1">Repository</label>
                        <select x-model="selectedRepo" @change="onRepoSelected()"
                                class="w-full px-3 py-2 bg-white dark:bg-gray-900 border border-gray-300 dark:border-gray-700 rounded-lg text-gray-900 dark:text-gray-100 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                            <option value="">Select a repository...</option>
                            <template x-for="repo in sourceRepos" :key="repo.full_name">
                                <option :value="repo.full_name" x-text="repo.full_name + (repo.is_private ? ' (private)' : '')"></option>
                            </template>
                        </select>
                        <p x-show="loadingRepos" class="text-[11px] text-gray-400 mt-1">Loading repositories...</p>
                        <p x-show="!loadingRepos && selectedRepo" class="text-[11px] text-green-600 dark:text-green-400 mt-1">URL and branch filled below — adjust port / start command as needed.</p>
                    </div>
                </div>
            </template>

            <!-- Dynamic fields from catalog template (hidden for git-github-app — wizard handles it) -->
            <template x-for="field in (catalogId === 'git-github-app' ? [] : (template.fields || []).filter(f => f.key !== 'name'))" :key="field.key">
                <div x-show="!isFieldHidden(field)">
                    <label class="block text-sm font-medium text-gray-600 dark:text-gray-400 mb-1" x-text="field.label"></label>

                    <!-- Text input -->
                    <template x-if="field.type === 'text'">
                        <input :type="'text'" x-model="form[field.key]"
                               :placeholder="field.placeholder || ''"
                               :required="field.required"
                               class="w-full px-3 py-2 bg-gray-50 dark:bg-gray-800 border border-gray-300 dark:border-gray-700 rounded-lg
                                      text-gray-900 dark:text-gray-100 focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm">
                    </template>

                    <!-- Number input -->
                    <template x-if="field.type === 'number'">
                        <input type="number" x-model="form[field.key]"
                               :placeholder="field.placeholder || ''"
                               class="w-full px-3 py-2 bg-gray-50 dark:bg-gray-800 border border-gray-300 dark:border-gray-700 rounded-lg
                                      text-gray-900 dark:text-gray-100 focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm">
                    </template>

                    <!-- Password input -->
                    <template x-if="field.type === 'password'">
                        <div class="flex gap-2">
                            <input type="text" x-model="form[field.key]"
                                   :placeholder="field.auto_generate ? 'Auto-generated if empty' : ''"
                                   class="flex-1 px-3 py-2 bg-gray-50 dark:bg-gray-800 border border-gray-300 dark:border-gray-700 rounded-lg
                                          text-gray-900 dark:text-gray-100 focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm font-mono">
                            <button x-show="field.auto_generate" type="button"
                                    @click="form[field.key] = generatePwd()"
                                    class="px-3 py-2 text-xs font-medium bg-gray-200 dark:bg-gray-700 hover:bg-gray-300 dark:hover:bg-gray-600
                                           rounded-lg text-gray-600 dark:text-gray-300 transition-colors whitespace-nowrap">
                                Generate
                            </button>
                        </div>
                    </template>

                    <!-- Select input -->
                    <template x-if="field.type === 'select'">
                        <select x-model="form[field.key]"
                                class="w-full px-3 py-2 bg-gray-50 dark:bg-gray-800 border border-gray-300 dark:border-gray-700 rounded-lg
                                       text-gray-900 dark:text-gray-100 focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm">
                            <template x-for="opt in field.options || []" :key="opt">
                                <option :value="opt" x-text="opt" :selected="opt === field.default"></option>
                            </template>
                        </select>
                    </template>

                    <!-- Textarea input -->
                    <template x-if="field.type === 'textarea'">
                        <textarea x-model="form[field.key]"
                                  :placeholder="field.placeholder || ''"
                                  :rows="field.key === 'deploy_key' ? 6 : 10"
                                  class="w-full px-3 py-2 bg-gray-50 dark:bg-gray-800 border border-gray-300 dark:border-gray-700 rounded-lg
                                         text-gray-900 dark:text-gray-100 focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm font-mono"></textarea>
                    </template>

                    <!-- Railpack-specific per-field hints -->
                    <template x-if="catalogId === 'railpack' && field.key === 'start_cmd'">
                        <p class="text-xs text-gray-500 dark:text-gray-400 mt-1">
                            Leave empty to let Railpack auto-detect from your project (e.g. <code>npm start</code> for Node,
                            <code>python app.py</code> for Python). Override only if you need a custom entry point.
                        </p>
                    </template>
                    <template x-if="catalogId === 'railpack' && field.key === 'env_vars'">
                        <p class="text-xs text-gray-500 dark:text-gray-400 mt-1">
                            One <code>KEY=VALUE</code> per line. Available during <em>build</em> only — for runtime env
                            use the Environment tab after the service is created. Comments (<code>#</code>) and blank lines are ignored.
                        </p>
                    </template>
                </div>
            </template>

            <!-- Deployment Mode (Standalone / Cluster) -->
            <template x-if="template.cluster && template.cluster.supported">
                <div class="space-y-4 pt-2 border-t border-gray-200 dark:border-gray-800">
                    <div>
                        <label class="block text-sm font-medium text-gray-600 dark:text-gray-400 mb-2">Deployment Mode</label>
                        <div class="flex gap-2">
                            <button type="button" @click="deploymentMode = 'standalone'"
                                    :class="deploymentMode === 'standalone'
                                        ? 'bg-blue-600 text-white border-blue-600'
                                        : 'bg-gray-50 dark:bg-gray-800 text-gray-700 dark:text-gray-300 border-gray-300 dark:border-gray-700 hover:border-gray-400'"
                                    class="flex-1 px-4 py-2.5 text-sm font-medium border rounded-lg transition-colors">
                                Standalone
                            </button>
                            <button type="button"
                                    @click="clusterAvailable && (deploymentMode = 'cluster')"
                                    :disabled="!clusterAvailable"
                                    :class="deploymentMode === 'cluster'
                                        ? 'bg-blue-600 text-white border-blue-600'
                                        : clusterAvailable
                                            ? 'bg-gray-50 dark:bg-gray-800 text-gray-700 dark:text-gray-300 border-gray-300 dark:border-gray-700 hover:border-gray-400'
                                            : 'bg-gray-100 dark:bg-gray-800/50 text-gray-400 dark:text-gray-600 border-gray-200 dark:border-gray-800 cursor-not-allowed'"
                                    class="flex-1 px-4 py-2.5 text-sm font-medium border rounded-lg transition-colors">
                                Cluster
                            </button>
                        </div>
                        <p x-show="!clusterAvailable" class="text-xs text-amber-600 dark:text-amber-400 mt-1.5">
                            Add remote servers to enable cluster mode
                        </p>
                    </div>

                    <!-- Cluster options (visible when cluster selected) -->
                    <template x-if="deploymentMode === 'cluster'">
                        <div class="space-y-4">
                            <!-- Node count -->
                            <div>
                                <label class="block text-sm font-medium text-gray-600 dark:text-gray-400 mb-1">
                                    Number of Nodes
                                    <span class="text-xs text-gray-400 font-normal"
                                          x-text="'(' + template.cluster.min_nodes + '-' + template.cluster.max_nodes + ')'"></span>
                                </label>
                                <select x-model.number="nodeCount"
                                        class="w-full px-3 py-2 bg-gray-50 dark:bg-gray-800 border border-gray-300 dark:border-gray-700 rounded-lg
                                               text-gray-900 dark:text-gray-100 focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm">
                                    <template x-for="n in nodeCountOptions" :key="n">
                                        <option :value="n" x-text="n + ' nodes'" :selected="n === nodeCount"></option>
                                    </template>
                                </select>
                            </div>

                            <!-- Node distribution -->
                            <div>
                                <label class="block text-sm font-medium text-gray-600 dark:text-gray-400 mb-2">Node Distribution</label>
                                <div class="space-y-2">
                                    <template x-for="(nd, idx) in nodeDistribution" :key="idx">
                                        <div class="flex items-center gap-3 bg-gray-50 dark:bg-gray-800 rounded-lg px-3 py-2">
                                            <div class="flex items-center gap-2 min-w-[140px]">
                                                <span class="w-6 h-6 rounded-full text-xs font-medium flex items-center justify-center"
                                                      :class="idx === 0 ? 'bg-blue-100 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400' : 'bg-gray-200 dark:bg-gray-700 text-gray-600 dark:text-gray-400'"
                                                      x-text="idx + 1"></span>
                                                <span class="text-sm text-gray-700 dark:text-gray-300" x-text="idx === 0 ? 'Primary' : 'Replica ' + idx"></span>
                                            </div>
                                            <select x-model="nd.server_id"
                                                    class="flex-1 px-2 py-1.5 bg-white dark:bg-gray-900 border border-gray-300 dark:border-gray-700 rounded-md
                                                           text-gray-900 dark:text-gray-100 focus:outline-none focus:ring-1 focus:ring-blue-500 text-sm">
                                                <template x-for="srv in servers" :key="srv.id">
                                                    <option :value="srv.id" x-text="srv.name + (srv.is_local ? ' (local)' : '')"></option>
                                                </template>
                                            </select>
                                        </div>
                                    </template>
                                </div>
                            </div>

                            <!-- Cluster info -->
                            <div class="bg-blue-50 dark:bg-blue-900/20 border border-blue-200 dark:border-blue-800/30 rounded-lg p-3">
                                <p class="text-xs text-blue-700 dark:text-blue-300" x-text="template.cluster.description"></p>
                            </div>
                        </div>
                    </template>
                </div>
            </template>

            <!-- GitHub App Wizard (shown only for git-github-app) -->
            <template x-if="catalogId === 'git-github-app'">
                <div class="space-y-4">
                    <!-- Step 1: Select GitHub App Source -->
                    <div>
                        <label class="block text-sm font-medium text-gray-600 dark:text-gray-400 mb-1">Select a GitHub App</label>
                        <div class="flex gap-2">
                            <select x-model="sourceId"
                                    class="flex-1 px-3 py-2 bg-gray-50 dark:bg-gray-800 border border-gray-300 dark:border-gray-700 rounded-lg text-gray-900 dark:text-gray-100 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                                <option value="">Select a GitHub App source...</option>
                                <template x-for="src in sources" :key="src.id">
                                    <option :value="src.id" x-text="src.name"></option>
                                </template>
                            </select>
                            <a href="/sources" class="px-3 py-2 text-xs bg-gray-200 dark:bg-gray-700 hover:bg-gray-300 dark:hover:bg-gray-600 text-gray-600 dark:text-gray-300 rounded-lg whitespace-nowrap flex items-center">+ Add</a>
                        </div>
                        <p x-show="sources.length === 0" class="text-xs text-amber-600 dark:text-amber-400 mt-1">
                            No GitHub App sources. <a href="/sources" class="underline">Connect one first</a>.
                        </p>
                    </div>

                    <!-- Step 2: Select Repository (picker OR manual URL) -->
                    <div x-show="sourceId">
                        <div class="flex items-center justify-between mb-1">
                            <label class="block text-sm font-medium text-gray-600 dark:text-gray-400">Repository</label>
                            <div class="inline-flex rounded-lg border border-gray-300 dark:border-gray-700 p-0.5 bg-gray-50 dark:bg-gray-800">
                                <button type="button" @click="repoInputMode = 'pick'"
                                        :class="repoInputMode === 'pick' ? 'bg-white dark:bg-gray-900 text-gray-900 dark:text-gray-100 shadow-sm' : 'text-gray-500 dark:text-gray-400'"
                                        class="px-2.5 py-0.5 text-[11px] font-medium rounded-md transition-colors">
                                    Pick from list
                                </button>
                                <button type="button" @click="repoInputMode = 'manual'"
                                        :class="repoInputMode === 'manual' ? 'bg-white dark:bg-gray-900 text-gray-900 dark:text-gray-100 shadow-sm' : 'text-gray-500 dark:text-gray-400'"
                                        class="px-2.5 py-0.5 text-[11px] font-medium rounded-md transition-colors">
                                    Enter URL manually
                                </button>
                            </div>
                        </div>

                        <!-- Picker mode -->
                        <div x-show="repoInputMode === 'pick'">
                            <select x-model="selectedRepo" @change="onRepoSelected()"
                                    class="w-full px-3 py-2 bg-gray-50 dark:bg-gray-800 border border-gray-300 dark:border-gray-700 rounded-lg text-gray-900 dark:text-gray-100 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                                <option value="">Select a repository...</option>
                                <template x-for="repo in sourceRepos" :key="repo.full_name">
                                    <option :value="repo.full_name"
                                            :disabled="deployedRepos.has(repo.full_name)"
                                            :style="deployedRepos.has(repo.full_name) ? 'color:#999' : ''"
                                            x-text="repo.full_name + (repo.is_private ? ' (private)' : '') + (deployedRepos.has(repo.full_name) ? ' — already deployed' : '')"></option>
                                </template>
                            </select>
                            <p x-show="loadingRepos" class="text-xs text-gray-400 mt-1">Loading repositories...</p>
                            <p x-show="deployedRepos.size > 0 && !loadingRepos" class="text-[11px] text-gray-400 mt-1" x-text="deployedRepos.size + ' repository(ies) already deployed on this Pier — dimmed above.'"></p>
                            <a x-show="sourceId && !loadingRepos" :href="'https://github.com/apps/' + sources.find(s=>s.id===sourceId)?.name?.replace('GitHub App: ','') + '/installations/new'" target="_blank"
                               class="text-xs text-blue-500 hover:text-blue-400 mt-1 inline-block">Change Repositories on GitHub ↗</a>
                        </div>

                        <!-- Manual URL mode -->
                        <div x-show="repoInputMode === 'manual'">
                            <input x-model="form.git_url" @input="onManualUrlInput()" @blur="onManualUrlBlur()" type="text"
                                   placeholder="https://github.com/user/repo"
                                   class="w-full px-3 py-2 bg-gray-50 dark:bg-gray-800 border border-gray-300 dark:border-gray-700 rounded-lg text-gray-900 dark:text-gray-100 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                            <p class="text-[11px] text-gray-500 dark:text-gray-400 mt-1">Must be a repository your GitHub App installation can access. Authentication uses the selected source above.</p>
                            <p x-show="manualUrlError" x-cloak class="text-[11px] text-red-500 mt-1" x-text="manualUrlError"></p>
                        </div>
                    </div>

                    <!-- Step 3: Configuration (compact 2-column grid) -->
                    <div x-show="isRepoReady" class="space-y-3 pt-3 border-t border-gray-200 dark:border-gray-800">
                        <h4 class="text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider">Configuration</h4>
                        <div class="grid grid-cols-2 gap-3">
                            <div>
                                <label class="block text-xs font-medium text-gray-500 dark:text-gray-400 mb-0.5">Branch</label>
                                <select x-show="repoBranches.length > 0" x-model="form.branch"
                                        class="w-full px-2.5 py-1.5 bg-gray-50 dark:bg-gray-800 border border-gray-300 dark:border-gray-700 rounded-lg text-gray-900 dark:text-gray-100 text-sm focus:ring-2 focus:ring-blue-500">
                                    <template x-for="b in repoBranches" :key="b">
                                        <option :value="b" x-text="b"></option>
                                    </template>
                                </select>
                                <input x-show="repoInputMode === 'manual' && repoBranches.length === 0" x-model="form.branch" type="text"
                                       placeholder="main"
                                       class="w-full px-2.5 py-1.5 bg-gray-50 dark:bg-gray-800 border border-gray-300 dark:border-gray-700 rounded-lg text-gray-900 dark:text-gray-100 text-sm focus:ring-2 focus:ring-blue-500">
                                <p x-show="loadingBranches" class="text-[10px] text-gray-400 mt-0.5">Loading branches...</p>
                            </div>
                            <div>
                                <label class="block text-xs font-medium text-gray-500 dark:text-gray-400 mb-0.5">Build Pack</label>
                                <select x-model="form.build_pack"
                                        class="w-full px-2.5 py-1.5 bg-gray-50 dark:bg-gray-800 border border-gray-300 dark:border-gray-700 rounded-lg text-gray-900 dark:text-gray-100 text-sm focus:ring-2 focus:ring-blue-500">
                                    <option value="dockerfile">Dockerfile</option>
                                    <option value="docker-compose">Docker Compose</option>
                                    <option value="railpack">Railpack (Auto-build)</option>
                                </select>
                            </div>
                            <div x-show="form.build_pack === 'dockerfile'">
                                <label class="block text-xs font-medium text-gray-500 dark:text-gray-400 mb-0.5">Dockerfile Path</label>
                                <input x-model="form.build_path" type="text" placeholder="/Dockerfile"
                                       class="w-full px-2.5 py-1.5 bg-gray-50 dark:bg-gray-800 border border-gray-300 dark:border-gray-700 rounded-lg text-gray-900 dark:text-gray-100 text-sm focus:ring-2 focus:ring-blue-500">
                            </div>
                            <div x-show="form.build_pack === 'docker-compose'">
                                <label class="block text-xs font-medium text-gray-500 dark:text-gray-400 mb-0.5">Compose Location</label>
                                <input x-model="form.compose_path" type="text" placeholder="/docker-compose.yml"
                                       class="w-full px-2.5 py-1.5 bg-gray-50 dark:bg-gray-800 border border-gray-300 dark:border-gray-700 rounded-lg text-gray-900 dark:text-gray-100 text-sm focus:ring-2 focus:ring-blue-500">
                            </div>
                            <div x-show="form.build_pack !== 'docker-compose'">
                                <label class="block text-xs font-medium text-gray-500 dark:text-gray-400 mb-0.5">Port</label>
                                <input x-model="form.port" type="number" placeholder="3000"
                                       class="w-full px-2.5 py-1.5 bg-gray-50 dark:bg-gray-800 border border-gray-300 dark:border-gray-700 rounded-lg text-gray-900 dark:text-gray-100 text-sm focus:ring-2 focus:ring-blue-500">
                            </div>
                            <div x-show="form.build_pack === 'railpack'" class="col-span-2 -mt-1">
                                <p class="text-[11px] text-amber-700 dark:text-amber-400 bg-amber-50 dark:bg-amber-900/20 border border-amber-200 dark:border-amber-800/40 rounded-md px-2 py-1.5">
                                    Railpack auto-detects the language and start command. First build can take 1-10 minutes and needs ~4 GB RAM (8 GB for Rust). For overrides (start command / build-time env vars), use the standalone Railpack template.
                                </p>
                            </div>
                            <div>
                                <label class="block text-xs font-medium text-gray-500 dark:text-gray-400 mb-0.5">Service Name</label>
                                <input x-model="form.name" type="text" :placeholder="repoNamePlaceholder()"
                                       class="w-full px-2.5 py-1.5 bg-gray-50 dark:bg-gray-800 border border-gray-300 dark:border-gray-700 rounded-lg text-gray-900 dark:text-gray-100 text-sm focus:ring-2 focus:ring-blue-500">
                            </div>
                        </div>
                    </div>
                </div>
            </template>

            <!-- Project selector (optional) -->
            <div>
                <label class="block text-sm font-medium text-gray-600 dark:text-gray-400 mb-1">Project (optional)</label>
                <select x-model="projectId"
                        class="w-full px-3 py-2 bg-gray-50 dark:bg-gray-800 border border-gray-300 dark:border-gray-700 rounded-lg
                               text-gray-900 dark:text-gray-100 focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm">
                    <option value="">No project</option>
                    <template x-for="p in projects" :key="p.id">
                        <option :value="p.id" x-text="p.name"></option>
                    </template>
                </select>
            </div>

            <!-- Network selector -->
            <div>
                <label class="block text-sm font-medium text-gray-600 dark:text-gray-400 mb-1">Network</label>
                <select x-model="networkId"
                        class="w-full px-3 py-2 bg-gray-50 dark:bg-gray-800 border border-gray-300 dark:border-gray-700 rounded-lg
                               text-gray-900 dark:text-gray-100 focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm">
                    <template x-for="n in networks" :key="n.id">
                        <option :value="n.id" x-text="n.name + (n.is_default ? ' (default)' : '')"></option>
                    </template>
                </select>
            </div>

            <!-- Target Server selector (only show when multiple servers exist) -->
            <div x-show="servers.length > 1">
                <label class="block text-sm font-medium text-gray-600 dark:text-gray-400 mb-1">Target Server</label>
                <select x-model="serverId"
                        class="w-full px-3 py-2 bg-gray-50 dark:bg-gray-800 border border-gray-300 dark:border-gray-700 rounded-lg
                               text-gray-900 dark:text-gray-100 focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm">
                    <template x-for="s in servers" :key="s.id">
                        <option :value="s.id" x-text="s.name + ' (' + s.host + ')' + (s.is_local ? ' — local' : '') + (s.status !== 'online' ? ' [offline]' : '')"></option>
                    </template>
                </select>
                <p class="text-xs text-gray-400 mt-0.5">Server where the resource will be deployed</p>
            </div>
        </div>

        <!-- Actions -->
        <div class="flex items-center justify-between mt-6 pt-4 border-t border-gray-200 dark:border-gray-800">
            <a href="/resources/new" class="text-sm text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-200 transition-colors">
                Cancel
            </a>
            <button @click="deploy()" :disabled="deploying"
                    class="px-5 py-2 text-sm font-medium bg-blue-600 hover:bg-blue-700 disabled:opacity-50 disabled:cursor-not-allowed
                           rounded-lg text-white transition-colors flex items-center gap-2">
                <svg x-show="deploying" class="w-4 h-4 spinner" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
                <span x-text="deploying ? 'Creating...' : (catalogId === 'git-github-app' ? 'Continue' : (deploymentMode === 'cluster' ? 'Deploy Cluster' : 'Deploy'))"></span>
            </button>
        </div>
    </div>
</div>

<script>
function createResource(catalogId, hostRamGb) {
    return {
        catalogId,
        hostRamGb,
        template: {},
        form: {},
        projects: [],
        servers: [],
        sources: [],
        sourceRepos: [],
        repoBranches: [],
        selectedRepo: '',
        loadingBranches: false,
        deployedRepos: new Set(),
        networks: [],
        projectId: '',
        networkId: '',
        serverId: 'local',
        sourceId: '',
        loadingRepos: false,
        repoInputMode: 'pick',
        manualUrlError: '',
        loading: true,
        deploying: false,
        deploymentMode: 'standalone',
        nodeCount: 3,
        nodeDistribution: [],
        clusterAvailable: false,
        get nodeCountOptions() {
            if (!this.template.cluster) return [];
            const opts = [];
            for (let i = this.template.cluster.min_nodes; i <= this.template.cluster.max_nodes; i++) opts.push(i);
            return opts;
        },
        async init() {
            try {
                const fetches = [
                    fetch('/api/v1/catalog/' + this.catalogId).then(r => r.json()),
                    fetch('/api/v1/projects').then(r => r.json()),
                    fetch('/api/v1/servers').then(r => r.json()),
                    fetch('/api/v1/networks').then(r => r.json()),
                ];
                if (this.catalogId === 'git-github-app' || this.catalogId === 'railpack') {
                    fetches.push(fetch('/api/v1/sources').then(r => r.json()));
                    fetches.push(fetch('/api/v1/resources').then(r => r.json()));
                }
                const results = await Promise.all(fetches);
                const [tmpl, projs, srvs, nets, srcs, resources] = results;
                this.template = tmpl;
                this.projects = projs;
                this.servers = srvs;
                this.networks = nets || [];
                // Pre-select project from ?project_id=... AFTER this.projects is set,
                // so the <option> x-for has rendered and <select> can snap to the value.
                const requestedProjectId = new URLSearchParams(location.search).get('project_id') || '';
                if (requestedProjectId && this.projects.some(p => String(p.id) === requestedProjectId)) {
                    this.projectId = requestedProjectId;
                }
                // Collect already-deployed git repositories (by "owner/repo" full_name).
                if (Array.isArray(resources)) {
                    const set = new Set();
                    for (const r of resources) {
                        const url = r.git_repo_url;
                        if (!url) continue;
                        // Normalise "https://github.com/owner/repo(.git)" → "owner/repo"
                        const m = url.match(/github\.com[\/:]([^\/]+)\/([^\/\.]+)(?:\.git)?\/?$/i);
                        if (m) set.add(`${m[1]}/${m[2]}`);
                    }
                    this.deployedRepos = set;
                }
                // Pre-select default network
                const defaultNet = this.networks.find(n => n.is_default);
                if (defaultNet) this.networkId = defaultNet.id;
                if (srcs) this.sources = srcs.filter(s => s.type === 'github-app');

                // Cluster is available if there are 2+ servers (localhost + at least 1 remote)
                this.clusterAvailable = srvs.length >= 2;

                // Set default node count from catalog
                if (tmpl.cluster && tmpl.cluster.default_nodes) {
                    this.nodeCount = tmpl.cluster.default_nodes;
                }

                // Set default values
                for (const field of tmpl.fields || []) {
                    if (field.default) {
                        this.form[field.key] = field.default;
                    } else {
                        this.form[field.key] = '';
                    }
                }

                // Auto-generate service name
                this.form.name = this.generateName();

                // Watch node count to rebuild distribution
                this.$watch('nodeCount', () => this.rebuildDistribution());
                this.$watch('deploymentMode', () => {
                    if (this.deploymentMode === 'cluster') this.rebuildDistribution();
                });

                // Watch source selection to load repos
                this.$watch('sourceId', async () => {
                    this.sourceRepos = [];
                    this.selectedRepo = '';
                    this.repoBranches = [];
                    if (this.sourceId) {
                        this.loadingRepos = true;
                        try {
                            this.sourceRepos = await fetch('/api/v1/sources/' + this.sourceId + '/repos').then(r => r.ok ? r.json() : []);
                        } catch { this.sourceRepos = []; }
                        this.loadingRepos = false;
                    }
                });

                // Watch project selection to regenerate name prefix
                this.$watch('projectId', () => {
                    if (!this.form.name || this.form.name.includes('-') && this.form.name.match(/[a-z0-9]{16}$/)) {
                        this.form.name = this.generateName();
                    }
                });
            } catch (e) {
                toast('Failed to load template', 'error');
            }
            this.loading = false;
        },
        rebuildDistribution() {
            const defaultServer = this.servers.length > 0 ? this.servers[0].id : 'localhost';
            const dist = [];
            for (let i = 0; i < this.nodeCount; i++) {
                const existing = this.nodeDistribution[i];
                dist.push({ server_id: existing ? existing.server_id : defaultServer });
            }
            this.nodeDistribution = dist;
        },
        generateName() {
            const suffix = this.randomStr(8);
            const parts = [];
            if (this.projectId) {
                const proj = this.projects.find(p => p.id === this.projectId);
                if (proj) parts.push(proj.name.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, ''));
            }
            if (this.template.name) {
                parts.push(this.template.name.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, ''));
            }
            parts.push(suffix);
            return parts.join('-');
        },
        async onRepoSelected() {
            if (!this.selectedRepo || !this.sourceId) return;
            const repo = this.sourceRepos.find(r => r.full_name === this.selectedRepo);
            if (repo) {
                this.form.git_url = repo.clone_url;
                this.form.branch = repo.default_branch || 'main';
                this.form.name = repo.name;
                this.form.build_pack = this.form.build_pack || 'dockerfile';
                this.form.build_path = this.form.build_path || '/Dockerfile';
                this.form.compose_path = this.form.compose_path || '/docker-compose.yml';
                this.form.port = this.form.port || '3000';
            }
            // Load branches
            this.loadingBranches = true;
            this.repoBranches = [];
            try {
                const branches = await fetch('/api/v1/sources/' + this.sourceId + '/branches/' + this.selectedRepo).then(r => r.ok ? r.json() : []);
                this.repoBranches = branches.length > 0 ? branches : [repo?.default_branch || 'main'];
            } catch { this.repoBranches = [repo?.default_branch || 'main']; }
            this.loadingBranches = false;
        },
        randomStr(len) {
            const chars = 'abcdefghijklmnopqrstuvwxyz0123456789';
            const arr = new Uint8Array(len);
            crypto.getRandomValues(arr);
            return Array.from(arr, b => chars[b % chars.length]).join('');
        },
        isFieldHidden(field) {
            const bp = this.form.build_pack;
            if (!bp) return false;
            if (field.key === 'build_path') return bp !== 'dockerfile';
            if (field.key === 'compose_path') return bp !== 'docker-compose';
            return false;
        },
        isValidRepoUrl(url) {
            return typeof url === 'string' && /^https?:\/\/[a-zA-Z0-9.-]+\/[^\/\s]+\/[^\/\s]+?(\.git)?\/?$/.test(url.trim());
        },
        get isRepoReady() {
            if (this.repoInputMode === 'pick') return !!this.selectedRepo;
            return this.isValidRepoUrl(this.form.git_url);
        },
        repoNamePlaceholder() {
            if (this.selectedRepo) return this.selectedRepo.split('/').pop();
            const url = (this.form.git_url || '').trim().replace(/\.git$/, '').replace(/\/$/, '');
            const last = url.split('/').pop();
            return last || 'my-app';
        },
        onManualUrlInput() {
            const url = (this.form.git_url || '').trim();
            if (!url) { this.manualUrlError = ''; this.repoBranches = []; return; }
            if (!this.isValidRepoUrl(url)) {
                this.manualUrlError = 'Enter a full HTTPS URL like https://github.com/user/repo';
                this.repoBranches = [];
                return;
            }
            this.manualUrlError = '';
            this.form.branch = this.form.branch || 'main';
            this.form.build_pack = this.form.build_pack || 'dockerfile';
            this.form.build_path = this.form.build_path || '/Dockerfile';
            this.form.compose_path = this.form.compose_path || '/docker-compose.yml';
            this.form.port = this.form.port || '3000';
            const derived = url.replace(/\.git$/, '').replace(/\/$/, '').split('/').pop();
            if (derived && (!this.form.name || /-[a-z0-9]{8}$/.test(this.form.name))) {
                this.form.name = derived;
            }
        },
        async onManualUrlBlur() {
            const url = (this.form.git_url || '').trim();
            if (!url || !this.isValidRepoUrl(url) || !this.sourceId) return;
            const match = url.match(/github\.com[/:]([^/]+)\/([^/.]+?)(?:\.git)?\/?$/);
            if (!match) return;
            const owner = match[1], repo = match[2];
            this.loadingBranches = true;
            this.repoBranches = [];
            try {
                const branches = await fetch(`/api/v1/sources/${this.sourceId}/branches/${owner}/${repo}`).then(r => r.ok ? r.json() : []);
                if (Array.isArray(branches) && branches.length > 0) {
                    this.repoBranches = branches;
                    if (!branches.includes(this.form.branch)) {
                        this.form.branch = branches.includes('main') ? 'main' : (branches.includes('master') ? 'master' : branches[0]);
                    }
                }
            } catch { /* leave repoBranches empty → text input remains */ }
            this.loadingBranches = false;
        },
        generatePwd() { return generatePassword(32); },
        async deploy() {
            const name = this.form.name;
            if (!name || !name.trim()) {
                toast('Name is required', 'error');
                return;
            }
            if (this.catalogId === 'git-github-app' && this.repoInputMode === 'manual') {
                if (!this.sourceId) {
                    toast('Select a GitHub App source first', 'error');
                    return;
                }
                if (!this.isValidRepoUrl(this.form.git_url)) {
                    this.manualUrlError = 'Enter a full HTTPS URL like https://github.com/user/repo';
                    toast('Repository URL is invalid', 'error');
                    return;
                }
            }

            this.deploying = true;
            try {
                const payload = {
                    catalog_id: this.catalogId,
                    name: name.trim(),
                    project_id: this.projectId || null,
                    network_id: this.networkId || null,
                    server_id: this.serverId || 'local',
                    source_id: this.sourceId || null,
                    config: { ...this.form },
                };

                if (this.deploymentMode === 'cluster') {
                    payload.deployment_mode = 'cluster';
                    payload.node_count = this.nodeCount;
                    payload.node_distribution = this.nodeDistribution;
                }

                const result = await api('/api/v1/resources', {
                    method: 'POST',
                    body: JSON.stringify(payload),
                });
                toast(name + ' deployed successfully');
                window.location.href = '/resources/' + result.id;
            } catch (e) {
                if (e.code === 'name_conflict' && e.existing_id) {
                    toast(`Resource "${e.name}" already exists — opening it`, 'error');
                    setTimeout(() => {
                        window.location.href = '/resources/' + e.existing_id;
                    }, 800);
                    return;
                }
                toast(e.message, 'error');
                this.deploying = false;
            }
        }
    };
}
</script>
{% endblock %}
