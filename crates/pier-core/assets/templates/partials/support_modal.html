<div x-data="supportModal({ autoOpen: {{ 'true' if page == 'dashboard' else 'false' }} })"
     x-on:support-open.window="show()"
     x-show="open"
     x-cloak
     x-transition:enter="transition ease-out duration-200"
     x-transition:enter-start="opacity-0 translate-y-4"
     x-transition:enter-end="opacity-100 translate-y-0"
     x-transition:leave="transition ease-in duration-150"
     x-transition:leave-start="opacity-100 translate-y-0"
     x-transition:leave-end="opacity-0 translate-y-4"
     class="fixed bottom-6 right-6 z-[9999] max-w-md w-[calc(100%-3rem)]">
    <div class="relative bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-800 rounded-2xl shadow-2xl p-7">
        <button @click="dismiss()"
                class="absolute top-3 right-3 p-1.5 rounded-md text-gray-400 hover:text-gray-600 dark:hover:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors"
                aria-label="Close">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
        </button>

        <h3 class="text-xl font-semibold text-gray-900 dark:text-white mb-3 pr-6">Love Pier? Support our work.</h3>

        <div class="text-sm text-gray-600 dark:text-gray-400 leading-relaxed mb-6 space-y-2">
            <p>We are already profitable thanks to <span class="font-semibold text-gray-900 dark:text-white">YOU</span> but&hellip;</p>
            <p>We would like to make more cool features.</p>
            <p>For this we need your help to support our work financially.</p>
        </div>

        <div class="flex items-center justify-between gap-3">
            <button @click="dismiss()"
                    class="text-sm text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-200 transition-colors">
                Maybe next time
            </button>
            <a href="https://pier.team/sponsor"
               target="_blank"
               rel="noopener"
               class="inline-flex items-center px-5 py-2.5 bg-pier-600 hover:bg-pier-700 text-white text-sm font-medium rounded-lg transition-colors">
                Support project
            </a>
        </div>
    </div>
</div>

<script>
    function supportModal(opts) {
        const KEY = 'pier-support-dismissed';
        const dismissed = localStorage.getItem(KEY) === '1';
        return {
            open: opts.autoOpen && !dismissed,
            show() { this.open = true; },
            dismiss() {
                localStorage.setItem(KEY, '1');
                this.open = false;
            },
        };
    }
</script>
