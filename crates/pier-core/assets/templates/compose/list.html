{% extends "base.html" %}
{% block title %}Stacks{% endblock %}

{% block content %}
<div class="p-6 space-y-6" x-data="stacksData()" x-init="init()">
    <!-- Header -->
    <div class="flex items-center justify-between">
        <div>
            <h2 class="text-xl font-semibold text-white">Compose Stacks</h2>
            <p class="text-sm text-gray-500 mt-1">Docker Compose deployments</p>
        </div>
        <a href="/stacks/new"
           class="px-4 py-2 text-sm font-medium bg-blue-600 hover:bg-blue-700 rounded-lg text-white transition-colors">
            + New Stack
        </a>
    </div>

    <!-- Loading -->
    <div x-show="loading" class="text-center py-12 text-gray-500">Loading stacks...</div>

    <!-- Grid -->
    <div x-show="!loading" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
        <template x-for="s in stacks" :key="s._key">
            <div class="bg-gray-900 border rounded-xl p-5 transition-colors"
                 :class="s.source === 'peer'
                          ? 'border-purple-900/40 hover:border-purple-700/60'
                          : 'border-gray-800/50 hover:border-gray-700/50'">
                <div class="flex items-center justify-between mb-3 gap-2">
                    <div class="min-w-0 flex items-center gap-2 flex-1">
                        <template x-if="s.source === 'local'">
                            <a :href="'/stacks/' + s.id" class="text-white font-medium hover:text-blue-400 transition-colors truncate" x-text="s.name"></a>
                        </template>
                        <template x-if="s.source === 'peer'">
                            <a :href="peerHref(s)"
                               target="_blank" rel="noopener"
                               class="text-white font-medium hover:text-purple-400 transition-colors truncate"
                               :title="'Open on ' + s.peer_name"
                               x-text="s.name"></a>
                        </template>
                        <span x-show="s.source === 'peer'"
                              class="shrink-0 inline-flex items-center px-1.5 py-0.5 rounded text-[10px] font-medium bg-purple-900/30 text-purple-300"
                              x-text="s.peer_name"></span>
                    </div>
                    <span class="inline-flex items-center gap-1.5 px-2 py-0.5 rounded-full text-xs font-medium shrink-0"
                          :class="s.status === 'running' ? 'bg-green-500/10 text-green-400' : 'bg-gray-500/10 text-gray-400'">
                        <span class="w-1.5 h-1.5 rounded-full"
                              :class="s.status === 'running' ? 'bg-green-400' : 'bg-gray-500'"></span>
                        <span x-text="s.status"></span>
                    </span>
                </div>
                <p class="text-xs text-gray-500 mb-4">
                    <span x-show="s.source === 'local'" x-text="'Created: ' + s.created_at"></span>
                    <span x-show="s.source === 'peer'" x-text="'Synced: ' + formatAgo(s.fetched_at)"></span>
                </p>
                <!-- Local stacks: full mutation buttons. -->
                <div class="flex items-center gap-2 flex-wrap" x-show="s.source === 'local'">
                    <button @click="deploy(s.id)"
                            class="px-3 py-1.5 text-xs rounded-lg bg-green-600/20 text-green-400 hover:bg-green-600/30 transition-colors">
                        Deploy
                    </button>
                    <button @click="down(s.id)"
                            class="px-3 py-1.5 text-xs rounded-lg bg-yellow-600/20 text-yellow-400 hover:bg-yellow-600/30 transition-colors">
                        Down
                    </button>
                    <button x-show="migrationTargets.length > 0"
                            @click="openMigrate(s)"
                            class="px-3 py-1.5 text-xs rounded-lg bg-indigo-600/20 text-indigo-400 hover:bg-indigo-600/30 transition-colors"
                            title="Move this stack to a paired peer (stateless only)">
                        Move to…
                    </button>
                    <button @click="remove(s.id)"
                            class="px-3 py-1.5 text-xs rounded-lg bg-red-600/20 text-red-400 hover:bg-red-600/30 transition-colors ml-auto">
                        Delete
                    </button>
                </div>
                <!-- Federated stack on a peer that's been paired (peer
                     has a federation_token stored on primary). Active
                     Deploy / Down / Restart buttons hit the primary's
                     /federation/peer/{id}/stacks/{id}/* proxy which in
                     turn calls the peer's /api/v1/agent/*. -->
                <div class="flex items-center gap-2"
                     x-show="s.source === 'peer' && s.peer_paired">
                    <button @click="peerDeploy(s)"
                            :disabled="busy[s._key]"
                            class="px-3 py-1.5 text-xs rounded-lg bg-purple-600/20 text-purple-300 hover:bg-purple-600/30 transition-colors disabled:opacity-60">
                        Deploy
                    </button>
                    <button @click="peerDown(s)"
                            :disabled="busy[s._key]"
                            class="px-3 py-1.5 text-xs rounded-lg bg-yellow-600/20 text-yellow-400 hover:bg-yellow-600/30 transition-colors disabled:opacity-60">
                        Down
                    </button>
                    <button @click="peerRestart(s)"
                            :disabled="busy[s._key]"
                            class="px-3 py-1.5 text-xs rounded-lg bg-blue-600/20 text-blue-400 hover:bg-blue-600/30 transition-colors disabled:opacity-60">
                        Restart
                    </button>
                    <button @click="openLogs(s)"
                            class="px-3 py-1.5 text-xs rounded-lg bg-gray-700/40 text-gray-200 hover:bg-gray-700/60 transition-colors">
                        Logs
                    </button>
                    <a x-show="s.peer_url" :href="peerHref(s)" target="_blank" rel="noopener"
                       class="ml-auto px-3 py-1.5 text-xs text-purple-400 hover:text-purple-300">Open ↗</a>
                </div>
                <!-- Federated but peer NOT paired yet — read-only with
                     a callout pointing at the setup step. -->
                <div class="flex items-center text-xs text-gray-500"
                     x-show="s.source === 'peer' && !s.peer_paired">
                    <span>Managed on <span class="text-purple-300" x-text="s.peer_name"></span>
                        <span class="text-amber-400" title="Pair federation on /servers/{peer-id} to enable remote actions"> · not paired</span>
                    </span>
                    <a x-show="s.peer_url" :href="peerHref(s)" target="_blank" rel="noopener"
                       class="ml-auto text-purple-400 hover:text-purple-300">Open ↗</a>
                </div>
            </div>
        </template>
    </div>

    <div x-show="!loading && stacks.length === 0" class="text-center py-12">
        <p class="text-gray-500 mb-4">No stacks yet</p>
        <a href="/stacks/new" class="text-blue-400 hover:text-blue-300 text-sm">Create your first stack</a>
    </div>

    <!-- Migrate modal — Move to... on a local stack.
         Three states reflected in `migrate.phase`:
           idle    — operator picks a target, sees domain warning
           running — POST in flight, show spinner + status
           done    — show result (success + domain advice OR error) -->
    <div x-show="migrate.open" x-cloak class="fixed inset-0 z-[9999] flex items-center justify-center bg-black/60"
         style="top:0;left:0" @click.self="migrate.phase === 'running' || closeMigrate()">
        <div class="bg-gray-950 border border-gray-800 rounded-xl shadow-xl w-full max-w-lg p-5 space-y-4" @click.stop>
            <h3 class="text-sm font-semibold text-white">
                Move <span class="font-mono text-indigo-300" x-text="migrate.stackName"></span> to another server
            </h3>

            <template x-if="migrate.phase === 'idle'">
                <div class="space-y-3">
                    <p class="text-xs text-gray-400">
                        Pier will recreate this stack on the chosen peer, then tear down the local copy.
                        Stateful stacks (named volumes) are refused at the API.
                    </p>
                    <div>
                        <label class="block text-xs text-gray-400 mb-1">Target server</label>
                        <select x-model="migrate.targetServerId"
                                class="w-full px-3 py-2 bg-gray-900 border border-gray-700 rounded-lg text-sm text-gray-100">
                            <option value="">— select —</option>
                            <template x-for="t in migrationTargets" :key="t.id">
                                <option :value="t.id" x-text="t.label"></option>
                            </template>
                        </select>
                    </div>
                    <div class="bg-amber-500/10 border border-amber-500/30 rounded-lg px-3 py-2 text-[11px] text-amber-300">
                        DNS A-records still point at this server. Update them after the move so users actually hit the new node.
                    </div>
                    <div class="flex items-center justify-end gap-2 pt-2 border-t border-gray-800">
                        <button @click="closeMigrate()"
                                class="px-3 py-1.5 text-sm rounded text-gray-400 hover:text-gray-200">Cancel</button>
                        <button :disabled="!migrate.targetServerId"
                                @click="confirmMigrate()"
                                class="px-3 py-1.5 text-sm rounded bg-indigo-600 hover:bg-indigo-700 text-white disabled:opacity-60">
                            Move it
                        </button>
                    </div>
                </div>
            </template>

            <template x-if="migrate.phase === 'running'">
                <div class="text-sm text-gray-300">
                    <p x-text="migrate.status"></p>
                </div>
            </template>

            <template x-if="migrate.phase === 'done'">
                <div class="space-y-3">
                    <div class="bg-green-500/10 border border-green-500/30 rounded-lg px-3 py-2 text-xs text-green-300"
                         x-show="migrate.result && migrate.result.ok">
                        Moved to <span class="font-mono" x-text="migrate.result?.moved_to"></span>.
                        New stack id: <span class="font-mono" x-text="migrate.result?.new_stack_id"></span>
                    </div>
                    <div class="bg-red-500/10 border border-red-500/30 rounded-lg px-3 py-2 text-xs text-red-300"
                         x-show="migrate.error" x-text="migrate.error"></div>
                    <div x-show="migrate.result && (migrate.result.domain_advice || []).length > 0"
                         class="text-xs text-gray-400 space-y-1">
                        <p>Update DNS A-records for:</p>
                        <ul class="font-mono text-amber-300 list-disc list-inside">
                            <template x-for="d in (migrate.result?.domain_advice || [])" :key="d">
                                <li x-text="d"></li>
                            </template>
                        </ul>
                    </div>
                    <div x-show="migrate.result && migrate.result.teardown_warning"
                         class="text-[11px] text-amber-300"
                         x-text="'Note: ' + (migrate.result?.teardown_warning || '')"></div>
                    <div class="flex items-center justify-end pt-2 border-t border-gray-800">
                        <button @click="closeMigrate()"
                                class="px-3 py-1.5 text-sm rounded bg-gray-800 hover:bg-gray-700 text-gray-200">Close</button>
                    </div>
                </div>
            </template>
        </div>
    </div>

    <!-- Logs modal for federated stacks.
         Two-phase: first GET /logs renders the snapshot, then we open
         WS to peer's URL using token returned by /logs/ws-info. The
         token sits in browser memory only — same trust boundary as
         the operator's pier session cookie. -->
    <div x-show="logs.open" x-cloak class="fixed inset-0 z-[9999] flex items-center justify-center bg-black/60"
         style="top:0;left:0" @click.self="closeLogs()">
        <div class="bg-gray-950 border border-gray-800 rounded-xl shadow-xl w-full max-w-4xl p-5 space-y-3" @click.stop>
            <div class="flex items-center justify-between">
                <div class="min-w-0">
                    <h3 class="text-sm font-semibold text-white truncate" x-text="logs.title"></h3>
                    <p class="text-xs text-gray-500" x-text="logs.status"></p>
                </div>
                <div class="flex items-center gap-2">
                    <label class="flex items-center gap-1 text-xs text-gray-400">
                        <input type="checkbox" x-model="logs.follow"
                               @change="logs.follow ? startLogsStream() : stopLogsStream()">
                        Follow
                    </label>
                    <button @click="closeLogs()"
                            class="px-2 py-1 text-xs rounded bg-gray-800 hover:bg-gray-700 text-gray-200">Close</button>
                </div>
            </div>
            <pre x-ref="logBody"
                 class="bg-black/60 text-green-200 text-[11px] font-mono leading-snug rounded p-3 h-[60vh] overflow-y-auto whitespace-pre-wrap"
                 x-text="logs.body"></pre>
        </div>
    </div>
</div>

<script>
function stacksData() {
    return {
        stacks: [],
        loading: true,
        // Per-row busy flag, keyed by stack._key. Stops the operator
        // double-clicking Deploy while a peer call is still in flight.
        busy: {},
        // Migration targets — paired peer servers we can hand a
        // local stack to. Refreshed alongside the stack list so the
        // Move-to dropdown reflects pairing changes without reload.
        migrationTargets: [],
        // Migrate modal state machine.
        migrate: {
            open: false,
            phase: 'idle', // idle | running | done
            status: '',
            stackId: '',
            stackName: '',
            targetServerId: '',
            result: null,
            error: '',
        },
        // Logs modal state. `_ws` holds the live WebSocket; `_stack`
        // is the snapshot of the federated row we opened so closing
        // the modal can tear down cleanly.
        logs: {
            open: false,
            title: '',
            status: '',
            body: '',
            follow: true,
            _ws: null,
            _stack: null,
        },
        async init() {
            await this.refresh();
        },
        async refresh() {
            try {
                // /federation/stacks falls back to /stacks if the
                // federation route is missing on this build — keeps
                // the page useful pre-migration-43 too.
                const rows = await fetch('/api/v1/federation/stacks')
                    .then(r => r.ok ? r.json() : fetch('/api/v1/stacks').then(r2 => r2.json()));
                this.stacks = (rows || []).map(s => Object.assign({}, s, {
                    source: s.source || 'local',
                    _key: s.source === 'peer' ? (s.peer_server_id + ':' + s.id) : ('local:' + s.id),
                }));
                await this.refreshMigrationTargets();
            } catch (e) { /* silent */ }
            this.loading = false;
        },
        async refreshMigrationTargets() {
            try {
                const servers = await fetch('/api/v1/servers').then(r => r.ok ? r.json() : []);
                this.migrationTargets = (servers || [])
                    .filter(s => s.kind === 'peer' && !s.is_local && s.federation_paired)
                    .map(s => ({ id: s.id, label: s.name }));
            } catch (e) { this.migrationTargets = []; }
        },
        openMigrate(s) {
            this.migrate = {
                open: true,
                phase: 'idle',
                status: '',
                stackId: s.id,
                stackName: s.name,
                targetServerId: '',
                result: null,
                error: '',
            };
        },
        closeMigrate() {
            this.migrate.open = false;
        },
        async confirmMigrate() {
            const m = this.migrate;
            m.phase = 'running';
            m.status = 'Creating stack on target…';
            try {
                const resp = await api('/api/v1/stacks/' + encodeURIComponent(m.stackId) + '/migrate', {
                    method: 'POST',
                    body: JSON.stringify({ target_server_id: m.targetServerId }),
                });
                m.result = resp;
                m.phase = 'done';
                toast('Migration complete');
                await this.refresh();
            } catch (e) {
                m.error = e.message || String(e);
                m.phase = 'done';
            }
        },
        peerHref(s) {
            const base = (s.peer_url || '').replace(/\/+$/, '');
            if (base) return base + '/stacks/' + encodeURIComponent(s.id);
            return '#';
        },
        formatAgo(unixSecs) {
            if (!unixSecs) return 'never';
            const diff = Math.max(0, Math.floor(Date.now() / 1000) - unixSecs);
            if (diff < 60) return diff + 's ago';
            if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
            if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
            return Math.floor(diff / 86400) + 'd ago';
        },
        async deploy(id) {
            try {
                toast('Deploying stack...');
                await api('/api/v1/stacks/' + id + '/deploy', { method: 'POST' });
                toast('Stack deployed');
                await this.refresh();
            } catch (e) {
                toast(e.message, 'error');
            }
        },
        async peerAction(s, verb, toastMsg) {
            // Single helper for deploy/down/restart on a federated
            // stack. Sets busy[_key] so the buttons can disable.
            this.busy[s._key] = true;
            try {
                toast(toastMsg + ' on ' + s.peer_name + '...');
                await api(
                    '/api/v1/federation/peer/' + encodeURIComponent(s.peer_server_id) +
                    '/stacks/' + encodeURIComponent(s.id) + '/' + verb,
                    { method: 'POST' }
                );
                toast(toastMsg + ' OK');
                await this.refresh();
            } catch (e) {
                toast(toastMsg + ' failed: ' + (e.message || e), 'error');
            } finally {
                this.busy[s._key] = false;
            }
        },
        peerDeploy(s) { return this.peerAction(s, 'deploy', 'Deploy'); },
        peerDown(s)   { return this.peerAction(s, 'down', 'Down'); },
        peerRestart(s){ return this.peerAction(s, 'restart', 'Restart'); },
        async openLogs(s) {
            this.logs.open = true;
            this.logs.title = 'Logs · ' + s.name + ' on ' + s.peer_name;
            this.logs.status = 'Loading snapshot…';
            this.logs.body = '';
            this.logs._stack = s;
            try {
                const url =
                    '/api/v1/federation/peer/' + encodeURIComponent(s.peer_server_id) +
                    '/stacks/' + encodeURIComponent(s.id) + '/logs?tail=400';
                const text = await fetch(url, { credentials: 'include' }).then(r => r.text());
                this.logs.body = text || '(empty)';
                this.logs.status = 'Snapshot loaded.';
                this.$nextTick(() => this.scrollLogsToBottom());
                if (this.logs.follow) {
                    this.startLogsStream();
                }
            } catch (e) {
                this.logs.status = 'Snapshot failed: ' + (e.message || e);
            }
        },
        async startLogsStream() {
            const s = this.logs._stack;
            if (!s || this.logs._ws) return;
            try {
                const info = await fetch(
                    '/api/v1/federation/peer/' + encodeURIComponent(s.peer_server_id) +
                    '/stacks/' + encodeURIComponent(s.id) + '/logs/ws-info',
                    { credentials: 'include' },
                ).then(r => r.ok ? r.json() : Promise.reject(new Error('ws-info failed')));
                const u = info.ws_url + (info.ws_url.includes('?') ? '&' : '?') +
                          'token=' + encodeURIComponent(info.token);
                const ws = new WebSocket(u);
                ws.onopen = () => { this.logs.status = 'Streaming live from ' + info.peer_name; };
                ws.onmessage = (ev) => {
                    if (this.logs.body && !this.logs.body.endsWith('\n')) this.logs.body += '\n';
                    this.logs.body += ev.data;
                    // Keep buffer bounded so a chatty stack doesn't OOM the tab
                    if (this.logs.body.length > 500_000) {
                        this.logs.body = this.logs.body.slice(-400_000);
                    }
                    this.$nextTick(() => this.scrollLogsToBottom());
                };
                ws.onerror = () => { this.logs.status = 'Stream error — peer cert untrusted? Try opening the modal again.'; };
                ws.onclose = () => { if (this.logs._ws === ws) this.logs._ws = null; };
                this.logs._ws = ws;
            } catch (e) {
                this.logs.status = 'Live stream unavailable: ' + (e.message || e);
            }
        },
        stopLogsStream() {
            if (this.logs._ws) {
                try { this.logs._ws.close(); } catch (e) { /* ignore */ }
                this.logs._ws = null;
            }
        },
        scrollLogsToBottom() {
            const el = this.$refs.logBody;
            if (el) el.scrollTop = el.scrollHeight;
        },
        closeLogs() {
            this.stopLogsStream();
            this.logs.open = false;
            this.logs.body = '';
            this.logs._stack = null;
        },
        async down(id) {
            try {
                await api('/api/v1/stacks/' + id + '/down', { method: 'POST' });
                toast('Stack stopped');
                await this.refresh();
            } catch (e) {
                toast(e.message, 'error');
            }
        },
        async remove(id) {
            if (!confirm('Remove this stack?')) return;
            try {
                await api('/api/v1/stacks/' + id, { method: 'DELETE' });
                toast('Stack removed');
                await this.refresh();
            } catch (e) {
                toast(e.message, 'error');
            }
        }
    };
}
</script>
{% endblock %}
