{% extends "base.html" %}
{% block title %}{% if mode == 'create' %}{{ t('compose_editor.title_new') }}{% else %}{{ t('compose_editor.title_edit') }}{% endif %}{% endblock %}

{% block content %}
<div class="p-6 space-y-6" x-data="stackEditor('{{ mode }}', '{{ stack_id|default('') }}')" x-init="init()">
    <!-- Header -->
    <div class="flex items-center gap-3">
        <a href="/stacks" class="text-gray-500 hover:text-gray-300 transition-colors">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
        </a>
        <div>
            <h2 class="text-xl font-semibold text-white" x-text="mode === 'create' ? '{{ t('compose_editor.title_new') }}' : '{{ t('compose_editor.title_edit') }}'"></h2>
            <p class="text-sm text-gray-500 mt-1">Docker Compose YAML</p>
        </div>
    </div>

    <!-- Form -->
    <div class="bg-gray-900 border border-gray-800/50 rounded-xl p-5 space-y-4">
        <!-- Target server selector — only shown on create, only when
             there's at least one paired peer server to choose. Default
             stays "local" so existing single-node deployments are
             unchanged. -->
        <template x-if="mode === 'create' && targets.length > 1">
            <div>
                <label class="block text-sm font-medium text-gray-400 mb-1.5">{{ t('compose_editor.deploy_on') }}</label>
                <select x-model="targetServerId"
                        class="w-full px-3 py-2 bg-gray-800 border border-gray-700 rounded-lg text-gray-100 text-sm">
                    <template x-for="t in targets" :key="t.id">
                        <option :value="t.id" x-text="t.label"></option>
                    </template>
                </select>
                <p class="text-[11px] text-gray-500 mt-1">
                    {{ t('compose_editor.deploy_on_help') | safe }}
                </p>
            </div>
        </template>
        <div>
            <label class="block text-sm font-medium text-gray-400 mb-1.5">{{ t('compose_editor.stack_name') }}</label>
            <input x-model="name" type="text" :disabled="mode === 'edit'"
                   class="w-full px-3 py-2 bg-gray-800 border border-gray-700 rounded-lg text-gray-100
                          focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent
                          placeholder-gray-500 text-sm disabled:opacity-50"
                   placeholder="my-stack">
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-400 mb-1.5">{{ t('compose_editor.compose_yaml') }}</label>
            <textarea x-model="yaml" rows="20"
                      class="w-full px-3 py-2 bg-gray-800 border border-gray-700 rounded-lg text-gray-100
                             focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent
                             placeholder-gray-500 text-sm font-mono leading-6"
                      placeholder="services:
  web:
    image: nginx:alpine
    ports:
      - '80:80'"></textarea>
        </div>

        <div x-show="error" x-cloak class="text-sm text-red-400 bg-red-500/10 border border-red-500/20 rounded-lg px-3 py-2" x-text="error"></div>

        <div class="flex items-center gap-3">
            <button @click="save()" :disabled="saving"
                    class="px-4 py-2.5 text-sm font-medium bg-blue-600 hover:bg-blue-700 disabled:opacity-50
                           rounded-lg text-white transition-colors">
                <span x-text="saving ? '{{ t('compose_editor.saving') }}' : (mode === 'create' ? '{{ t('compose_editor.create_stack') }}' : '{{ t('compose_editor.save_changes') }}')"></span>
            </button>
            <template x-if="mode === 'edit'">
                <button @click="deployStack()" :disabled="deploying"
                        class="px-4 py-2.5 text-sm font-medium bg-green-600 hover:bg-green-700 disabled:opacity-50
                               rounded-lg text-white transition-colors">
                    <span x-text="deploying ? '{{ t('compose_editor.deploying') }}' : '{{ t('compose_editor.save_deploy') }}'"></span>
                </button>
            </template>
        </div>
    </div>
</div>

<script>
function stackEditor(mode, stackId) {
    return {
        mode,
        stackId,
        name: '',
        yaml: '',
        error: '',
        saving: false,
        deploying: false,
        // Target server selection — populated from /api/v1/servers
        // filtered to local + paired peer kinds. 'local' is special
        // and routes to the same /api/v1/stacks endpoint as always.
        targets: [{ id: 'local', label: '{{ t('compose_editor.target_local') }}' }],
        targetServerId: 'local',
        async init() {
            if (mode === 'create') {
                await this.loadTargets();
            }
            if (mode === 'edit' && stackId) {
                try {
                    const data = await fetch('/api/v1/stacks/' + stackId).then(r => r.json());
                    this.name = data.name || '';
                    this.yaml = data.yaml || '';
                } catch (e) {
                    this.error = '{{ t('compose_editor.error_load_stack') }}';
                }
            }
        },
        async loadTargets() {
            try {
                const servers = await fetch('/api/v1/servers').then(r => r.ok ? r.json() : []);
                const paired = (servers || [])
                    .filter(s => s.kind === 'peer' && !s.is_local && s.federation_paired)
                    .map(s => ({ id: s.id, label: '{{ t('compose_editor.target_peer') }}'.replace('%{name}', s.name) }));
                if (paired.length) {
                    this.targets = [{ id: 'local', label: '{{ t('compose_editor.target_local') }}' }, ...paired];
                }
            } catch (e) { /* silent — leave just local */ }
        },
        async save() {
            this.saving = true;
            this.error = '';
            try {
                if (this.mode === 'create') {
                    const onLocal = this.targetServerId === 'local';
                    const url = onLocal
                        ? '/api/v1/stacks'
                        : '/api/v1/federation/peer/' + encodeURIComponent(this.targetServerId) + '/stacks';
                    const result = await api(url, {
                        method: 'POST',
                        body: JSON.stringify({ name: this.name, yaml: this.yaml })
                    });
                    toast(onLocal ? '{{ t('compose_editor.toast_created') }}' : '{{ t('compose_editor.toast_created_peer') }}');
                    // Federated stacks live on the peer — there's no
                    // primary-side /stacks/<id> page for them, so we
                    // bounce back to the list (the new card will appear
                    // after the next federation sync).
                    window.location.href = onLocal ? ('/stacks/' + result.id) : '/stacks';
                } else {
                    await api('/api/v1/stacks/' + this.stackId, {
                        method: 'PUT',
                        body: JSON.stringify({ yaml: this.yaml })
                    });
                    toast('{{ t('compose_editor.toast_saved') }}');
                }
            } catch (e) {
                this.error = e.message;
            } finally {
                this.saving = false;
            }
        },
        async deployStack() {
            this.deploying = true;
            this.error = '';
            try {
                await api('/api/v1/stacks/' + this.stackId, {
                    method: 'PUT',
                    body: JSON.stringify({ yaml: this.yaml })
                });
                await api('/api/v1/stacks/' + this.stackId + '/deploy', { method: 'POST' });
                toast('{{ t('compose_editor.toast_deployed') }}');
            } catch (e) {
                this.error = e.message;
            } finally {
                this.deploying = false;
            }
        }
    };
}
</script>
{% endblock %}
