{% extends "base.html" %}
{% block title %}Architecture{% endblock %}

{% block content %}
<div x-data="canvasApp()" x-init="init()" class="absolute inset-0 overflow-hidden select-none bg-gray-100 dark:bg-[#0a0e17]"
     style="background-image: radial-gradient(circle, rgb(209 213 219 / 0.5) 1px, transparent 1px); background-size: 30px 30px;"
     :style="document.documentElement.classList.contains('dark') ? 'background-image: radial-gradient(circle, #1a2030 1px, transparent 1px); background-size: 30px 30px;' : ''">

    <!-- Top bar -->
    <div class="absolute top-0 left-0 right-0 z-30 flex items-center justify-between px-4 py-2 bg-white/90 dark:bg-[#0a0e17]/90 backdrop-blur-sm border-b border-gray-200 dark:border-gray-800/50">
        <div class="flex items-center gap-3">
            <a href="/" class="text-sm text-gray-500 dark:text-gray-400 hover:text-gray-900 dark:hover:text-white transition-colors flex items-center gap-1">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
                Dashboard
            </a>
            <span class="text-gray-300 dark:text-gray-700">|</span>
            <h2 class="text-sm font-medium text-gray-900 dark:text-white">Architecture</h2>
            <span class="text-xs text-gray-400 dark:text-gray-500" x-text="resources.length + ' services'"></span>
        </div>
        <div class="flex items-center gap-2">
            <button @click="createModal.show = true; loadCatalog()"
                    class="flex items-center gap-1.5 px-3 py-1.5 text-sm font-medium bg-blue-600 hover:bg-blue-700 text-white rounded-lg transition-colors">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v12m6-6H6"/></svg>
                Create
            </button>
            <span class="text-gray-300 dark:text-gray-700 ml-2">|</span>
            <span class="text-xs text-gray-400 dark:text-gray-500" x-text="Math.round(zoom * 100) + '%'"></span>
            <button @click="zoomIn()" class="p-1 text-gray-500 dark:text-gray-400 hover:text-gray-900 dark:hover:text-white" title="Zoom in">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0zM10 7v6m3-3H7"/></svg>
            </button>
            <button @click="zoomOut()" class="p-1 text-gray-500 dark:text-gray-400 hover:text-gray-900 dark:hover:text-white" title="Zoom out">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0zM13 10H7"/></svg>
            </button>
            <button @click="resetView()" class="px-2 py-1 text-xs text-gray-500 dark:text-gray-400 hover:text-gray-900 dark:hover:text-white border border-gray-300 dark:border-gray-700 rounded" title="Fit to view">Fit</button>
        </div>
    </div>

    <!-- Canvas area (pan/zoom container) -->
    <div class="absolute inset-0 pt-11 overflow-hidden"
         @mousedown="onCanvasMouseDown($event)"
         @mousemove="onMouseMove($event)"
         @mouseup="onMouseUp($event)"
         @mouseleave="onMouseUp($event)"
         @wheel.prevent="onWheel($event)"
         @contextmenu.prevent>

        <!-- Transform container -->
        <div :style="'transform: scale(' + zoom + ') translate(' + (-panX) + 'px,' + (-panY) + 'px); transform-origin: 0 0; position: absolute; top: 0; left: 0; width: 6000px; height: 4000px;'">

            <!-- SVG layer for connection lines -->
            <svg class="absolute inset-0 w-full h-full pointer-events-none" style="z-index:1">
                <template x-for="edge in edges" :key="edge.id">
                    <line :x1="getCardCenter(edge.from).x" :y1="getCardCenter(edge.from).y"
                          :x2="getCardCenter(edge.to).x" :y2="getCardCenter(edge.to).y"
                          stroke="#374151" stroke-width="1.5" stroke-dasharray="6,4"
                          :opacity="hoveredId && (hoveredId === edge.from || hoveredId === edge.to) ? 0.8 : 0.25" />
                </template>
            </svg>

            <!-- Server zones -->
            <template x-for="zone in serverZones" :key="zone.id">
                <div class="absolute rounded-2xl border-2 border-dashed border-gray-300 dark:border-gray-800/60"
                     :style="'left:' + zone.x + 'px; top:' + zone.y + 'px; width:' + zone.w + 'px; height:' + zone.h + 'px; z-index:2'">
                    <div class="flex items-center justify-between px-4 pt-3">
                        <div class="flex items-center gap-2">
                            <span x-show="zone.country_code" class="text-sm" x-text="countryFlag(zone.country_code)"></span>
                            <span class="text-sm font-semibold text-gray-600 dark:text-gray-400" x-text="zone.name"></span>
                            <span class="text-[10px] text-gray-600" x-text="'(' + zone.host + ')'"></span>
                            <span class="w-2 h-2 rounded-full" :class="zone.is_local || zone.status === 'online' ? 'bg-green-500' : 'bg-gray-600'"></span>
                        </div>
                        <span class="text-[10px] text-gray-600" x-text="zone.location"></span>
                    </div>
                </div>
            </template>

            <!-- Service cards -->
            <template x-for="card in cards" :key="card.id">
                <div class="absolute cursor-grab active:cursor-grabbing"
                     :style="'left:' + card.x + 'px; top:' + card.y + 'px; z-index:10'"
                     @mousedown.stop="onCardMouseDown($event, card)"
                     @mouseenter="hoveredId = card.id"
                     @mouseleave="hoveredId = null"
                     @dblclick="window.location.href = '/resources/' + card.id"
                     @contextmenu.prevent="contextMenu = { show: true, x: $event.clientX, y: $event.clientY, id: card.id }">
                    <div class="w-[210px] rounded-xl border p-3.5 shadow-lg backdrop-blur-sm transition-all duration-200"
                         :class="{
                             'bg-white dark:bg-gray-900/95 border-green-500/40 shadow-green-500/5': card.status === 'running',
                             'bg-white dark:bg-gray-900/95 border-red-500/40 shadow-red-500/5': card.status === 'failed',
                             'bg-white dark:bg-gray-900/95 border-gray-300 dark:border-gray-700/50': card.status === 'stopped' || card.status === 'unknown',
                             'bg-white dark:bg-gray-900/95 border-blue-500/40 shadow-blue-500/5': card.status === 'deploying',
                             'ring-2 ring-blue-400/40 scale-105': hoveredId === card.id
                         }">
                        <div class="flex items-center gap-2.5 mb-1.5">
                            <img :src="'/static/icons/' + (card.catalog_id || 'docker') + '.svg'"
                                 class="w-6 h-6 rounded" onerror="this.style.display='none'">
                            <span class="text-sm font-semibold text-gray-900 dark:text-white truncate flex-1" x-text="card.name"></span>
                            <span class="w-2.5 h-2.5 rounded-full shrink-0"
                                  :class="{
                                      'bg-green-500 shadow-green-500/50 shadow-sm': card.status === 'running',
                                      'bg-red-500': card.status === 'failed',
                                      'bg-gray-600': card.status === 'stopped' || card.status === 'unknown',
                                      'bg-blue-500 animate-pulse': card.status === 'deploying'
                                  }"></span>
                        </div>
                        <div class="text-[11px] text-gray-500 mb-1" x-text="(card.catalog_id || 'container')"></div>
                        <div class="flex items-center justify-between">
                            <span class="text-[10px] text-gray-600 font-mono" x-text="card.port ? ':' + card.port : ''"></span>
                            <span class="text-[10px] font-medium px-1.5 py-0.5 rounded"
                                  :class="{
                                      'bg-green-500/10 text-green-400': card.status === 'running',
                                      'bg-red-500/10 text-red-400': card.status === 'failed',
                                      'bg-gray-700/50 text-gray-500': card.status === 'stopped' || card.status === 'unknown',
                                      'bg-blue-500/10 text-blue-400': card.status === 'deploying'
                                  }"
                                  x-text="card.status"></span>
                        </div>
                    </div>
                </div>
            </template>
        </div>
    </div>

    <!-- Create Resource Modal -->
    <div x-show="createModal.show" x-cloak
         class="fixed inset-0 z-50 flex items-center justify-center bg-black/60 backdrop-blur-sm"
         @click.self="createModal.show = false; createModal.step = 'catalog'">
        <div class="bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-700 rounded-2xl shadow-2xl w-full max-w-lg max-h-[80vh] overflow-y-auto">
            <!-- Step 1: Choose template -->
            <div x-show="createModal.step === 'catalog'" class="p-5">
                <h3 class="text-lg font-semibold text-white mb-1">Create Resource</h3>
                <p class="text-xs text-gray-500 mb-4">What do you want to deploy?</p>
                <div class="space-y-1">
                    <p class="text-[10px] font-semibold text-gray-500 uppercase tracking-wider px-2 pt-2">Databases</p>
                    <template x-for="item in catalogItems.filter(i => i.category === 'database')" :key="item.id">
                        <button @click="selectTemplate(item.id)" class="w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-left hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors">
                            <div class="w-6 h-6 rounded bg-gray-100 dark:bg-gray-800 flex items-center justify-center shrink-0 overflow-hidden">
                                <img :src="'/static/icons/' + item.id + '.svg'" class="w-5 h-5" onerror="this.parentElement.innerHTML='<svg class=\'w-4 h-4 text-gray-500\' fill=\'none\' stroke=\'currentColor\' viewBox=\'0 0 24 24\'><path stroke-linecap=\'round\' stroke-linejoin=\'round\' stroke-width=\'2\' d=\'M4 7v10c0 2 1 3 3 3h10c2 0 3-1 3-3V7c0-2-1-3-3-3H7c-2 0-3 1-3 3z\'/></svg>'">
                            </div>
                            <div class="min-w-0">
                                <span class="text-sm text-gray-900 dark:text-white" x-text="item.name"></span>
                                <p class="text-[10px] text-gray-500 truncate" x-text="item.description"></p>
                            </div>
                        </button>
                    </template>
                    <p class="text-[10px] font-semibold text-gray-500 uppercase tracking-wider px-2 pt-3">Services</p>
                    <template x-for="item in catalogItems.filter(i => i.category === 'service')" :key="item.id">
                        <button @click="selectTemplate(item.id)" class="w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-left hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors">
                            <div class="w-6 h-6 rounded bg-gray-100 dark:bg-gray-800 flex items-center justify-center shrink-0 overflow-hidden">
                                <img :src="'/static/icons/' + item.id + '.svg'" class="w-5 h-5" onerror="this.parentElement.innerHTML='<svg class=\'w-4 h-4 text-gray-500\' fill=\'none\' stroke=\'currentColor\' viewBox=\'0 0 24 24\'><path stroke-linecap=\'round\' stroke-linejoin=\'round\' stroke-width=\'2\' d=\'M5 12h14M5 12a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v4a2 2 0 01-2 2M5 12a2 2 0 00-2 2v4a2 2 0 002 2h14a2 2 0 002-2v-4a2 2 0 00-2-2\'/></svg>'">
                            </div>
                            <div class="min-w-0">
                                <span class="text-sm text-gray-900 dark:text-white" x-text="item.name"></span>
                                <p class="text-[10px] text-gray-500 truncate" x-text="item.description"></p>
                            </div>
                        </button>
                    </template>
                    <p class="text-[10px] font-semibold text-gray-500 uppercase tracking-wider px-2 pt-3">Docker</p>
                    <template x-for="item in catalogItems.filter(i => !i.category || (i.category !== 'database' && i.category !== 'service'))" :key="item.id">
                        <button @click="selectTemplate(item.id)" class="w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-left hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors">
                            <div class="w-6 h-6 rounded bg-gray-100 dark:bg-gray-800 flex items-center justify-center shrink-0 overflow-hidden">
                                <img :src="'/static/icons/' + (item.id || 'docker') + '.svg'" class="w-5 h-5" onerror="this.parentElement.innerHTML='<svg class=\'w-4 h-4 text-blue-400\' fill=\'none\' stroke=\'currentColor\' viewBox=\'0 0 24 24\'><path stroke-linecap=\'round\' stroke-linejoin=\'round\' stroke-width=\'2\' d=\'M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4\'/></svg>'">
                            </div>
                            <div class="min-w-0">
                                <span class="text-sm text-gray-900 dark:text-white" x-text="item.name"></span>
                                <p class="text-[10px] text-gray-500 truncate" x-text="item.description"></p>
                            </div>
                        </button>
                    </template>
                </div>
            </div>

            <!-- Step 2: Configure & Deploy -->
            <div x-show="createModal.step === 'config'" class="p-5">
                <div class="flex items-center gap-2 mb-4">
                    <button @click="createModal.step = 'catalog'" class="text-gray-400 hover:text-white">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
                    </button>
                    <h3 class="text-lg font-semibold text-gray-900 dark:text-white">Deploy <span x-text="createModal.template?.name"></span></h3>
                </div>
                <div class="space-y-3">
                    <template x-for="field in createModal.template?.fields || []" :key="field.key">
                        <div>
                            <label class="block text-xs font-medium text-gray-400 mb-1" x-text="field.label"></label>
                            <template x-if="field.type === 'select'">
                                <select x-model="createModal.form[field.key]"
                                        class="w-full px-3 py-2 bg-gray-50 dark:bg-gray-800 border border-gray-300 dark:border-gray-700 rounded-lg text-gray-900 dark:text-white text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                                    <template x-for="opt in field.options || []" :key="opt">
                                        <option :value="opt" x-text="opt"></option>
                                    </template>
                                </select>
                            </template>
                            <template x-if="field.type === 'password'">
                                <div class="flex gap-2">
                                    <input x-model="createModal.form[field.key]" type="text" :placeholder="field.placeholder || 'Auto-generated if empty'"
                                           class="flex-1 px-3 py-2 bg-gray-800 border border-gray-700 rounded-lg text-white text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                                    <button @click="createModal.form[field.key] = Math.random().toString(36).slice(2,14)"
                                            class="px-2 py-2 bg-gray-700 hover:bg-gray-600 rounded-lg text-xs text-gray-300">Generate</button>
                                </div>
                            </template>
                            <template x-if="field.type !== 'select' && field.type !== 'password'">
                                <input x-model="createModal.form[field.key]" type="text" :placeholder="field.placeholder || ''"
                                       class="w-full px-3 py-2 bg-gray-50 dark:bg-gray-800 border border-gray-300 dark:border-gray-700 rounded-lg text-gray-900 dark:text-white text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                            </template>
                        </div>
                    </template>
                    <!-- Project selector -->
                    <div>
                        <label class="block text-xs font-medium text-gray-400 mb-1">Project (optional)</label>
                        <select x-model="createModal.projectId"
                                class="w-full px-3 py-2 bg-gray-50 dark:bg-gray-800 border border-gray-300 dark:border-gray-700 rounded-lg text-gray-900 dark:text-white text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                            <option value="">No project</option>
                            <template x-for="p in createModal.projects || []" :key="p.id">
                                <option :value="p.id" x-text="p.name"></option>
                            </template>
                        </select>
                    </div>
                    <!-- Network selector -->
                    <div>
                        <label class="block text-xs font-medium text-gray-400 mb-1">Network</label>
                        <select x-model="createModal.networkId"
                                class="w-full px-3 py-2 bg-gray-50 dark:bg-gray-800 border border-gray-300 dark:border-gray-700 rounded-lg text-gray-900 dark:text-white text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                            <template x-for="n in networks" :key="n.id">
                                <option :value="n.id" x-text="n.name + (n.is_default ? ' (default)' : '')"></option>
                            </template>
                        </select>
                    </div>
                </div>
                <div class="flex justify-end gap-2 mt-5">
                    <button @click="createModal.show = false; createModal.step = 'catalog'"
                            class="px-4 py-2 text-sm text-gray-400 hover:text-white">Cancel</button>
                    <button @click="deployFromCanvas()" :disabled="createModal.deploying"
                            class="px-5 py-2 text-sm font-medium bg-blue-600 hover:bg-blue-700 disabled:opacity-50 text-white rounded-lg transition-colors">
                        <span x-text="createModal.deploying ? 'Deploying...' : 'Deploy'"></span>
                    </button>
                </div>
            </div>

            <!-- Step 3: Deploying (log viewer) -->
            <div x-show="createModal.step === 'deploying'" class="p-5">
                <div class="flex items-center justify-between mb-3">
                    <div class="flex items-center gap-2">
                        <div class="w-2 h-2 rounded-full animate-pulse"
                             :class="createModal.deployStatus === 'success' ? 'bg-green-500' : createModal.deployStatus === 'failed' ? 'bg-red-500' : 'bg-blue-500'"></div>
                        <h3 class="text-lg font-semibold text-gray-900 dark:text-white" x-text="createModal.deployStatus === 'success' ? 'Deployed!' : createModal.deployStatus === 'failed' ? 'Deploy Failed' : 'Deploying...'"></h3>
                    </div>
                    <span class="text-xs text-gray-500" x-text="createModal.template?.name"></span>
                </div>
                <div class="bg-black rounded-lg p-3 font-mono text-[11px] text-gray-300 max-h-[50vh] overflow-y-auto whitespace-pre-wrap" x-ref="deployLogBox"
                     x-text="createModal.deployLog || 'Starting deployment...'"></div>
                <div class="flex justify-end gap-2 mt-4">
                    <template x-if="createModal.deployStatus === 'success'">
                        <div class="flex gap-2">
                            <a :href="'/resources/' + createModal.deployedId"
                               class="px-4 py-2 text-sm text-blue-400 hover:text-blue-300">Open Details</a>
                            <button @click="createModal.show = false; createModal.step = 'catalog'; createModal.deployLog = ''"
                                    class="px-4 py-2 text-sm font-medium bg-green-600 hover:bg-green-700 text-white rounded-lg">Done</button>
                        </div>
                    </template>
                    <template x-if="createModal.deployStatus === 'failed'">
                        <button @click="createModal.step = 'config'; createModal.deployLog = ''; createModal.deployStatus = ''"
                                class="px-4 py-2 text-sm font-medium bg-gray-700 hover:bg-gray-600 text-white rounded-lg">Back to Config</button>
                    </template>
                </div>
            </div>
        </div>
    </div>

    <!-- Context menu -->
    <div x-show="contextMenu.show" x-cloak
         :style="'left:' + contextMenu.x + 'px; top:' + contextMenu.y + 'px'"
         @click.away="contextMenu.show = false"
         class="fixed z-50 bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-700 rounded-lg shadow-2xl py-1 min-w-[160px]">
        <button @click="doAction('start')" class="w-full text-left px-3 py-1.5 text-sm text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-800 flex items-center gap-2">
            <svg class="w-3.5 h-3.5 text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"/></svg>
            Start</button>
        <button @click="doAction('stop')" class="w-full text-left px-3 py-1.5 text-sm text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-800 flex items-center gap-2">
            <svg class="w-3.5 h-3.5 text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 10a1 1 0 011-1h4a1 1 0 011 1v4a1 1 0 01-1 1h-4a1 1 0 01-1-1v-4z"/></svg>
            Stop</button>
        <button @click="doAction('restart')" class="w-full text-left px-3 py-1.5 text-sm text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-800 flex items-center gap-2">
            <svg class="w-3.5 h-3.5 text-yellow-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
            Restart</button>
        <button @click="doAction('redeploy')" class="w-full text-left px-3 py-1.5 text-sm text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-800 flex items-center gap-2">
            <svg class="w-3.5 h-3.5 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/></svg>
            Redeploy</button>
        <div class="border-t border-gray-200 dark:border-gray-700 my-1"></div>
        <a :href="'/resources/' + contextMenu.id" class="block px-3 py-1.5 text-sm text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-800 flex items-center gap-2">
            <svg class="w-3.5 h-3.5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
            Open Details</a>
    </div>

    <!-- Legend -->
    <div class="absolute bottom-3 left-3 z-20 bg-white/80 dark:bg-gray-900/80 backdrop-blur-sm border border-gray-200 dark:border-gray-800/50 rounded-lg px-3 py-2 text-[10px] text-gray-500 flex items-center gap-3">
        <span class="flex items-center gap-1"><span class="w-1.5 h-1.5 rounded-full bg-green-500"></span> Running</span>
        <span class="flex items-center gap-1"><span class="w-1.5 h-1.5 rounded-full bg-red-500"></span> Failed</span>
        <span class="flex items-center gap-1"><span class="w-1.5 h-1.5 rounded-full bg-blue-500"></span> Deploying</span>
        <span class="flex items-center gap-1"><span class="w-1.5 h-1.5 rounded-full bg-gray-500"></span> Stopped</span>
    </div>
</div>

<script>
function canvasApp() {
    const CARD_W = 210, CARD_H = 100, GAP = 28, ZONE_PAD = 50;
    return {
        resources: [], servers: [], networks: [], positions: {},
        cards: [], edges: [], serverZones: [],
        zoom: 1, panX: -100, panY: -30,
        // Country code → flag emoji
        countryFlag(code) {
            if (!code || code.length !== 2) return '';
            const base = 0x1F1E6 - 65;
            return String.fromCodePoint(code.charCodeAt(0) + base, code.charCodeAt(1) + base);
        },
        dragging: null, dragOffsetX: 0, dragOffsetY: 0,
        panning: false, panStartX: 0, panStartY: 0, panStartPanX: 0, panStartPanY: 0,
        hoveredId: null,
        contextMenu: { show: false, x: 0, y: 0, id: null },
        catalogItems: [],
        createModal: { show: false, step: 'catalog', template: null, form: {}, networkId: '', projectId: '', projects: [], deploying: false, deployLog: '', deployStatus: '', deployedId: null },

        async init() {
            await this.loadData();
            this.buildCanvas();
            setInterval(() => this.refreshStatus(), 5000);
        },

        async loadData() {
            try {
                const data = await fetch('/api/v1/canvas').then(r => r.json());
                this.resources = data.resources || [];
                this.servers = data.servers || [];
                this.networks = data.networks || [];
                this.positions = data.positions || {};
            } catch (e) { console.error('Canvas load:', e); }
        },

        async refreshStatus() {
            try {
                const res = await fetch('/api/v1/resources').then(r => r.json());
                for (const r of res) {
                    const card = this.cards.find(c => c.id === r.id);
                    if (card && card.status !== r.status) card.status = r.status;
                }
            } catch {}
        },

        getCardCenter(id) {
            const c = this.cards.find(c => c.id === id);
            return c ? { x: c.x + CARD_W / 2, y: c.y + CARD_H / 2 } : { x: 0, y: 0 };
        },

        buildCanvas() {
            const localId = '_local_';
            const byServer = { [localId]: [] };
            for (const s of this.servers) byServer[s.id] = [];
            for (const r of this.resources) {
                const sid = r.server_id || localId;
                if (!byServer[sid]) byServer[sid] = [];
                byServer[sid].push(r);
            }

            this.serverZones = [];
            this.cards = [];
            let zoneX = 60;
            const localServer = this.servers.find(s => s.is_local);
            const order = [localId, ...this.servers.filter(s => !s.is_local).map(s => s.id)];

            for (const sid of order) {
                const items = byServer[sid] || [];
                const server = sid === localId
                    ? (localServer || { name: 'localhost', status: 'online', is_local: true })
                    : this.servers.find(s => s.id === sid);
                if (!server) continue;
                if (items.length === 0 && sid !== localId) continue;

                const cols = Math.max(2, Math.min(4, items.length || 1));
                const rows = Math.ceil(items.length / cols) || 1;
                const zoneW = cols * (CARD_W + GAP) + ZONE_PAD * 2 - GAP;
                const zoneH = (rows + 1) * (CARD_H + GAP) + ZONE_PAD + 50;

                this.serverZones.push({
                    id: sid,
                    name: server.name || 'localhost',
                    host: server.host || 'localhost',
                    status: server.status || 'online',
                    is_local: server.is_local || sid === localId,
                    country_code: server.country_code || null,
                    x: zoneX, y: 60,
                    w: Math.max(zoneW, 300), h: Math.max(zoneH, 180),
                    location: [server.city, server.country].filter(Boolean).join(', ') || '',
                });

                for (let i = 0; i < items.length; i++) {
                    const r = items[i];
                    const col = i % cols, row = Math.floor(i / cols);
                    const saved = this.positions[r.id];
                    this.cards.push({
                        id: r.id, name: r.name, status: r.status,
                        catalog_id: r.catalog_id, category: r.category,
                        port: r.port, network_id: r.network_id, server_id: sid,
                        x: saved ? saved.x : zoneX + ZONE_PAD + col * (CARD_W + GAP),
                        y: saved ? saved.y : 120 + row * (CARD_H + GAP),
                    });
                }
                zoneX += Math.max(zoneW, 300) + 50;
            }

            // Edges
            this.edges = [];
            const netGroups = {};
            for (const c of this.cards) {
                const nid = c.network_id || 'default';
                if (!netGroups[nid]) netGroups[nid] = [];
                netGroups[nid].push(c);
            }
            let idx = 0;
            for (const group of Object.values(netGroups)) {
                for (let i = 0; i < group.length; i++) {
                    for (let j = i + 1; j < group.length; j++) {
                        this.edges.push({ id: 'e' + idx++, from: group[i].id, to: group[j].id });
                    }
                }
            }
        },

        // Pan & Zoom
        onCanvasMouseDown(e) {
            if (e.button !== 0) return;
            this.panning = true;
            this.panStartX = e.clientX;
            this.panStartY = e.clientY;
            this.panStartPanX = this.panX;
            this.panStartPanY = this.panY;
        },
        onMouseMove(e) {
            if (this.dragging) {
                const dx = (e.clientX - this.dragStartClientX) / this.zoom;
                const dy = (e.clientY - this.dragStartClientY) / this.zoom;
                let newX = this.dragStartCardX + dx;
                let newY = this.dragStartCardY + dy;
                // Constrain within server zone
                const zone = this.serverZones.find(z => z.id === this.dragging.server_id);
                if (zone) {
                    newX = Math.max(zone.x + ZONE_PAD, Math.min(zone.x + zone.w - CARD_W - 10, newX));
                    newY = Math.max(zone.y + ZONE_PAD + 30, Math.min(zone.y + zone.h - CARD_H - 10, newY));
                }
                this.dragging.x = newX;
                this.dragging.y = newY;
            } else if (this.panning) {
                const dx = (e.clientX - this.panStartX) / this.zoom;
                const dy = (e.clientY - this.panStartY) / this.zoom;
                this.panX = this.panStartPanX - dx;
                this.panY = this.panStartPanY - dy;
            }
        },
        onMouseUp() {
            if (this.dragging) {
                this.savePosition(this.dragging);
                this.dragging = null;
            }
            this.panning = false;
        },
        onWheel(e) {
            const factor = e.deltaY > 0 ? 0.92 : 1.08;
            this.zoom = Math.max(0.25, Math.min(3, this.zoom * factor));
        },
        zoomIn() { this.zoom = Math.min(3, this.zoom * 1.2); },
        zoomOut() { this.zoom = Math.max(0.25, this.zoom * 0.8); },
        resetView() { this.zoom = 1; this.panX = -100; this.panY = -30; },

        // Card Drag
        onCardMouseDown(e, card) {
            if (e.button === 2) {
                this.contextMenu = { show: true, x: e.clientX, y: e.clientY, id: card.id };
                return;
            }
            this.dragging = card;
            this.dragStartClientX = e.clientX;
            this.dragStartClientY = e.clientY;
            this.dragStartCardX = card.x;
            this.dragStartCardY = card.y;
        },

        async savePosition(card) {
            try {
                await fetch('/api/v1/canvas/positions', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify([{ service_id: card.id, x: card.x, y: card.y }]),
                });
            } catch {}
        },

        // Context Menu
        async doAction(action) {
            const id = this.contextMenu.id;
            this.contextMenu.show = false;
            if (!id) return;
            try {
                await api('/api/v1/resources/' + id + '/' + action, { method: 'POST' });
                toast(action + ' initiated');
                setTimeout(() => this.refreshStatus(), 2000);
            } catch (e) { toast(e.message, 'error'); }
        },

        // Inline Creation
        async loadCatalog() {
            if (this.catalogItems.length) return;
            try {
                const [catalog, projects] = await Promise.all([
                    fetch('/api/v1/catalog').then(r => r.json()),
                    fetch('/api/v1/projects').then(r => r.json()),
                ]);
                this.catalogItems = catalog;
                this.createModal.projects = projects;
            } catch {}
            const def = this.networks.find(n => n.is_default);
            if (def) this.createModal.networkId = def.id;
        },
        async selectTemplate(catalogId) {
            try {
                const tmpl = await fetch('/api/v1/catalog/' + catalogId).then(r => r.json());
                this.createModal.template = tmpl;
                this.createModal.form = {};
                for (const f of (tmpl.fields || [])) {
                    if (f.key === 'name') {
                        this.createModal.form[f.key] = '';
                    } else {
                        this.createModal.form[f.key] = f.default || '';
                    }
                }
                this.createModal.step = 'config';
            } catch (e) { toast('Failed to load template', 'error'); }
        },
        async deployFromCanvas() {
            const m = this.createModal;
            const name = m.form.name?.trim();
            if (!name) { toast('Name is required', 'error'); return; }
            m.deploying = true;
            m.step = 'deploying';
            m.deployLog = `Deploying ${m.template.name} "${name}"...\n`;
            m.deployStatus = 'deploying';
            m.deployedId = null;

            try {
                m.deployLog += `Creating resource...\n`;
                const result = await api('/api/v1/resources', { method: 'POST', body: JSON.stringify({
                    catalog_id: m.template.id, name, network_id: m.networkId || null, project_id: m.projectId || null, config: { ...m.form },
                }) });
                m.deployedId = result.id;
                m.deployLog += `Container created successfully\n`;

                // Fetch deployment logs
                if (result.id) {
                    try {
                        const logs = await fetch('/api/v1/resources/' + result.id + '/deployment-logs').then(r => r.json());
                        if (logs && logs.length > 0) {
                            const lastLog = logs[logs.length - 1];
                            m.deployLog += `\n--- Deployment Log ---\n${lastLog.output || 'No output'}\n`;
                        }
                    } catch {}
                }

                m.deployLog += `\n✓ ${name} deployed successfully!\n`;
                m.deployStatus = 'success';
                toast(name + ' deployed');
                await this.loadData();
                this.buildCanvas();
            } catch (e) {
                m.deployLog += `\n✗ Deploy failed: ${e.message}\n`;
                m.deployStatus = 'failed';
                toast(e.message, 'error');
            }
            m.deploying = false;
            // Auto-scroll log
            this.$nextTick(() => {
                const box = this.$refs.deployLogBox;
                if (box) box.scrollTop = box.scrollHeight;
            });
        },
    };
}
</script>
