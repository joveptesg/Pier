{% extends "base.html" %}
{% block title %}Architecture Canvas{% endblock %}

{% block content %}
<div x-data="canvasApp()" x-init="init()" class="fixed inset-0 top-0 overflow-hidden" style="margin:0;padding:0;">
    <!-- Top bar -->
    <div class="absolute top-0 left-0 right-0 z-20 flex items-center justify-between px-4 py-2 bg-gray-950/80 backdrop-blur-sm border-b border-gray-800/50">
        <div class="flex items-center gap-3">
            <a href="/" class="text-sm text-gray-400 hover:text-white transition-colors flex items-center gap-1">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
                Dashboard
            </a>
            <span class="text-gray-600">|</span>
            <h2 class="text-sm font-medium text-white">Architecture</h2>
            <span class="text-xs text-gray-500" x-text="resources.length + ' services'"></span>
        </div>
        <div class="flex items-center gap-2">
            <span class="text-xs text-gray-500" x-text="Math.round(zoom * 100) + '%'"></span>
            <button @click="zoomIn()" class="p-1 text-gray-400 hover:text-white"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v12m6-6H6"/></svg></button>
            <button @click="zoomOut()" class="p-1 text-gray-400 hover:text-white"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 12H6"/></svg></button>
            <button @click="resetView()" class="p-1 text-gray-400 hover:text-white text-xs">Fit</button>
        </div>
    </div>

    <!-- SVG Canvas -->
    <svg xmlns="http://www.w3.org/2000/svg"
         class="w-full h-full bg-gray-950"
         :viewBox="viewBox"
         @mousedown="onCanvasMouseDown($event)"
         @mousemove="onMouseMove($event)"
         @mouseup="onMouseUp($event)"
         @mouseleave="onMouseUp($event)"
         @wheel.prevent="onWheel($event)">

        <!-- Grid pattern -->
        <defs>
            <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
                <circle cx="20" cy="20" r="0.5" fill="#1f2937" />
            </pattern>
        </defs>
        <rect x="-5000" y="-5000" width="10000" height="10000" fill="url(#grid)" />

        <!-- Network connection lines -->
        <template x-for="edge in edges" :key="edge.id">
            <line :x1="edge.x1" :y1="edge.y1" :x2="edge.x2" :y2="edge.y2"
                  stroke="#374151" stroke-width="1" stroke-dasharray="6,4"
                  :class="hoveredId && (hoveredId === edge.from || hoveredId === edge.to) ? 'opacity-100' : 'opacity-30'"
                  style="transition: opacity 0.2s" />
        </template>

        <!-- Server zone rectangles -->
        <template x-for="zone in serverZones" :key="zone.id">
            <g>
                <rect :x="zone.x" :y="zone.y" :width="zone.w" :height="zone.h"
                      rx="12" fill="none" stroke="#374151" stroke-width="1.5" stroke-dasharray="8,6" />
                <text :x="zone.x + 16" :y="zone.y + 24" fill="#6b7280" font-size="13" font-weight="600"
                      x-text="zone.name"></text>
                <circle :cx="zone.x + zone.w - 20" :cy="zone.y + 18" r="5"
                        :fill="zone.status === 'online' || zone.is_local ? '#22c55e' : '#6b7280'" />
                <text :x="zone.x + 16" :y="zone.y + 42" fill="#4b5563" font-size="11"
                      x-text="zone.metrics"></text>
            </g>
        </template>

        <!-- Service cards -->
        <template x-for="card in cards" :key="card.id">
            <g :transform="'translate(' + card.x + ',' + card.y + ')'"
               @mousedown.stop="onCardMouseDown($event, card)"
               @mouseenter="hoveredId = card.id"
               @mouseleave="hoveredId = null"
               @dblclick="window.location.href = '/resources/' + card.id"
               style="cursor: grab">
                <foreignObject width="200" height="90" style="overflow:visible">
                    <div xmlns="http://www.w3.org/1999/xhtml"
                         class="w-[200px] rounded-xl border p-3 shadow-lg backdrop-blur-sm transition-all duration-200"
                         :class="{
                             'bg-gray-900/95 border-green-500/50 shadow-green-500/10': card.status === 'running',
                             'bg-gray-900/95 border-red-500/50 shadow-red-500/10': card.status === 'failed',
                             'bg-gray-900/95 border-gray-600/50': card.status === 'stopped' || card.status === 'unknown',
                             'bg-gray-900/95 border-blue-500/50 shadow-blue-500/10 animate-pulse': card.status === 'deploying',
                             'ring-2 ring-blue-400/50': hoveredId === card.id
                         }">
                        <div class="flex items-center gap-2 mb-1">
                            <img :src="'/static/icons/' + (card.catalog_id || 'docker') + '.svg'"
                                 class="w-5 h-5 rounded" onerror="this.src='/static/icons/docker.svg'">
                            <span class="text-sm font-medium text-white truncate" x-text="card.name"></span>
                            <span class="ml-auto w-2 h-2 rounded-full shrink-0"
                                  :class="{
                                      'bg-green-500': card.status === 'running',
                                      'bg-red-500': card.status === 'failed',
                                      'bg-gray-500': card.status === 'stopped' || card.status === 'unknown',
                                      'bg-blue-500': card.status === 'deploying'
                                  }"></span>
                        </div>
                        <div class="text-[10px] text-gray-400" x-text="(card.catalog_id || 'container') + ' \u00B7 ' + (card.category || 'service')"></div>
                        <div class="flex items-center justify-between mt-1.5">
                            <span class="text-[10px] text-gray-500" x-text="card.port ? 'Port ' + card.port : ''"></span>
                            <span class="text-[10px] px-1.5 py-0.5 rounded"
                                  :class="{
                                      'bg-green-900/50 text-green-400': card.status === 'running',
                                      'bg-red-900/50 text-red-400': card.status === 'failed',
                                      'bg-gray-800 text-gray-500': card.status === 'stopped' || card.status === 'unknown',
                                      'bg-blue-900/50 text-blue-400': card.status === 'deploying'
                                  }"
                                  x-text="card.status"></span>
                        </div>
                    </div>
                </foreignObject>
            </g>
        </template>
    </svg>

    <!-- Context menu -->
    <div x-show="contextMenu.show" x-cloak
         :style="'left:' + contextMenu.x + 'px;top:' + contextMenu.y + 'px'"
         @click.away="contextMenu.show = false"
         class="fixed z-50 bg-gray-900 border border-gray-700 rounded-lg shadow-xl py-1 min-w-[160px]">
        <button @click="doAction('start')" class="w-full text-left px-3 py-1.5 text-sm text-gray-300 hover:bg-gray-800">Start</button>
        <button @click="doAction('stop')" class="w-full text-left px-3 py-1.5 text-sm text-gray-300 hover:bg-gray-800">Stop</button>
        <button @click="doAction('restart')" class="w-full text-left px-3 py-1.5 text-sm text-gray-300 hover:bg-gray-800">Restart</button>
        <button @click="doAction('redeploy')" class="w-full text-left px-3 py-1.5 text-sm text-gray-300 hover:bg-gray-800">Redeploy</button>
        <div class="border-t border-gray-700 my-1"></div>
        <a :href="'/resources/' + contextMenu.id" class="block px-3 py-1.5 text-sm text-gray-300 hover:bg-gray-800">Open Details</a>
    </div>

    <!-- Legend -->
    <div class="absolute bottom-4 left-4 z-20 bg-gray-900/90 backdrop-blur-sm border border-gray-800 rounded-lg px-3 py-2 text-xs text-gray-400 flex items-center gap-4">
        <span class="flex items-center gap-1"><span class="w-2 h-2 rounded-full bg-green-500"></span> Running</span>
        <span class="flex items-center gap-1"><span class="w-2 h-2 rounded-full bg-red-500"></span> Failed</span>
        <span class="flex items-center gap-1"><span class="w-2 h-2 rounded-full bg-blue-500"></span> Deploying</span>
        <span class="flex items-center gap-1"><span class="w-2 h-2 rounded-full bg-gray-500"></span> Stopped</span>
        <span class="text-gray-600">|</span>
        <span>Double-click to open | Right-click for menu | Drag to move</span>
    </div>
</div>

<script>
function canvasApp() {
    const CARD_W = 200, CARD_H = 90, CARD_GAP = 24, ZONE_PAD = 60;
    return {
        resources: [], servers: [], networks: [], positions: {},
        cards: [], edges: [], serverZones: [],
        // View state
        zoom: 1, panX: 0, panY: 0,
        get viewBox() {
            const w = 1600 / this.zoom, h = 900 / this.zoom;
            return `${this.panX} ${this.panY} ${w} ${h}`;
        },
        // Interaction state
        dragging: null, dragStartX: 0, dragStartY: 0,
        panning: false, panStartX: 0, panStartY: 0, panStartPanX: 0, panStartPanY: 0,
        hoveredId: null,
        contextMenu: { show: false, x: 0, y: 0, id: null },
        refreshInterval: null,

        async init() {
            await this.loadData();
            this.buildCanvas();
            // Auto-refresh every 5s
            this.refreshInterval = setInterval(() => this.refreshStatus(), 5000);
            // Right-click context menu
            document.addEventListener('contextmenu', (e) => {
                if (this.contextMenu.id) e.preventDefault();
            });
        },

        async loadData() {
            try {
                const data = await fetch('/api/v1/canvas').then(r => r.json());
                this.resources = data.resources || [];
                this.servers = data.servers || [];
                this.networks = data.networks || [];
                this.positions = data.positions || {};
            } catch (e) { console.error('Canvas load:', e); }
        },

        async refreshStatus() {
            try {
                const data = await fetch('/api/v1/canvas').then(r => r.json());
                // Update only status, don't rebuild layout
                for (const r of (data.resources || [])) {
                    const card = this.cards.find(c => c.id === r.id);
                    if (card && card.status !== r.status) card.status = r.status;
                }
            } catch {}
        },

        buildCanvas() {
            // Group resources by server
            const localId = '_local_';
            const byServer = {};
            byServer[localId] = [];
            for (const s of this.servers) byServer[s.id] = [];

            for (const r of this.resources) {
                const sid = r.server_id || localId;
                if (!byServer[sid]) byServer[sid] = [];
                byServer[sid].push(r);
            }
            // Resources without server go to local
            if (!byServer[localId]) byServer[localId] = [];

            // Build server zones and cards
            this.serverZones = [];
            this.cards = [];
            let zoneX = 40;

            // Local server first
            const serverOrder = [localId, ...this.servers.filter(s => !s.is_local).map(s => s.id)];
            // Add local server info
            const localServer = this.servers.find(s => s.is_local);

            for (const sid of serverOrder) {
                const items = byServer[sid] || [];
                const server = sid === localId
                    ? (localServer || { name: 'localhost', status: 'online', is_local: true })
                    : this.servers.find(s => s.id === sid);
                if (!server) continue;

                // Calculate zone size
                const cols = Math.max(2, Math.min(4, items.length));
                const rows = Math.ceil(items.length / cols) || 1;
                const zoneW = cols * (CARD_W + CARD_GAP) + ZONE_PAD * 2 - CARD_GAP;
                const zoneH = rows * (CARD_H + CARD_GAP) + ZONE_PAD + 50 - CARD_GAP;

                this.serverZones.push({
                    id: sid,
                    name: server.name || 'localhost',
                    status: server.status || 'online',
                    is_local: server.is_local || sid === localId,
                    x: zoneX, y: 60,
                    w: Math.max(zoneW, 280), h: Math.max(zoneH, 160),
                    metrics: server.cpu_count ? `${server.cpu_count} CPU \u00B7 Docker ${server.docker_version || '?'}` : 'localhost',
                });

                // Place cards inside zone
                for (let i = 0; i < items.length; i++) {
                    const r = items[i];
                    const col = i % cols, row = Math.floor(i / cols);
                    const saved = this.positions[r.id];
                    this.cards.push({
                        id: r.id,
                        name: r.name,
                        status: r.status,
                        catalog_id: r.catalog_id,
                        category: r.category,
                        port: r.port,
                        network_id: r.network_id,
                        server_id: sid,
                        x: saved ? saved.x : zoneX + ZONE_PAD + col * (CARD_W + CARD_GAP),
                        y: saved ? saved.y : 60 + ZONE_PAD + 20 + row * (CARD_H + CARD_GAP),
                    });
                }

                zoneX += Math.max(zoneW, 280) + 40;
            }

            // Build edges (services in same network)
            this.edges = [];
            const netGroups = {};
            for (const c of this.cards) {
                const nid = c.network_id || 'default';
                if (!netGroups[nid]) netGroups[nid] = [];
                netGroups[nid].push(c);
            }
            let edgeIdx = 0;
            for (const [nid, group] of Object.entries(netGroups)) {
                for (let i = 0; i < group.length; i++) {
                    for (let j = i + 1; j < group.length; j++) {
                        this.edges.push({
                            id: 'e' + (edgeIdx++),
                            from: group[i].id, to: group[j].id,
                            get x1() { return group[i].x + CARD_W / 2; },
                            get y1() { return group[i].y + CARD_H / 2; },
                            get x2() { return group[j].x + CARD_W / 2; },
                            get y2() { return group[j].y + CARD_H / 2; },
                        });
                    }
                }
            }
        },

        // --- Pan / Zoom ---
        svgPoint(e) {
            const svg = e.target.closest('svg');
            const pt = svg.createSVGPoint();
            pt.x = e.clientX; pt.y = e.clientY;
            const ctm = svg.getScreenCTM().inverse();
            return pt.matrixTransform(ctm);
        },
        onCanvasMouseDown(e) {
            if (e.button === 2) return; // right-click
            this.panning = true;
            this.panStartX = e.clientX;
            this.panStartY = e.clientY;
            this.panStartPanX = this.panX;
            this.panStartPanY = this.panY;
        },
        onMouseMove(e) {
            if (this.dragging) {
                const p = this.svgPoint(e);
                this.dragging.x = p.x - this.dragOffsetX;
                this.dragging.y = p.y - this.dragOffsetY;
                // Update edges reactively
                this.edges = [...this.edges];
            } else if (this.panning) {
                const dx = (e.clientX - this.panStartX) / this.zoom;
                const dy = (e.clientY - this.panStartY) / this.zoom;
                this.panX = this.panStartPanX - dx;
                this.panY = this.panStartPanY - dy;
            }
        },
        onMouseUp() {
            if (this.dragging) {
                this.savePosition(this.dragging);
                this.dragging = null;
            }
            this.panning = false;
        },
        onWheel(e) {
            const factor = e.deltaY > 0 ? 0.9 : 1.1;
            this.zoom = Math.max(0.3, Math.min(3, this.zoom * factor));
        },
        zoomIn() { this.zoom = Math.min(3, this.zoom * 1.2); },
        zoomOut() { this.zoom = Math.max(0.3, this.zoom * 0.8); },
        resetView() { this.zoom = 1; this.panX = 0; this.panY = 0; },

        // --- Card Drag ---
        onCardMouseDown(e, card) {
            if (e.button === 2) {
                // Right-click → context menu
                this.contextMenu = { show: true, x: e.clientX, y: e.clientY, id: card.id };
                return;
            }
            const p = this.svgPoint(e);
            this.dragOffsetX = p.x - card.x;
            this.dragOffsetY = p.y - card.y;
            this.dragging = card;
        },

        async savePosition(card) {
            try {
                await fetch('/api/v1/canvas/positions', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify([{ service_id: card.id, x: card.x, y: card.y }]),
                });
            } catch {}
        },

        // --- Context Menu Actions ---
        async doAction(action) {
            const id = this.contextMenu.id;
            this.contextMenu.show = false;
            if (!id) return;
            try {
                await api('/api/v1/resources/' + id + '/' + action, { method: 'POST' });
                toast(action + ' initiated');
                setTimeout(() => this.refreshStatus(), 2000);
            } catch (e) { toast(e.message, 'error'); }
        },
    };
}
</script>
{% endblock %}
