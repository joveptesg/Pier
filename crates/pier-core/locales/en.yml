# English — source locale for the Pier admin panel.
#
# This is the canonical catalog: every user-facing string lives here as a key.
# Other languages are added later as sibling files (`ru.yml`, `zh-CN.yml`, …);
# missing keys fall back to this file (`i18n!(.., fallback = "en")`).
#
# Key convention: <area>.<screen>.<element>. Shared words go under `common.*`,
# sidebar navigation under `nav.*`. Interpolation uses `%{name}` placeholders;
# the MiniJinja `t()` bridge fills them from template kwargs.

# Words/labels reused across many screens.
common:
  logout: Logout
  view_all: View all
  loading: Loading...
  no_description: No description
  cancel: Cancel
  copy: Copy
  optional: (optional)
  # Client-side toast / fetch messages emitted from shared scripts.
  copied: Copied!
  copy_failed: Copy failed
  request_failed: Request failed

# Sidebar navigation (labels + collapsed-sidebar tooltips share these keys).
nav:
  dashboard: Dashboard
  projects: Projects
  servers: Servers
  sources: Sources
  s3: S3 Storages
  registries: Registries
  packages: Packages
  domains: Domains
  proxy: Proxy
  networks: Networks
  team: Team
  tasks: Tasks
  schedules: Schedules
  settings: Settings
  logs: Logs
  updates: Updates
  notifications: Notifications
  # Sidebar section headers.
  group:
    integrations: Integrations
    networking: Networking
    system: System

# Shared chrome rendered by base.html.
layout:
  support_pier: Support Pier
  deploy_in_progress: In Progress
  # Deploy badge count: "N deployment(s)". JS picks singular/plural by count.
  deployment_one: deployment
  deployment_other: deployments

# Login + two-factor screen (login.html).
login:
  title: Login
  sign_in: Sign in
  two_factor: Two-factor authentication
  username: Username
  # Example username shown as the field placeholder (the default account name).
  username_placeholder: admin
  password: Password
  signing_in: Signing in...
  totp_hint: Enter the 6-digit code from your authenticator app, or a recovery code.
  verify: Verify
  verifying: Verifying...
  back: ← back
  error:
    login_failed: Login failed
    invalid_code: Invalid code
    request_failed: Request failed

# Dashboard (dashboard.html).
dashboard:
  title: Dashboard
  subtitle: System overview and resource usage
  architecture: Architecture
  cpu_usage: CPU Usage
  memory: Memory
  disk: Disk
  containers: Containers
  # Suffixes/labels assembled in Alpine x-text expressions.
  cores: cores
  running: running
  stopped: stopped
  docker_engine: Docker Engine
  version: Version
  api_version: API Version
  storage_driver: Storage Driver
  images: Images
  projects: Projects
  no_projects: No projects yet
  create_first_project: Create your first project
  system: System
  hostname: Hostname
  os: OS
  uptime: Uptime
  servers: Servers
  memory_by_container: Memory Usage by Container
  loading_stats: Loading stats...
  no_running_containers: No running containers
  disk_usage: Disk Usage
  volumes: Volumes
  build_cache: Build Cache
  total_disk_usage: Total Docker Disk Usage

# Shared auth-page chrome (auth_base.html).
auth:
  tagline: Deploy Anything. Own Everything.

# First-run admin setup (setup.html).
setup:
  title: Setup
  proxy_error_title: Reverse-proxy (Traefik) failed to start
  proxy_error_hint: "This is often caused by a Docker Hub rate-limit on shared-IP VPSes. To fix it manually, run on the server:"
  proxy_error_after: "After the restart, Pier brings Traefik back up automatically. This banner disappears on /setup."
  create_admin: Create Admin Account
  subtitle: First-time setup. Create the administrator account.
  username: Username
  username_placeholder: admin
  email: Email
  password: Password
  generate_password: Generate strong password
  password_placeholder: Min. 12 characters, mixed
  confirm_password: Confirm password
  confirm_placeholder: Re-enter password
  passwords_no_match: Passwords do not match
  creating: Creating...
  strength:
    very_weak: Very weak
    weak: Weak
    fair: Fair
    good: Good
    strong: Strong
  pw_copied: Password copied to clipboard. Save it now — it will not be shown again.
  pw_generated: Password generated. Copy it from the field — it will not be shown again.
  fix_fields: Please fix the highlighted fields before continuing.
  setup_failed: Setup failed

# CLI authorization page for `npm login --auth-type=web` (cli_login.html).
cli_login:
  title: Authorize CLI
  request_desc: A command-line tool is requesting a token to publish or install npm packages from this registry.
  authorizing_as: Authorizing as
  hostname: Hostname
  source_ip: Source IP
  user_agent: User-Agent
  expires_in: Expires in
  expired_short: expired
  token_name: Token name
  token_name_placeholder: laptop, CI runner, …
  authorize: Authorize
  issuing: Issuing token…
  authorized: CLI authorized
  authorized_hint: "Your terminal should pick up the token within a few seconds. If it doesn't, copy the token below and paste it into <code class=\"font-mono\">.npmrc</code>."
  token_fallback: Token (fallback)
  token_once: This is the only time the token is shown here. Once the CLI fetches it, the entry is cleared.
  back_to_packages: Back to Packages
  session_expired: Session expired
  expired_hint: "Re-run <code class=\"font-mono\">npm login --auth-type=web --registry=…</code> in your terminal to start a fresh session."
  auth_failed: Authorization failed
  clipboard_failed: Clipboard copy failed — select and copy manually.

# Invitation acceptance (invitations/accept.html).
invite:
  title: Accept Invitation
  verifying: Verifying invitation…
  invalid_title: Invitation not valid
  invalid_desc: This link has expired, been used, or never existed. Ask whoever invited you to send a new one.
  back_to_login: Back to login
  welcome: Welcome to Pier
  invited_as: You were invited as
  choose_credentials: Choose a username and password to finish setting up your account.
  username: Username
  password: Password
  password_hint: At least 12 characters, not derived from your username or email.
  create_account: Create account
  working: Working…
  created_title: Account created
  created_desc: Your account is ready. Sign in with the credentials you just chose.
  go_to_login: Go to login
  accept_failed: Failed to accept invitation

# Test-only fixtures exercised by the src/i18n unit tests. Not referenced by any
# template; kept here because the unit tests share this compiled-in catalog and
# need a stable `%{name}` interpolation sample (no section-1 screen has one yet).
test_fixtures:
  plain: Spike works
  interp: "Hello, %{name}"
