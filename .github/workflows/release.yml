name: Build & Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build release binary
        run: cargo build --release

      - name: Prepare artifacts
        run: |
          # cargo build --release builds the whole workspace, so pier-agent and
          # pier-net-helper are already present alongside pier. The agent
          # enrollment script downloads these exact filenames from the `latest`
          # release, so publishing them here is required for fresh enrollment.
          for bin in pier pier-agent pier-net-helper; do
            cp "target/release/$bin" "$bin-linux-amd64"
            chmod +x "$bin-linux-amd64"
            sha256sum "$bin-linux-amd64" > "$bin-linux-amd64.sha256"
          done

      - name: Upload to GitHub Release (latest)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Latest Build"
          body: |
            Automated build from `main` branch.
            Commit: ${{ github.sha }}
            Built: ${{ github.event.head_commit.timestamp }}
          prerelease: true
          files: |
            pier-linux-amd64
            pier-linux-amd64.sha256
            pier-agent-linux-amd64
            pier-agent-linux-amd64.sha256
            pier-net-helper-linux-amd64
            pier-net-helper-linux-amd64.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
